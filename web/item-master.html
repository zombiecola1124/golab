<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 품목 조종석</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--muted:#64748b;--text:#0f172a;
      --line:#e5e7eb;--accent:#16a34a;--warn:#d97706;--bad:#dc2626;--point:#2563eb;
      --chip:#f8fafc;--item:#0891b2;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial;}
    header{padding:0 20px;border-bottom:none;position:sticky;top:0;background:rgba(15,23,42,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:20;height:48px}
    header .top{display:flex;align-items:center;justify-content:space-between;gap:10px;height:100%}
    header h1{margin:0;font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
    .tabs{display:flex;gap:2px;flex-wrap:wrap;height:100%}
    .tab{display:inline-flex;align-items:center;padding:0 14px;height:100%;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:600;background:transparent;transition:color .2s,border-color .2s}
    .tab:hover{color:rgba(255,255,255,.85)}
    .tab.active{color:#fff;font-weight:800;border-bottom:2px solid #fff}
    .wrap{max-width:1440px;margin:0 auto;padding:16px 16px 36px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card h2{margin:0 0 12px;font-size:13px;color:var(--item);display:flex;align-items:center;gap:8px}
    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
    .kpi{padding:14px;border-radius:10px;border:1px solid var(--line);background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:border-color .15s}
    .kpi:hover{border-color:var(--item)}
    .kpi .t{font-size:11px;color:var(--muted)}
    .kpi .v{margin-top:6px;font-size:24px;font-weight:600;color:var(--item)}
    .kpi .sub{margin-top:4px;font-size:10px;color:var(--muted);font-weight:400}
    /* Form */
    .row{display:grid;gap:10px;margin-bottom:10px}
    .r2{grid-template-columns:1fr 1fr}
    .r3{grid-template-columns:1fr 1fr 1fr}
    .form-section-label{font-size:11px;font-weight:700;color:var(--item);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--line)}
    label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700}
    label .opt{font-weight:400;color:#94a3b8}
    input,select,textarea{width:100%;border-radius:10px;border:1px solid var(--line);background:var(--chip);color:var(--text);padding:9px 10px;font-size:12px;outline:none;transition:border .2s;box-sizing:border-box}
    input:focus,select:focus,textarea:focus{border-color:var(--item)}
    input::placeholder,textarea::placeholder{color:#94a3b8}
    textarea{min-height:36px;resize:vertical}
    .chk-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:4px}
    .chk-row input[type=checkbox]{width:auto;margin:0}
    button{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:10px 14px;font-size:12px;cursor:pointer;font-weight:700}
    button:hover{border-color:#cbd5e1;background:#f8fafc}
    button:active{transform:scale(.97)}
    button.save{background:var(--item);border:none;color:#fff}
    button.save:hover{background:#0e7490}
    button.danger{color:var(--bad);background:none;border:1px solid rgba(220,38,38,.3)}
    button.secondary{background:rgba(8,145,178,.06);border:1px solid rgba(8,145,178,.25);color:var(--item)}
    button:disabled{opacity:.5;cursor:not-allowed}
    /* Table */
    .tableWrap{overflow:auto;border-radius:10px;border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:#f8fafc;color:var(--muted);text-align:left;padding:10px 12px;position:sticky;top:0;white-space:nowrap;z-index:2;border-bottom:1px solid var(--line)}
    th.r{text-align:right}
    td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
    td.r{text-align:right;font-variant-numeric:tabular-nums}
    tr:hover{background:rgba(8,145,178,.04)}
    .muted{color:var(--muted)}
    .cat-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:-0.01em;gap:6px}
    .cat-badge::before{content:"";width:3px;height:12px;border-radius:2px;background:currentColor;opacity:0.5}
    .cat-badge:hover{filter:brightness(0.95)}
    .cat-badge.raw{background:rgba(37,99,235,.08);color:#1d4ed8}
    .cat-badge.equip{background:rgba(217,119,6,.08);color:#92400e}
    .cat-badge.general{background:rgba(100,116,139,.08);color:#475569}
    /* Search/Filter */
    .search-bar{margin-bottom:12px}
    .filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
    .filter-chip{padding:5px 12px;border-radius:8px;border:1px solid var(--line);background:var(--card);font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
    .filter-chip:hover{border-color:#cbd5e1;color:var(--text)}
    .filter-chip.active{background:var(--item);border-color:var(--item);color:#fff}
    /* ── 상세 패널 v3.8 SaaS 리디자인 ── */
    .detail-row td{background:rgba(8,145,178,.02);padding:8px 12px;border-bottom:2px solid var(--line)}
    .ip-panel{padding:0;border-radius:12px;border:1px solid var(--line);background:var(--card);overflow:hidden}

    /* Hero 섹션 */
    .ip-hero{padding:20px 24px 16px;background:linear-gradient(135deg,rgba(8,145,178,.04),rgba(8,145,178,.01));border-bottom:1px solid var(--line)}
    .ip-hero-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
    .ip-hero .ip-name{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.02em}
    .ip-hero .ip-unit{font-size:12px;color:var(--muted);font-weight:500}
    .ip-hero-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
    .ip-hero-meta span{display:inline-flex;align-items:center;gap:3px}
    .ip-hero-meta b{color:var(--text);font-weight:600}

    /* 섹션 카드 공통 */
    .ip-zone{padding:16px 24px}
    .ip-zone + .ip-zone{border-top:1px solid rgba(0,0,0,.04)}
    .ip-zone-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}

    /* Core: 2-column 기본정보 + 가격 */
    .ip-core-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .ip-info-block{display:flex;flex-direction:column;gap:8px}
    .ip-field{display:flex;flex-direction:column;gap:2px}
    .ip-field-label{font-size:11px;color:var(--muted);font-weight:600}
    .ip-field-value{font-size:13px;color:var(--text);font-weight:500}

    /* 기준 가격 블록 */
    .ip-prices{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:14px;border-radius:10px;background:rgba(8,145,178,.03)}
    .ip-price-item{display:flex;flex-direction:column;gap:2px}
    .ip-price-item .pp-label{font-size:11px;color:var(--muted);font-weight:600}
    .ip-price-item .pp-value{font-size:14px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
    /* v3.12: 파생 데이터 구분 + 마진 색상 */
    .ip-derived-sep{grid-column:1/-1;height:1px;background:var(--border);margin:4px 0}
    .ip-derived .pp-label{font-style:italic}
    .ip-derived .pp-label::before{content:"↳ ";opacity:.5}
    .margin-high{color:#16a34a !important}
    .margin-mid{color:#d97706 !important}
    .margin-low{color:#dc2626 !important}
    .ip-ship-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700}
    .ip-ship-tag.included{background:#dcfce7;color:#166534}
    .ip-ship-tag.excluded{background:#fee2e2;color:#991b1b}

    /* Auxiliary: KPI 그리드 */
    .ip-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .ip-kpi{padding:12px;border-radius:10px;background:rgba(0,0,0,.02)}
    .ip-kpi .ipk-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
    .ip-kpi .ipk-value{font-size:14px;font-weight:800;color:var(--item);font-variant-numeric:tabular-nums}
    .ip-kpi .ipk-value.red{color:var(--bad)}
    .ip-kpi .ipk-value.green{color:var(--accent)}

    /* Related: 탭 */
    .ip-tabs{display:flex;gap:4px;margin-bottom:14px}
    .ip-tab{padding:7px 16px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
    .ip-tab:hover{color:var(--text);border-color:#cbd5e1}
    .ip-tab.active{color:#fff;background:var(--item);border-color:var(--item)}
    /* 상세 히스토리 테이블 */
    .ip-history{margin-top:8px}
    .ip-history-title{font-size:11px;font-weight:700;color:var(--item);margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .ip-history table{width:100%;border-collapse:collapse;font-size:11px}
    .ip-history th{background:#f8fafc;color:var(--muted);padding:6px 8px;text-align:left;border-bottom:1px solid var(--line);font-size:10px}
    .ip-history th.r{text-align:right}
    .ip-history td{padding:6px 8px;border-bottom:1px solid var(--line)}
    .ip-history td.r{text-align:right;font-variant-numeric:tabular-nums}
    .ip-deposit-badge{display:inline-block;padding:2px 6px;border-radius:999px;font-size:9px;font-weight:700}
    .ip-deposit-badge.paid{background:#dcfce7;color:#166534}
    .ip-deposit-badge.unpaid{background:#fee2e2;color:#991b1b}
    .ip-deposit-badge.active{background:#fef3c7;color:#92400e}
    /* v3.10: 폼 접힘 */
    .form-toggle-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .form-toggle-btn{background:var(--item);border:none;color:#fff;border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
    .form-toggle-btn:hover{background:#0e7490}
    .form-collapsed{display:none}
    /* v3.10: 마진율 색상 */
    .margin-high{color:#16a34a;font-weight:700}
    .margin-mid{color:#d97706;font-weight:700}
    .margin-low{color:#dc2626;font-weight:700}
    .margin-na{color:var(--muted)}
    /* 정규화 도구 */
    .norm-section{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .norm-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04);flex-wrap:wrap}
    .norm-item:last-child{border-bottom:none}
    .norm-name{font-weight:700;font-size:12px;min-width:120px}
    .norm-count{font-size:11px;color:var(--muted)}
    .norm-select{flex:1;min-width:140px}
    .norm-select select{padding:6px 8px;font-size:11px}
    .norm-actions{display:flex;gap:4px}
    .norm-actions button{padding:5px 10px;font-size:11px}
    .empty-msg{text-align:center;padding:40px;color:var(--muted);font-size:13px;display:none}
    /* Responsive */
    @media(max-width:900px){
      .kpi-grid{grid-template-columns:1fr 1fr}
      .r3{grid-template-columns:1fr 1fr}
      .ip-core-grid{grid-template-columns:1fr}
      .ip-kpi-grid{grid-template-columns:1fr 1fr}
      .ip-prices{grid-template-columns:1fr 1fr}
    }
    @media(max-width:600px){
      .r3{grid-template-columns:1fr}
      .r2{grid-template-columns:1fr}
      .ip-core-grid{grid-template-columns:1fr}
      .ip-kpi-grid{grid-template-columns:1fr 1fr}
      .ip-prices{grid-template-columns:1fr}
      .ip-zone{padding:12px 16px}
      .ip-hero{padding:16px}
      .filter-row{flex-direction:column;align-items:stretch}
    }
  </style>
</head>
<body>
<header>
  <div class="top">
    <h1>GoLab · 품목 조종석</h1>
    <nav class="tabs">
      <a class="tab" href="./console.html">🏠 메인</a>
      <a class="tab" href="./deals.html">🔥 거래</a>
      <a class="tab active" href="./item-master.html">🏷 품목</a>
      <a class="tab" href="./index.html">📦 재고</a>
      <a class="tab" href="./profit.html">💰 수익</a>
      <a class="tab" href="./partner-master.html">👥 거래처</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi" id="kpiTotal" title="전체 등록 품목">
      <div class="t">전체 품목</div>
      <div class="v" id="kTotal">0</div>
    </div>
    <div class="kpi" id="kpiLinked" title="거래에서 item_id가 연결된 품목">
      <div class="t">연결 거래</div>
      <div class="v" id="kLinked">0</div>
      <div class="sub" id="kLinkedSub"></div>
    </div>
    <div class="kpi" id="kpiUnlinked" title="거래에서 item_id 미연결 품목명">
      <div class="t">미연결 거래</div>
      <div class="v" id="kUnlinked">0</div>
      <div class="sub" id="kUnlinkedSub">클릭하여 정규화</div>
    </div>
  </div>

  <!-- v3.10: 폼 접힘 토글 -->
  <div class="form-toggle-bar" id="formToggleBar">
    <button class="form-toggle-btn" id="btnFormToggle">＋ 품목 등록</button>
  </div>

  <!-- 등록/수정 폼 (v3.10: 기본 접힘) -->
  <div class="card form-collapsed" id="formCard">
    <h2>➕ 품목 등록</h2>

    <div class="form-section-label">기본 정보</div>
    <div class="row r3">
      <div><label>품목명 *</label><input id="inName" placeholder="예: Ag Powder" /></div>
      <div><label>카테고리</label><select id="inCategory"><option value="원료">원료</option><option value="장비">장비</option><option value="일반상품" selected>일반상품</option></select></div>
      <div><label>단위 <span class="opt">(선택)</span></label><input id="inUnit" placeholder="EA, BOX, kg, L ..." /></div>
    </div>
    <div class="row r3">
      <div><label>규격 <span class="opt">(선택)</span></label><input id="inSpec" placeholder="예: 20um / 1kg" /></div>
      <div><label>매입처(참고) <span class="opt">(선택)</span></label><input id="inSupplier" placeholder="예: 일본/TANAKA" /></div>
      <div><label>별칭 <span class="opt">(콤마 구분)</span></label><input id="inAliases" placeholder="은분말, silver powder" /></div>
    </div>

    <div class="form-section-label">가격 전략 <span class="opt">(선택 입력)</span></div>
    <div class="row r3">
      <div><label>소비자가 (RRP)</label><input id="inRrpPrice" type="number" placeholder="원" /></div>
      <div><label>딜러가</label><input id="inDealerPrice" type="number" placeholder="원" /></div>
      <div><label>목표매입가</label><input id="inTargetBuyPrice" type="number" placeholder="원" /></div>
    </div>
    <div class="row r3">
      <div>
        <label>택배비 조건</label>
        <div class="chk-row">
          <input type="checkbox" id="inShippingIncluded" />
          <span>기본 택배비 포함</span>
        </div>
      </div>
      <div></div>
      <div></div>
    </div>

    <div class="form-section-label">메모</div>
    <div class="row r2">
      <div><label>택배비 메모 <span class="opt">(선택)</span></label><input id="inShippingNote" placeholder="예: 3만원이상 무료배송" /></div>
      <div><label>비고 <span class="opt">(선택)</span></label><textarea id="inNote" placeholder="전략 메모, 특이사항"></textarea></div>
    </div>

    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="save" id="btnSave">등록</button>
      <button id="btnCancel" style="display:none">취소</button>
      <button id="btnClear" style="margin-left:auto">초기화</button>
    </div>
  </div>

  <!-- 정규화 도구 (기본 숨김) -->
  <div class="norm-section" id="normSection" style="display:none">
    <h2 style="margin:0 0 12px;font-size:13px;color:var(--item);display:flex;align-items:center;gap:8px">
      🔗 미연결 품목 정규화
      <button id="normClose" style="margin-left:auto;padding:4px 10px;font-size:11px">닫기</button>
    </h2>
    <div id="normBody"></div>
    <div id="normEmpty" class="empty-msg" style="padding:20px">모든 거래 품목이 연결되어 있습니다.</div>
  </div>

  <!-- 검색 + 필터 -->
  <div class="search-bar">
    <input id="fSearch" placeholder="품목명, 별칭, 메모, 매입처, 판매처로 검색..." style="max-width:420px" />
  </div>
  <div class="filter-row" id="filterRow">
    <button class="filter-chip active" data-cat="all">전체</button>
    <button class="filter-chip" data-cat="원료">원료</button>
    <button class="filter-chip" data-cat="장비">장비</button>
    <button class="filter-chip" data-cat="일반상품">일반상품</button>
    <span style="width:1px;height:20px;background:var(--line);margin:0 4px"></span>
    <button class="filter-chip" id="fHasTrade" data-toggle="trade">거래 있음</button>
    <button class="filter-chip" id="fHasStock" data-toggle="stock">재고 있음</button>
  </div>

  <!-- 리스트 -->
  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>품목명</th>
          <th>카테고리</th>
          <th class="r">주 매입처</th>
          <th class="r">최근 매입가</th>
          <th class="r">주 판매처</th>
          <th class="r">최근 판매가</th>
          <th class="r">마진율</th>
          <th>최근 거래일</th>
          <th class="r">거래</th>
          <th class="r">총매출</th>
          <th>재고</th>
          <th style="text-align:right">액션</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="empty-msg" id="emptyMsg">등록된 품목이 없습니다.</div>
  <div style="margin-top:8px;font-size:11px;color:var(--muted)">총 <b id="listBadge">0</b>건</div>
</div>

<!-- 엔진 로드 -->
<script src="js/item-master.js?v=312"></script>
<script src="js/partner-master.js"></script>
<script src="js/trade-engine.js?v=312"></script>
<script>
/* ══════════════════════════════════════
   GoLab v3.10 — 품목 조종석 페이지
   ══════════════════════════════════════ */
"use strict";

var $ = function(id){ return document.getElementById(id); };
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtW(v){ return "\u20a9" + Math.round(v).toLocaleString(); }
function fmtN(v){ return Math.round(v).toLocaleString(); }

/* ── 상태 변수 ── */
var editingId = null;
var _expandedId = null;
var _detailTab = "buyers";
var _filterCat = "all";
var _filterTrade = false;
var _filterStock = false;
var _quickStats = null;
var _invMap = null;
var _normHidden = {};

/* ══════════════════════════════════════
   KPI 계산
   ══════════════════════════════════════ */
function computeKPI(){
  var all = GoLabItemMaster.loadAll();
  $("kTotal").textContent = all.length;
  var trades = [];
  try { trades = JSON.parse(localStorage.getItem("golab_trade_v2") || "[]"); } catch(e) {}
  var linkedIds = {};
  var unlinkedCount = 0;
  trades.forEach(function(deal){
    if(deal.deal_status === "cancelled") return;
    (deal.items || []).forEach(function(it){
      if(it.item_id) linkedIds[it.item_id] = true;
      else if((it.name||"").trim()) unlinkedCount++;
    });
  });
  $("kLinked").textContent = Object.keys(linkedIds).length;
  $("kLinkedSub").textContent = "품목 수";
  $("kUnlinked").textContent = unlinkedCount;
}

/* ══════════════════════════════════════
   성능 최적화: 전 품목 요약 1회 스캔
   ══════════════════════════════════════ */
function _buildQuickStats(){
  var trades = [];
  try { trades = JSON.parse(localStorage.getItem("golab_trade_v2") || "[]"); } catch(e) {}
  /* 거래처 타입 캐시 */
  var pTypeCache = {};
  function getPType(pid){
    if(!pid) return "매출처";
    if(pTypeCache[pid] !== undefined) return pTypeCache[pid];
    var t = "매출처";
    try {
      if(window.GoLabPartnerMaster){
        var pAll = GoLabPartnerMaster.loadAll();
        for(var i=0;i<pAll.length;i++){
          if(pAll[i].partner_id === pid){ t = pAll[i].type || "매출처"; break; }
        }
      }
    } catch(e){}
    pTypeCache[pid] = t;
    return t;
  }

  var map = {};
  trades.forEach(function(deal){
    /* v3.12: 취소 거래 필터 */
    if(deal.deal_status === "cancelled" || deal.is_canceled === true) return;
    var pName = deal.partner_name_snapshot || "";
    var pType = getPType(deal.partner_id);
    var dt = deal.deal_date || (deal.quote_at || deal.created_at || "").substring(0,10);
    /* trade-engine 활용 */
    var calc = deal._calc;
    if(!calc && window.TE && TE.calcTrade) try { calc = TE.calcTrade(deal); } catch(e){}

    (deal.items || []).forEach(function(it){
      if(!it.item_id) return;
      if(!map[it.item_id]) map[it.item_id] = {
        buyers:{}, sellers:{}, lastDate:"",
        lastBuyPrice:0, lastSellPrice:0,
        topBuyer:"", topSeller:"",
        txCount:0, totalRevenue:0, totalProfit:0
      };
      var s = map[it.item_id];
      s.txCount++;
      if(dt > s.lastDate) s.lastDate = dt;
      var price = Number(it.unit_price) || 0;
      var cost = Number(it.cost) || 0;
      var qty = Number(it.qty) || 0;
      var supplyAmt = Number(it.supply_amount) || (qty * price);
      s.totalRevenue += supplyAmt;
      s.totalProfit += (supplyAmt - cost * qty);

      if(pType === "매입처"){
        var bKey = deal.partner_id || pName;
        if(!s.buyers[bKey]) s.buyers[bKey] = { name:pName, count:0, lastPrice:0, lastDate:"" };
        s.buyers[bKey].count++;
        if(dt > s.buyers[bKey].lastDate){ s.buyers[bKey].lastDate = dt; s.buyers[bKey].lastPrice = price || cost; }
        s.lastBuyPrice = price || cost;
      } else {
        var sKey = deal.partner_id || pName;
        if(!s.sellers[sKey]) s.sellers[sKey] = { name:pName, count:0, lastPrice:0, lastDate:"" };
        s.sellers[sKey].count++;
        if(dt > s.sellers[sKey].lastDate){ s.sellers[sKey].lastDate = dt; s.sellers[sKey].lastPrice = price; }
        s.lastSellPrice = price;
      }
    });
  });

  /* topBuyer/topSeller 산출 */
  Object.keys(map).forEach(function(id){
    var s = map[id];
    var topB = "", topBC = 0;
    Object.keys(s.buyers).forEach(function(k){ if(s.buyers[k].count > topBC){ topBC = s.buyers[k].count; topB = s.buyers[k].name; s.lastBuyPrice = s.buyers[k].lastPrice; }});
    s.topBuyer = topB;
    var topS = "", topSC = 0;
    Object.keys(s.sellers).forEach(function(k){ if(s.sellers[k].count > topSC){ topSC = s.sellers[k].count; topS = s.sellers[k].name; s.lastSellPrice = s.sellers[k].lastPrice; }});
    s.topSeller = topS;
  });
  _quickStats = map;
  return map;
}

function _buildInvMap(){
  var inv = [];
  try { inv = JSON.parse(localStorage.getItem("golab_inventory_v01") || "[]"); } catch(e) {}
  var m = {};
  inv.forEach(function(it){ var iid = it.item_id || it.id; if(iid) m[iid] = { qty: Number(it.qty)||0 }; });
  _invMap = m;
  return m;
}

function catClass(cat){
  if(cat === "원료") return "raw";
  if(cat === "장비") return "equip";
  return "general";
}

/* ══════════════════════════════════════
   렌더링
   ══════════════════════════════════════ */
function render(){
  var all = GoLabItemMaster.loadAll();
  var q = ($("fSearch").value||"").trim();
  /* v3.10: 통합 검색 — item-master.js search() + 주 매입처/판매처 추가 필터 */
  var filtered;
  if(q){
    var baseResult = GoLabItemMaster.search(q);
    var baseIds = {};
    baseResult.forEach(function(it){ baseIds[it.item_id] = true; });
    /* 매입처/판매처는 quickStats에서 추가 검색 */
    if(!_quickStats) _buildQuickStats();
    var ql = q.toLowerCase();
    var extraFromStats = all.filter(function(it){
      if(baseIds[it.item_id]) return false; /* 이미 포함 */
      var qs = _quickStats[it.item_id];
      if(!qs) return false;
      return (qs.topBuyer || "").toLowerCase().indexOf(ql) >= 0 ||
             (qs.topSeller || "").toLowerCase().indexOf(ql) >= 0;
    });
    filtered = baseResult.concat(extraFromStats);
  } else {
    filtered = all;
  }
  if(_filterCat !== "all") filtered = filtered.filter(function(it){ return it.category === _filterCat; });
  if(!_quickStats) _buildQuickStats();
  if(!_invMap) _buildInvMap();
  if(_filterTrade) filtered = filtered.filter(function(it){ return !!_quickStats[it.item_id]; });
  if(_filterStock) filtered = filtered.filter(function(it){ var inv = _invMap[it.item_id]; return inv && inv.qty > 0; });

  $("listBadge").textContent = filtered.length;
  var tb = $("tbody");
  if(filtered.length === 0){ tb.innerHTML = ""; $("emptyMsg").style.display = "block"; return; }
  $("emptyMsg").style.display = "none";

  var html = "";
  filtered.forEach(function(item, i){
    var qs = _quickStats[item.item_id] || {};
    var inv = _invMap[item.item_id];
    /* v3.10: 마진율 계산 — (판매가-매입가)/판매가×100 */
    var marginHtml = '<span class="margin-na">—</span>';
    if(qs.lastSellPrice > 0 && qs.lastBuyPrice > 0){
      var marginPct = (qs.lastSellPrice - qs.lastBuyPrice) / qs.lastSellPrice * 100;
      var mClass = marginPct >= 20 ? "margin-high" : (marginPct >= 10 ? "margin-mid" : "margin-low");
      marginHtml = '<span class="' + mClass + '">' + marginPct.toFixed(1) + '%</span>';
    }
    html += '<tr>' +
      '<td class="muted">' + (i+1) + '</td>' +
      '<td><b>' + esc(item.item_name) + '</b>' + (item.unit ? ' <span class="muted" style="font-size:10px">(' + esc(item.unit) + ')</span>' : '') + '</td>' +
      '<td><span class="cat-badge ' + catClass(item.category) + '">' + esc(item.category) + '</span></td>' +
      '<td class="r muted">' + esc(qs.topBuyer || "—") + '</td>' +
      '<td class="r">' + (qs.lastBuyPrice ? fmtW(qs.lastBuyPrice) : '<span class="muted">—</span>') + '</td>' +
      '<td class="r muted">' + esc(qs.topSeller || "—") + '</td>' +
      '<td class="r">' + (qs.lastSellPrice ? fmtW(qs.lastSellPrice) : '<span class="muted">—</span>') + '</td>' +
      '<td class="r">' + marginHtml + '</td>' +
      '<td class="muted">' + esc(qs.lastDate || "—") + '</td>' +
      '<td class="r">' + (qs.txCount ? qs.txCount + '건' : '<span class="muted">—</span>') + '</td>' +
      '<td class="r">' + (qs.totalRevenue ? fmtW(qs.totalRevenue) : '<span class="muted">—</span>') + '</td>' +
      '<td>' + (inv && inv.qty > 0 ? '<span style="color:var(--accent);font-weight:700">' + fmtN(inv.qty) + '</span>' : '<span class="muted">—</span>') + '</td>' +
      '<td style="text-align:right;white-space:nowrap">' +
        '<button class="secondary" style="padding:5px 8px;font-size:11px" data-detail="' + item.item_id + '">상세</button> ' +
        '<button class="secondary" style="padding:5px 8px;font-size:11px" data-edit="' + item.item_id + '">수정</button> ' +
        '<button class="danger" style="padding:5px 8px;font-size:11px" data-del="' + item.item_id + '">삭제</button>' +
      '</td></tr>';
    if(_expandedId === item.item_id) html += buildItemStatusPanel(item);
  });
  tb.innerHTML = html;

  /* 이벤트 바인딩 */
  tb.querySelectorAll("button[data-detail]").forEach(function(b){ b.onclick = function(){ toggleDetail(b.dataset.detail); }; });
  tb.querySelectorAll("button[data-edit]").forEach(function(b){ b.onclick = function(){ startEdit(b.dataset.edit); }; });
  tb.querySelectorAll("button[data-del]").forEach(function(b){ b.onclick = function(){ deleteItem(b.dataset.del); }; });
  tb.querySelectorAll(".ip-tab").forEach(function(t){ t.onclick = function(){ _detailTab = t.dataset.tab; render(); }; });
}

/* ══════════════════════════════════════
   상세 패널 빌드
   ══════════════════════════════════════ */
function buildItemStatusPanel(item){
  var stats = GoLabItemMaster.calcItemStats(item.item_id);
  var inv = _invMap[item.item_id];

  var html = '<tr class="detail-row"><td colspan="13"><div class="ip-panel">';

  /* ═══ Hero 섹션 (v3.10 개선) ═══ */
  var qs = _quickStats[item.item_id] || {};
  html += '<div class="ip-hero">';
  html += '<div class="ip-hero-top">';
  html += '<span class="ip-name">' + esc(item.item_name) + '</span>';
  html += '<span class="cat-badge ' + catClass(item.category) + '">' + esc(item.category) + '</span>';
  if(item.unit) html += '<span class="ip-unit">' + esc(item.unit) + '</span>';
  /* v3.10: Hero 마진율 배지 */
  if(qs.lastSellPrice > 0 && qs.lastBuyPrice > 0){
    var heroMargin = (qs.lastSellPrice - qs.lastBuyPrice) / qs.lastSellPrice * 100;
    var heroMCls = heroMargin >= 20 ? "margin-high" : (heroMargin >= 10 ? "margin-mid" : "margin-low");
    html += '<span class="' + heroMCls + '" style="font-size:14px;margin-left:8px">마진 ' + heroMargin.toFixed(1) + '%</span>';
  }
  html += '</div>';
  /* Hero 메타 정보 (한줄 요약) */
  html += '<div class="ip-hero-meta">';
  if(item.spec) html += '<span><b>규격</b> ' + esc(item.spec) + '</span>';
  if(inv) html += '<span><b>재고</b> ' + fmtN(inv.qty) + '</span>';
  html += '<span><b>등록</b> ' + (item.created_at ? item.created_at.substring(0,10) : "—") + '</span>';
  if(stats.totalTxCount > 0) html += '<span><b>거래</b> ' + stats.totalTxCount + '건</span>';
  if(qs.topBuyer) html += '<span><b>주 매입처</b> ' + esc(qs.topBuyer) + '</span>';
  if(qs.topSeller) html += '<span><b>주 판매처</b> ' + esc(qs.topSeller) + '</span>';
  html += '</div>';
  html += '</div>';

  /* ═══ Core 존: 기본정보 + 기준가격 (2-column) ═══ */
  html += '<div class="ip-zone">';

  /* 기본정보 블록 */
  var hasInfo = (item.aliases && item.aliases.length > 0) || item.supplier || item.note;

  /* v3.12: 전략 가격 블록 (3종) + 참고 정보 (파생) */
  var strategyLabels = {
    rrp_price: "소비자가 (RRP)",
    dealer_price: "딜러가",
    target_buy_price: "목표매입가"
  };
  /* legacy consumer_price 호환: rrp_price 없으면 consumer_price 참조 */
  var _rrpVal = (item.rrp_price != null) ? item.rrp_price : (item.consumer_price || null);
  var strategyValues = {
    rrp_price: _rrpVal,
    dealer_price: item.dealer_price || null,
    target_buy_price: item.target_buy_price || null
  };
  var hasPrices = false;
  var priceHtml = '';
  Object.keys(strategyLabels).forEach(function(f){
    var v = strategyValues[f];
    if(v !== null && v !== undefined && v !== 0){
      hasPrices = true;
      priceHtml += '<div class="ip-price-item"><div class="pp-label">' + strategyLabels[f] + '</div><div class="pp-value">' + fmtW(v) + '</div></div>';
    }
  });
  /* 파생 데이터: 최근 판매가 / 최근 매입가 */
  var derivedHtml = '';
  if (stats.lastSellPrice || stats.lastBuyPrice) {
    derivedHtml += '<div class="ip-derived-sep"></div>';
    if (stats.lastSellPrice) {
      derivedHtml += '<div class="ip-price-item ip-derived"><div class="pp-label">최근 판매가</div><div class="pp-value">' + fmtW(stats.lastSellPrice) + '</div></div>';
    }
    if (stats.lastBuyPrice) {
      derivedHtml += '<div class="ip-price-item ip-derived"><div class="pp-label">최근 매입가</div><div class="pp-value">' + fmtW(stats.lastBuyPrice) + '</div></div>';
    }
    /* 마진율 표시 */
    if (stats.lastSellPrice && stats.lastBuyPrice) {
      var _mr = ((stats.lastSellPrice - stats.lastBuyPrice) / stats.lastSellPrice * 100).toFixed(1);
      var _mrCls = _mr >= 20 ? "margin-high" : (_mr >= 10 ? "margin-mid" : "margin-low");
      derivedHtml += '<div class="ip-price-item ip-derived"><div class="pp-label">마진율</div><div class="pp-value ' + _mrCls + '">' + _mr + '%</div></div>';
    }
    hasPrices = true;
  }
  /* 택배 조건 */
  if(item.shipping_included_default || item.shipping_note){
    hasPrices = true;
    priceHtml += '<div class="ip-price-item"><div class="pp-label">택배비</div><div class="pp-value" style="font-size:12px">';
    priceHtml += '<span class="ip-ship-tag ' + (item.shipping_included_default ? 'included' : 'excluded') + '">' + (item.shipping_included_default ? '포함' : '별도') + '</span>';
    if(item.shipping_note) priceHtml += ' <span style="font-size:11px;color:var(--muted)">' + esc(item.shipping_note) + '</span>';
    priceHtml += '</div></div>';
  }

  if(hasInfo || hasPrices){
    html += '<div class="ip-core-grid">';
    /* 좌측: 기본정보 */
    if(hasInfo){
      html += '<div class="ip-info-block">';
      html += '<div class="ip-zone-title">기본 정보</div>';
      if(item.aliases && item.aliases.length > 0){
        html += '<div class="ip-field"><span class="ip-field-label">별칭</span><span class="ip-field-value">' + esc(item.aliases.join(", ")) + '</span></div>';
      }
      if(item.supplier){
        html += '<div class="ip-field"><span class="ip-field-label">매입처(참고)</span><span class="ip-field-value">' + esc(item.supplier) + '</span></div>';
      }
      if(item.note){
        html += '<div class="ip-field"><span class="ip-field-label">전략 메모</span><span class="ip-field-value">' + esc(item.note) + '</span></div>';
      }
      html += '</div>';
    }
    /* 우측: 기준 가격 */
    if(hasPrices){
      html += '<div>';
      html += '<div class="ip-zone-title">가격 전략</div>';
      html += '<div class="ip-prices">' + priceHtml + derivedHtml + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  /* ═══ Auxiliary 존: KPI 실적 ═══ */
  html += '<div class="ip-zone">';
  html += '<div class="ip-zone-title">거래 실적</div>';
  html += '<div class="ip-kpi-grid">';
  html += '<div class="ip-kpi"><div class="ipk-label">첫 거래</div><div class="ipk-value" style="font-size:12px">' + esc(stats.firstDate || "—") + '</div></div>';
  html += '<div class="ip-kpi"><div class="ipk-label">최근 거래</div><div class="ipk-value" style="font-size:12px">' + esc(stats.lastDate || "—") + '</div></div>';
  html += '<div class="ip-kpi"><div class="ipk-label">총 매출</div><div class="ipk-value">' + fmtW(stats.totalRevenue) + '</div></div>';
  html += '<div class="ip-kpi"><div class="ipk-label">총 비용</div><div class="ipk-value">' + fmtW(stats.totalCost) + '</div></div>';
  html += '<div class="ip-kpi"><div class="ipk-label">총 순이익</div><div class="ipk-value ' + (stats.totalProfit >= 0 ? 'green' : 'red') + '">' + fmtW(stats.totalProfit) + '</div></div>';
  html += '<div class="ip-kpi"><div class="ipk-label">내 몫 합계</div><div class="ipk-value">' + fmtW(stats.totalMyShare) + '</div></div>';
  html += '<div class="ip-kpi"><div class="ipk-label">S 지급액</div><div class="ipk-value">' + fmtW(stats.totalSPaid) + '</div></div>';
  html += '</div>';
  html += '</div>';

  /* ═══ Related 존: 거래 이력 탭 ═══ */
  html += '<div class="ip-zone">';
  html += '<div class="ip-zone-title">거래 이력</div>';
  html += '<div class="ip-tabs">';
  html += '<button class="ip-tab' + (_detailTab==="buyers"?" active":"") + '" data-tab="buyers">📦 매입처 비교</button>';
  html += '<button class="ip-tab' + (_detailTab==="sellers"?" active":"") + '" data-tab="sellers">💰 판매처</button>';
  html += '<button class="ip-tab' + (_detailTab==="history"?" active":"") + '" data-tab="history">📋 전체 이력</button>';
  html += '</div>';

  if(_detailTab === "buyers") html += _renderBuyersTab(stats);
  else if(_detailTab === "sellers") html += _renderSellersTab(stats);
  else html += _renderHistoryTab(stats);

  html += '</div>';

  html += '</div></td></tr>';
  return html;
}

/* ── 매입처 비교 / 매입 이력 탭 ── */
function _renderBuyersTab(stats){
  var html = '';
  /* 매입처 비교 */
  if(stats.buyers.length > 0){
    html += '<div class="ip-history"><div class="ip-history-title">📦 매입처 비교 (단가 낮은 순)</div>';
    var sorted = stats.buyers.slice().sort(function(a,b){ return (a.lastPrice||Infinity) - (b.lastPrice||Infinity); });
    html += '<table><thead><tr><th>거래처</th><th class="r">최근 단가</th><th>최근 매입일</th><th class="r">건수</th><th class="r">총 수량</th><th>최저가</th></tr></thead><tbody>';
    sorted.forEach(function(b, i){
      html += '<tr><td><b>' + esc(b.name || "—") + '</b></td>';
      html += '<td class="r">' + (b.lastPrice ? fmtW(b.lastPrice) : '—') + '</td>';
      html += '<td class="muted">' + esc(b.lastDate || "—") + '</td>';
      html += '<td class="r">' + b.txCount + '</td>';
      html += '<td class="r">' + fmtN(b.totalQty) + '</td>';
      html += '<td>' + (i === 0 && b.lastPrice > 0 ? '<span style="color:var(--accent);font-weight:700">\u2713 최저가</span>' : '') + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  /* 매입 이력 (최근 거래에서 매입처 건만) */
  var buyDeals = stats.recentTrades.filter(function(t){ return t.partner_type === "매입처"; });
  if(buyDeals.length > 0){
    html += '<div class="ip-history" style="margin-top:14px"><div class="ip-history-title">📋 매입 이력 (최근)</div>';
    html += '<table><thead><tr><th>날짜</th><th>매입처</th><th class="r">실제 매입가</th><th class="r">수량</th><th>메모</th></tr></thead><tbody>';
    buyDeals.forEach(function(t){
      var it = t.items[0] || {};
      html += '<tr><td class="muted">' + esc(t.date) + '</td>';
      html += '<td><b>' + esc(t.partner_name) + '</b></td>';
      html += '<td class="r">' + fmtW(Number(it.unit_price)||Number(it.cost)||0) + '</td>';
      html += '<td class="r">' + fmtN(Number(it.qty)||0) + '</td>';
      html += '<td class="muted">' + esc(it.memo || "") + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  if(stats.buyers.length === 0 && buyDeals.length === 0){
    html += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">매입처 거래 기록이 없습니다.</div>';
  }
  return html;
}

/* ── 판매처 / 판매 이력 탭 ── */
function _renderSellersTab(stats){
  var html = '';
  /* 판매처 요약 */
  if(stats.sellers.length > 0){
    html += '<div class="ip-history"><div class="ip-history-title">💰 판매처 이력</div>';
    html += '<table><thead><tr><th>거래처</th><th class="r">최근 판매가</th><th>최근 판매일</th><th class="r">건수</th><th class="r">총 수량</th></tr></thead><tbody>';
    stats.sellers.forEach(function(s){
      html += '<tr><td><b>' + esc(s.name || "—") + '</b></td>';
      html += '<td class="r">' + (s.lastPrice ? fmtW(s.lastPrice) : '—') + '</td>';
      html += '<td class="muted">' + esc(s.lastDate || "—") + '</td>';
      html += '<td class="r">' + s.txCount + '</td>';
      html += '<td class="r">' + fmtN(s.totalQty) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  /* 판매 이력 (최근 거래에서 매출처 건만) */
  var sellDeals = stats.recentTrades.filter(function(t){ return t.partner_type !== "매입처"; });
  if(sellDeals.length > 0){
    html += '<div class="ip-history" style="margin-top:14px"><div class="ip-history-title">📋 판매 이력 (최근)</div>';
    html += '<table><thead><tr><th>날짜</th><th>고객사</th><th class="r">실제 판매가</th><th class="r">수량</th><th class="r">매출액</th><th>상태</th></tr></thead><tbody>';
    sellDeals.forEach(function(t){
      var it = t.items[0] || {};
      var statusLabel = "진행";
      var statusClass = "active";
      if(t.deal_status === "completed"){ statusLabel = "완료"; statusClass = "paid"; }
      else if(t.payment_at){ statusLabel = "입금"; statusClass = "paid"; }
      html += '<tr><td class="muted">' + esc(t.date) + '</td>';
      html += '<td><b>' + esc(t.partner_name) + '</b></td>';
      html += '<td class="r">' + fmtW(Number(it.unit_price)||0) + '</td>';
      html += '<td class="r">' + fmtN(Number(it.qty)||0) + '</td>';
      html += '<td class="r"><b>' + fmtW(t.supply_amount) + '</b></td>';
      html += '<td><span class="ip-deposit-badge ' + statusClass + '">' + statusLabel + '</span></td></tr>';
    });
    html += '</tbody></table></div>';
  }
  if(stats.sellers.length === 0 && sellDeals.length === 0){
    html += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">판매처 거래 기록이 없습니다.</div>';
  }
  return html;
}

/* ── 전체 거래 이력 탭 ── */
function _renderHistoryTab(stats){
  if(stats.recentTrades.length === 0){
    return '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">거래 기록이 없습니다.</div>';
  }
  var html = '<div class="ip-history"><div class="ip-history-title">📋 전체 거래 이력 (최근 10건)</div>';
  html += '<table><thead><tr><th>날짜</th><th>거래처</th><th>구분</th><th class="r">수량</th><th class="r">단가</th><th class="r">금액</th><th>상태</th></tr></thead><tbody>';
  stats.recentTrades.forEach(function(t){
    var typeLabel = (t.partner_type === "매입처") ? "매입" : "매출";
    var typeBg = (t.partner_type === "매입처") ? "rgba(37,99,235,.1)" : "rgba(217,119,6,.1)";
    var typeColor = (t.partner_type === "매입처") ? "#1d4ed8" : "#92400e";
    var it = t.items[0] || {};
    var statusLabel = "진행"; var statusClass = "active";
    if(t.deal_status === "completed"){ statusLabel = "완료"; statusClass = "paid"; }
    else if(t.payment_at){ statusLabel = "입금"; statusClass = "paid"; }
    html += '<tr><td class="muted">' + esc(t.date) + '</td>';
    html += '<td><b>' + esc(t.partner_name) + '</b></td>';
    html += '<td><span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:' + typeBg + ';color:' + typeColor + '">' + typeLabel + '</span></td>';
    html += '<td class="r">' + fmtN(Number(it.qty)||0) + '</td>';
    html += '<td class="r">' + fmtW(Number(it.unit_price)||0) + '</td>';
    html += '<td class="r"><b>' + fmtW(t.supply_amount) + '</b></td>';
    html += '<td><span class="ip-deposit-badge ' + statusClass + '">' + statusLabel + '</span></td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ══════════════════════════════════════
   토글 / CRUD
   ══════════════════════════════════════ */
function toggleDetail(itemId){
  if(_expandedId === itemId){ _expandedId = null; }
  else { _expandedId = itemId; _detailTab = "buyers"; }
  render();
}

function saveItem(){
  var name = $("inName").value.trim();
  if(!name){ alert("품목명을 입력해주세요."); $("inName").focus(); return; }
  var aliasRaw = $("inAliases").value;
  var aliases = aliasRaw ? aliasRaw.split(",").map(function(s){ return s.trim(); }).filter(Boolean) : [];
  var fields = {
    item_name: name,
    category:  $("inCategory").value,
    unit:      $("inUnit").value,
    spec:      $("inSpec").value,
    supplier:  $("inSupplier").value,
    aliases:   aliases,
    note:      $("inNote").value,
    /* v3.12: 전략 가격 3종 */
    rrp_price:          $("inRrpPrice").value,
    dealer_price:       $("inDealerPrice").value,
    target_buy_price:   $("inTargetBuyPrice").value,
    /* 택배 조건 */
    shipping_included_default: $("inShippingIncluded").checked,
    shipping_note: $("inShippingNote").value
  };
  try {
    if(editingId) GoLabItemMaster.update(editingId, fields);
    else GoLabItemMaster.create(fields);
    clearForm();
    /* v3.10: 등록 완료 후 자동 접힘 */
    _collapseForm();
    _quickStats = null;
    computeKPI();
    render();
  } catch(err){ alert("저장 실패: " + err.message); }
}

function startEdit(itemId){
  var item = GoLabItemMaster.getById(itemId);
  if(!item) return;
  editingId = item.item_id;
  $("inName").value     = item.item_name || "";
  $("inCategory").value = item.category || "일반상품";
  $("inUnit").value     = item.unit || "";
  $("inSpec").value     = item.spec || "";
  $("inSupplier").value = item.supplier || "";
  $("inAliases").value  = (item.aliases || []).join(", ");
  $("inNote").value     = item.note || "";
  /* v3.12: 전략 가격 3종 (rrp_price, legacy consumer_price 호환) */
  $("inRrpPrice").value          = (item.rrp_price != null) ? item.rrp_price : (item.consumer_price != null ? item.consumer_price : "");
  $("inDealerPrice").value       = (item.dealer_price != null) ? item.dealer_price : "";
  $("inTargetBuyPrice").value    = (item.target_buy_price != null) ? item.target_buy_price : "";
  $("inShippingIncluded").checked = !!item.shipping_included_default;
  $("inShippingNote").value      = item.shipping_note || "";
  $("btnSave").textContent = "수정 저장";
  $("btnCancel").style.display = "inline-block";
  $("formCard").querySelector("h2").innerHTML = "✏️ 품목 수정";
  /* v3.10: 수정 시 폼 자동 펼침 */
  _expandForm();
  window.scrollTo({top:0, behavior:"smooth"});
}

function deleteItem(itemId){
  var item = GoLabItemMaster.getById(itemId);
  if(!item) return;
  if(!confirm('"' + item.item_name + '" 품목을 삭제하시겠습니까?')) return;
  GoLabItemMaster.remove(itemId);
  if(_expandedId === itemId) _expandedId = null;
  _quickStats = null;
  computeKPI();
  render();
}

function clearForm(){
  $("inName").value = ""; $("inCategory").value = "일반상품"; $("inUnit").value = "";
  $("inSpec").value = ""; $("inSupplier").value = ""; $("inAliases").value = "";
  $("inNote").value = "";
  /* v3.12: 전략 가격 3종 */
  $("inRrpPrice").value = ""; $("inDealerPrice").value = ""; $("inTargetBuyPrice").value = "";
  $("inShippingIncluded").checked = false; $("inShippingNote").value = "";
  editingId = null;
  $("btnSave").textContent = "등록";
  $("btnCancel").style.display = "none";
  $("formCard").querySelector("h2").innerHTML = "➕ 품목 등록";
  /* v3.10: 취소 시 폼 접힘 */
  _collapseForm();
}

/* ══════════════════════════════════════
   정규화 도구
   ══════════════════════════════════════ */
function renderNormSection(){
  var groups = GoLabItemMaster.extractUnlinkedItems();
  groups = groups.filter(function(g){ return !_normHidden[g.name.toLowerCase()]; });
  if(groups.length === 0){ $("normBody").innerHTML = ""; $("normEmpty").style.display = "block"; return; }
  $("normEmpty").style.display = "none";
  var html = "";
  groups.forEach(function(g, gi){
    html += '<div class="norm-item">';
    html += '<span class="norm-name">"' + esc(g.name) + '"</span>';
    html += '<span class="norm-count">(' + g.count + '건)</span>';
    html += '<div class="norm-select"><select id="normSel' + gi + '"><option value="">— 연결할 품목 선택 —</option>';
    g.candidates.forEach(function(c){ html += '<option value="' + esc(c.item_id) + '">' + esc(c.item_name) + (c.spec ? ' (' + esc(c.spec) + ')' : '') + '</option>'; });
    html += '</select></div>';
    html += '<div class="norm-actions">';
    html += '<button class="save" style="padding:5px 10px;font-size:11px" data-link="' + gi + '" data-name="' + esc(g.name) + '">연결</button>';
    html += '<button style="padding:5px 10px;font-size:11px" data-ignore="' + gi + '" data-name="' + esc(g.name) + '">무시</button>';
    html += '</div></div>';
  });
  $("normBody").innerHTML = html;
  $("normBody").querySelectorAll("button[data-link]").forEach(function(btn){
    btn.onclick = function(){
      var sel = $("normSel" + btn.dataset.link);
      if(!sel.value){ alert("연결할 품목을 선택해주세요."); return; }
      var result = GoLabItemMaster.linkItemToTrades(sel.value, btn.dataset.name);
      alert('"' + btn.dataset.name + '" \u2192 ' + result.linked + '건 연결 완료');
      _quickStats = null; computeKPI(); renderNormSection(); render();
    };
  });
  $("normBody").querySelectorAll("button[data-ignore]").forEach(function(btn){
    btn.onclick = function(){ _normHidden[btn.dataset.name.toLowerCase()] = true; renderNormSection(); };
  });
}

/* ══════════════════════════════════════
   v3.10: 폼 접힘/펼침
   ══════════════════════════════════════ */
function _expandForm(){
  $("formCard").classList.remove("form-collapsed");
  $("formToggleBar").style.display = "none";
}
function _collapseForm(){
  $("formCard").classList.add("form-collapsed");
  $("formToggleBar").style.display = "";
  /* 수정 모드 아닌 상태로 복원 */
  $("btnFormToggle").textContent = "＋ 품목 등록";
}
$("btnFormToggle").addEventListener("click", function(){
  _expandForm();
  $("inName").focus();
});

/* ══════════════════════════════════════
   이벤트 바인딩
   ══════════════════════════════════════ */
$("btnSave").addEventListener("click", saveItem);
$("btnCancel").addEventListener("click", clearForm);
$("btnClear").addEventListener("click", clearForm);
var _searchTimer = null;
$("fSearch").addEventListener("input", function(){ clearTimeout(_searchTimer); _searchTimer = setTimeout(render, 200); });
["inName","inUnit","inSpec","inSupplier","inAliases","inShippingNote"].forEach(function(id){
  $(id).addEventListener("keydown", function(e){ if(e.key==="Enter") saveItem(); });
});
$("filterRow").addEventListener("click", function(e){
  var chip = e.target.closest(".filter-chip");
  if(!chip) return;
  if(chip.dataset.cat){
    _filterCat = chip.dataset.cat;
    $("filterRow").querySelectorAll("[data-cat]").forEach(function(c){ c.classList.toggle("active", c.dataset.cat === _filterCat); });
    render();
  }
  if(chip.dataset.toggle === "trade"){ _filterTrade = !_filterTrade; chip.classList.toggle("active", _filterTrade); render(); }
  if(chip.dataset.toggle === "stock"){ _filterStock = !_filterStock; chip.classList.toggle("active", _filterStock); render(); }
});
$("kpiUnlinked").addEventListener("click", function(){
  var sec = $("normSection");
  if(sec.style.display === "none"){ sec.style.display = ""; renderNormSection(); } else { sec.style.display = "none"; }
});
$("normClose").addEventListener("click", function(){ $("normSection").style.display = "none"; });

/* Init */
computeKPI();
render();
</script>
</body>
</html>
