<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 거래 조종석</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--muted:#64748b;--text:#0f172a;
      --line:#e5e7eb;--accent:#16a34a;--warn:#d97706;--bad:#dc2626;--point:#2563eb;
      --chip:#f8fafc;--deal:#0891b2;--purple:#7c3aed;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial;}
    header{padding:0 20px;border-bottom:none;position:sticky;top:0;background:rgba(15,23,42,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:20;height:48px}
    header .top{display:flex;align-items:center;justify-content:space-between;gap:10px;height:100%}
    header h1{margin:0;font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
    .tabs{display:flex;gap:2px;flex-wrap:wrap;height:100%}
    .tab{display:inline-flex;align-items:center;padding:0 14px;height:100%;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:600;background:transparent;transition:color .2s,border-color .2s}
    .tab:hover{color:rgba(255,255,255,.85)}
    .tab.active{color:#fff;font-weight:800;border-bottom:2px solid #fff}
    .wrap{max-width:1440px;margin:0 auto;padding:16px 16px 36px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card h2{margin:0 0 12px;font-size:13px;color:var(--deal);display:flex;align-items:center;gap:8px}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .kpi{padding:14px;border-radius:10px;border:1px solid var(--line);background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .kpi .t{font-size:11px;color:var(--muted)}
    .kpi .v{margin-top:6px;font-size:24px;font-weight:600;color:var(--deal)}
    .kpi .sub{margin-top:4px;font-size:10px;color:var(--muted)}
    .kpi.warn .v{color:var(--bad)}

    /* Form */
    .row{display:grid;gap:10px;margin-bottom:10px}
    .r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:1fr 1fr 1fr 1fr}
    label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700}
    label .opt{font-weight:400;color:#94a3b8}
    input,select,textarea{width:100%;border-radius:10px;border:1px solid var(--line);background:var(--chip);color:var(--text);padding:9px 10px;font-size:12px;outline:none;transition:border .2s;box-sizing:border-box}
    input:focus,select:focus,textarea:focus{border-color:var(--deal)}
    input::placeholder,textarea::placeholder{color:#94a3b8}
    textarea{min-height:50px;resize:vertical}
    button{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:10px 14px;font-size:12px;cursor:pointer;font-weight:700}
    button:hover{border-color:#cbd5e1;background:#f8fafc}
    button.save{background:var(--deal);border:none;color:#fff}
    button.save:hover{background:#0e7490}
    button.danger{color:var(--bad);background:none;border:1px solid rgba(220,38,38,.3)}
    button.secondary{background:rgba(8,145,178,.06);border:1px solid rgba(8,145,178,.25);color:var(--deal)}

    /* 2-column 조종석 레이아웃 */
    .reg-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;margin-bottom:16px;align-items:start}
    .cockpit{position:sticky;top:64px;background:linear-gradient(135deg,#f0f9ff,#f8fafc);border:2px solid rgba(8,145,178,.25);border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(8,145,178,.08)}
    .cockpit h3{margin:0 0 12px;font-size:13px;font-weight:800;color:var(--deal);display:flex;align-items:center;gap:6px}
    .cockpit-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid rgba(8,145,178,.08)}
    .cockpit-row:last-child{border-bottom:none}
    .cockpit-row .lbl{color:var(--muted)}
    .cockpit-row .val{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
    .cockpit-row.highlight{background:rgba(8,145,178,.06);margin:0 -12px;padding:8px 12px;border-radius:8px;border-bottom:none;margin-top:4px}
    .cockpit-row.highlight .lbl{color:var(--deal);font-weight:700}
    .cockpit-row.highlight .val{color:var(--deal);font-size:16px;font-weight:800}
    .cockpit-divider{height:1px;background:rgba(8,145,178,.15);margin:8px 0}

    /* 섹션 헤더 */
    .sec-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
    .sec-num{width:24px;height:24px;border-radius:50%;background:var(--deal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
    .sec-title{font-size:12px;font-weight:700;color:var(--text)}

    /* 품목 테이블 */
    .item-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
    .item-table th{background:#f8fafc;color:var(--muted);text-align:left;padding:8px 6px;font-size:10px;font-weight:700;border-bottom:2px solid var(--line);white-space:nowrap}
    .item-table td{padding:6px;border-bottom:1px solid var(--line);vertical-align:middle}
    .item-table input{padding:7px 8px;border-radius:6px;font-size:11px}
    .item-table .sa{background:rgba(8,145,178,.04);font-weight:600;text-align:right;padding:7px 8px;border-radius:6px;border:1px solid var(--line);color:var(--deal);min-width:80px}
    .item-total{display:flex;gap:16px;font-size:12px;font-weight:600;padding:8px 0;color:var(--text)}

    /* v3.0 유형 배지 */
    .type-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;white-space:nowrap;max-width:180px}
    .type-badge.solo{background:rgba(22,163,74,.08);color:#15803d}
    .type-badge.settle{background:rgba(37,99,235,.08);color:#1d4ed8}
    .type-badge.channel{background:rgba(8,145,178,.08);color:#0e7490}
    .type-badge .ch-name{font-weight:400;opacity:.65;font-size:.9em;overflow:hidden;text-overflow:ellipsis;max-width:90px;display:inline-block;vertical-align:bottom}

    /* 예상몫 적용 버튼 */
    .btn-apply-est{padding:4px 8px;font-size:10px;border-radius:6px;background:rgba(8,145,178,.08);border:1px solid rgba(8,145,178,.2);color:var(--deal);cursor:pointer;font-weight:600;white-space:nowrap}
    .btn-apply-est:hover{background:rgba(8,145,178,.15)}

    /* 진행 바 */
    .progress-bar{display:flex;align-items:center;gap:0;margin:8px 0;overflow:hidden}
    .pb-wrap{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
    .pb-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;cursor:pointer;transition:all .2s;border:2px solid var(--line);background:#fff;color:var(--muted);position:relative}
    .pb-dot.done{background:var(--accent);border-color:var(--accent);color:#fff}
    .pb-dot.current{background:var(--deal);border-color:var(--deal);color:#fff;box-shadow:0 0 0 3px rgba(8,145,178,.2)}
    .pb-dot:hover{transform:scale(1.15)}
    .pb-line{flex:1;height:3px;background:var(--line);min-width:8px}
    .pb-line.done{background:var(--accent)}
    .pb-label{font-size:9px;color:var(--muted);text-align:center;margin-top:2px;white-space:nowrap}
    .pb-label.done{color:var(--accent);font-weight:700}
    .pb-label.current{color:var(--deal);font-weight:700}
    .pb-date{font-size:8px;color:var(--muted);margin-top:1px}

    /* 배지 */
    .badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:var(--deal);color:#fff;border-radius:99px;min-width:20px;height:20px;padding:0 6px;margin-left:6px}
    .tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-left:4px;vertical-align:middle}
    .tag-ch{background:rgba(37,99,235,.1);color:#1d4ed8}
    .tag-no-cost{background:rgba(100,116,139,.12);color:#475569}
    /* v3.0: owner-mine/owner-friend 폐기 */
    .status-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
    .st-new{background:#f1f5f9;color:#64748b}
    .st-complete{background:rgba(22,163,74,.1);color:#15803d}
    .st-cancelled{background:rgba(220,38,38,.08);color:#b91c1c;text-decoration:line-through}

    /* 상세 행 */
    .detail-row td{background:rgba(8,145,178,.02);padding:14px 16px;border-bottom:2px solid var(--line)}
    .detail-section{margin-bottom:14px}
    .detail-section-title{font-size:11px;font-weight:700;color:var(--deal);margin-bottom:8px}
    .amount-grid{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;align-items:center}
    .timeline{list-style:none;padding:0;margin:0}
    .timeline li{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:11px;color:var(--muted)}
    .timeline li .tl-dot{width:8px;height:8px;border-radius:50%;background:var(--deal);flex-shrink:0;margin-top:4px}
    .timeline li .tl-date{font-size:10px;color:#94a3b8;min-width:70px}

    /* Table */
    .tableWrap{overflow:auto;border-radius:10px;border:1px solid var(--line)}
    table.list-table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
    table.list-table th{background:#f8fafc;color:var(--muted);text-align:left;padding:10px 12px;position:sticky;top:0;white-space:nowrap;z-index:2;border-bottom:1px solid var(--line)}
    table.list-table td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
    table.list-table tr:hover{background:rgba(8,145,178,.04);transition:background .1s}
    .muted{color:var(--muted)}

    /* v3.3: 정렬 가능 컬럼 */
    table.list-table th.sortable{cursor:pointer;user-select:none;transition:color .15s}
    table.list-table th.sortable:hover{color:var(--deal)}
    .sort-arrow{font-size:10px;color:var(--deal);margin-left:2px;opacity:0;transition:opacity .15s}
    .sort-arrow.active{opacity:1}

    /* v3.3: 메모 편집 */
    .memo-edit{width:100%;min-height:60px;resize:vertical;border-radius:8px;border:1px solid var(--line);background:var(--chip);color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;outline:none;transition:border-color .2s}
    .memo-edit:focus{border-color:var(--deal)}
    .memo-save{transition:all .2s}
    .memo-save.saved{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}

    /* 필터 */
    .filter-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
    .filter-row input,.filter-row select{width:auto;min-width:140px;flex:1}

    /* 부대비용 테이블 (v2.8) */
    .extra-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
    .extra-table th{background:#fef3c7;color:#92400e;text-align:left;padding:8px 6px;font-size:10px;font-weight:700;border-bottom:2px solid var(--line);white-space:nowrap}
    .extra-table td{padding:6px;border-bottom:1px solid var(--line);vertical-align:middle}
    .extra-table select,.extra-table input{padding:7px 8px;border-radius:6px;font-size:11px}
    .extra-total{display:flex;gap:8px;font-size:12px;font-weight:600;color:#92400e}
    .tracking-link{color:var(--point);cursor:pointer;text-decoration:underline;font-weight:600;font-size:11px}
    .tracking-link:hover{color:#1d4ed8}

    /* v2.9 리플레이 */
    .btn-replay{padding:3px 10px;font-size:10px;border-radius:6px;background:rgba(8,145,178,.08);border:1px solid rgba(8,145,178,.25);color:var(--deal);cursor:pointer;font-weight:700;white-space:nowrap;transition:all .15s}
    .btn-replay:hover{background:rgba(8,145,178,.18)}
    .cockpit-notice{font-size:10px;color:#92400e;background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.2);border-radius:6px;padding:5px 8px;margin-bottom:8px;text-align:center}
    .cockpit-formula{font-size:10px;color:var(--muted);background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:6px 8px;margin-top:8px;line-height:1.6;word-break:keep-all}
    .cockpit-formula b{color:var(--text);font-weight:700}
    tr.replay-highlight>td{background:rgba(8,145,178,.06)!important}

    /* 품목 드롭다운 (공유) */
    .item-dd{display:none;position:absolute;z-index:300;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:200px;overflow:auto;font-size:12px}
    .item-dd-row{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--line)}
    .item-dd-row:hover{background:rgba(8,145,178,.06)}

    /* v3.7 상태 칩 */
    .status-chip{display:inline-block;border-radius:12px;font-size:11px;padding:2px 8px;font-weight:600;margin-right:4px;white-space:nowrap}
    .status-chip.no-cost{background:rgba(217,119,6,.12);color:#b45309}
    .status-chip.unsettled{background:rgba(37,99,235,.1);color:#1d4ed8}
    .status-chip.todo{background:rgba(220,38,38,.1);color:#dc2626}
    .status-chip.todo-urgent{background:rgba(220,38,38,.18);color:#991b1b}

    /* v3.7 칩 필터 바 */
    .chip-filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .chip-filter{padding:5px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
    .chip-filter:hover{border-color:#cbd5e1}
    .chip-filter.active{color:#fff;border-color:transparent}
    .chip-filter[data-chip-filter=""].active{background:var(--deal)}
    .chip-filter[data-chip-filter="no-cost"].active{background:#d97706}
    .chip-filter[data-chip-filter="unsettled"].active{background:#2563eb}
    .chip-filter[data-chip-filter="todo"].active{background:#dc2626}
    .chip-filter .cf-count{margin-left:4px;font-weight:800;font-size:10px;opacity:.85}

    /* v3.7 비용 빠른입력 */
    .cost-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .cost-quick>div>label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:700}
    .cost-quick input{padding:7px 8px;border-radius:6px;font-size:12px;text-align:right;font-variant-numeric:tabular-nums}
    .cost-quick input[readonly]{background:#f1f5f9;font-weight:700;color:var(--deal);border-color:var(--line)}
    .cost-live{font-size:12px;margin-top:6px;font-weight:600}
    .cost-live .profit{color:var(--accent)}
    .cost-live .loss{color:var(--bad)}

    /* v3.7 Todo */
    .todo-list{margin-bottom:8px}
    .todo-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px}
    .todo-item:last-child{border-bottom:none}
    .todo-item input[type="checkbox"]{accent-color:var(--deal);width:16px;height:16px;flex-shrink:0;cursor:pointer}
    .todo-item .t-title{flex:1;min-width:0}
    .todo-item .done{text-decoration:line-through;color:var(--muted)}
    .todo-due{font-size:10px;color:var(--muted);white-space:nowrap}
    .todo-due.overdue{color:var(--bad);font-weight:700}
    .todo-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;line-height:1;border-radius:4px}
    .todo-del:hover{color:var(--bad);background:rgba(220,38,38,.08)}
    .todo-add{display:flex;gap:6px;align-items:center}
    .todo-add input[type="text"]{flex:1;padding:6px 8px;font-size:11px;border-radius:6px}
    .todo-add input[type="date"]{width:130px;padding:6px 8px;font-size:11px;border-radius:6px}
    .todo-add button{padding:6px 10px;font-size:11px}
    .todo-empty{font-size:11px;color:var(--muted);padding:4px 0}

    @media(max-width:900px){
      .kpi-grid{grid-template-columns:1fr 1fr}
      .reg-layout{grid-template-columns:1fr}
      .cockpit{position:static}
      .r4{grid-template-columns:1fr 1fr}
      .pb-dot{width:24px;height:24px;font-size:10px}
      .cost-quick{grid-template-columns:1fr 1fr}
    }
    @media(max-width:600px){
      .r4,.r3,.r2{grid-template-columns:1fr}
      .kpi-grid{grid-template-columns:1fr}
      .cost-quick{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<header>
  <div class="top">
    <h1>GoLab · 거래 조종석</h1>
    <nav class="tabs">
      <a class="tab" href="./console.html">🏠 메인</a>
      <a class="tab active" href="./deals.html">🔥 거래</a>
      <a class="tab" href="./profit.html">💰 수익</a>
      <a class="tab" href="./index.html">📦 재고</a>
      <a class="tab" href="./item-master.html">🏷 품목</a>
      <a class="tab" href="./partner-master.html">👥 거래처</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi"><div class="t">총 거래</div><div class="v" id="kTotal">0</div></div>
    <div class="kpi"><div class="t">진행중</div><div class="v" id="kActive">0</div></div>
    <div class="kpi warn"><div class="t">💰 입금 대기</div><div class="v" id="kPayment">0건</div><div class="sub" id="kPaymentAmt"></div></div>
    <div class="kpi"><div class="t">✅ 완료</div><div class="v" id="kComplete" style="color:var(--accent)">0</div></div>
  </div>

  <!-- ═══ 등록 폼 + 조종석 2열 레이아웃 ═══ -->
  <div class="reg-layout">
    <!-- 왼쪽: 폼 -->
    <div class="card" style="margin-bottom:0">
      <h2>➕ 거래 등록</h2>

      <!-- Section 1: 기본정보 -->
      <div class="sec-header"><span class="sec-num">1</span><span class="sec-title">기본정보</span></div>
      <div class="row r3">
        <div>
          <label>거래처 *</label>
          <div id="acPartnerWrap"></div>
        </div>
        <div>
          <label>거래 유형</label>
          <select id="inTradeType">
            <option value="solo">직접-단독</option>
            <option value="settle">직접-정산</option>
            <option value="channel">관리업체</option>
          </select>
        </div>
        <div id="channelWrap" style="display:none">
          <label>관리업체 *</label>
          <select id="inChannel">
            <option value="">선택...</option>
          </select>
        </div>
      </div>
      <div class="row r3" style="align-items:end">
        <div>
          <label>📅 거래일 (장부 기준)</label>
          <input type="date" id="inDealDate" />
        </div>
        <div>
          <label>메모 <span class="opt">(선택)</span></label>
          <input id="inMemo" placeholder="거래 메모" />
        </div>
        <div></div>
      </div>

      <!-- Section 2: 품목 -->
      <div class="sec-header" style="margin-top:16px"><span class="sec-num">2</span><span class="sec-title">품목 목록</span></div>
      <div style="overflow:auto">
        <table class="item-table">
          <thead>
            <tr>
              <th style="min-width:140px">품목명 *</th>
              <th style="width:80px">수량 *</th>
              <th style="width:100px">단가 *</th>
              <th style="width:100px">공급가</th>
              <th style="width:100px" id="costHeader">원가</th>
              <th style="width:100px">메모</th>
              <th style="width:36px"></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <button class="secondary" id="btnAddItem" style="padding:6px 12px;font-size:11px">+ 품목 추가</button>
        <div class="item-total">
          총 공급가: <span id="totalSupply" style="color:var(--deal)">₩0</span>
          <span id="totalCostWrap"> | 품목 원가: <span id="totalCost">₩0</span></span>
        </div>

/* ══════════════════════════════════════════════════
   GoLab v3.7 전술 통제 시스템
   의사결정 조종석: 거래 등록 시 실시간 수익 판단

var $ = function(id){ return document.getElementById(id); };
var TE = GoLabTradeEngine;
var CM = GoLabChannelMaster;

var editingId = null;
var _expandedId = null;
var _restoreId = null; /* v2.9: 현재 리플레이 중인 거래 ID */

/* ══════ v3.7 DealTodo 모듈 ══════ */
var DealTodo = (function() {
  var KEY = "golab_deal_todos_v1";
  function _load() { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
  function _save(all) { localStorage.setItem(KEY, JSON.stringify(all)); }
  function getByDeal(dealId) {
    return _load().filter(function(t) { return t.deal_id === dealId; });
  }
  function create(fields) {
    var all = _load();
    var todo = {
      id: "TODO-" + Date.now(),
      deal_id: fields.deal_id,
      title: (fields.title || "").trim(),
      due_date: fields.due_date || null,
      status: "pending",
      memo: fields.memo || "",
      created_at: new Date().toISOString()
    };
    all.push(todo);
    _save(all);
    return todo;
  }
  function toggle(todoId) {
    var all = _load();
    var idx = all.findIndex(function(t) { return t.id === todoId; });
    if (idx < 0) return;
    all[idx].status = all[idx].status === "completed" ? "pending" : "completed";
    all[idx].updated_at = new Date().toISOString();
    _save(all);
  }
  function remove(todoId) {
    var all = _load();
    _save(all.filter(function(t) { return t.id !== todoId; }));
  }
  return { KEY: KEY, getByDeal: getByDeal, create: create, toggle: toggle, remove: remove };
})();

/* v3.7 상태 칩 판정 — 취소 거래는 칩 없음 */
function _getStatusChips(deal) {
  var chips = [];
  if (deal.deal_status === "cancelled") return chips;
  /* 🟡 비용미입력: 아이템 중 cost가 null/0 인 것이 있으면 */
  var hasMissingCost = (deal.items || []).some(function(it) {
    return it.cost == null || it.cost === 0;
  });
  if (hasMissingCost) chips.push({ type: "no-cost", label: "비용미입력" });
  /* 🔵 정산대기: payment_at 미설정 (= 입금 미완료) */
  if (!deal.payment_at) chips.push({ type: "unsettled", label: "정산대기" });
  /* 🔴 할일있음: 미완료 todo 존재 */
  var todos = DealTodo.getByDeal(deal.id);
  var pending = todos.filter(function(t) { return t.status !== "completed"; });
  if (pending.length > 0) {
    var today = new Date().toISOString().substring(0,10);
    var hasOverdue = pending.some(function(t) { return t.due_date && t.due_date <= today; });
    chips.push({ type: hasOverdue ? "todo-urgent" : "todo", label: "할일있음" });
  }
  return chips;
}

  });
}

/* ══════ 품목 동적 리스트 ══════ */
var _items = []; /* 현재 편집 중인 품목 배열 */
var _nextItemSeq = 1;
var _activeItemInput = null; /* 현재 포커스된 품목 입력 */

function addItemRow(itemData) {
  var item = itemData || { seq: _nextItemSeq++, item_id: null, name: "", qty: "", unit_price: "", cost: "", memo: "" };
  if (!itemData) _nextItemSeq = item.seq + 1;
  _items.push(item);
  renderItems();
}

function removeItemRow(idx) {
  _items.splice(idx, 1);
  renderItems();
  updateCockpit();
}

function renderItems() {
  var tb = $("itemsBody");
  tb.innerHTML = "";
  _items.forEach(function(item, idx) {
    var tr = document.createElement("tr");
    var sa = Math.round(TE.n(item.qty) * TE.n(item.unit_price));

    tr.innerHTML =
      '<td><input class="it-name" data-idx="'+idx+'" value="'+esc(item.name||"")+'" placeholder="품목명" autocomplete="off" /></td>' +
      '<td><input class="it-qty" data-idx="'+idx+'" type="number" step="0.01" value="'+(item.qty||"")+'" placeholder="수량" style="width:70px" /></td>' +
      '<td><input class="it-up" data-idx="'+idx+'" type="number" step="1" value="'+(item.unit_price||"")+'" placeholder="단가" style="width:90px" /></td>' +
      '<td><div class="sa">'+(sa > 0 ? TE.fmt(sa) : "—")+'</div></td>' +
      '<td><input class="it-cost" data-idx="'+idx+'" type="number" step="1" value="'+(item.cost!=null&&item.cost!==""?item.cost:"")+'" placeholder="선택" style="width:90px" /></td>' +
      '<td><input class="it-memo" data-idx="'+idx+'" value="'+esc(item.memo||"")+'" placeholder="" style="width:90px" /></td>' +
      '<td><button class="danger it-del" data-idx="'+idx+'" style="padding:4px 8px;font-size:10px" title="삭제">✕</button></td>';
    tb.appendChild(tr);
  });

  /* 이벤트 바인딩 */
  tb.querySelectorAll(".it-name").forEach(function(el) {
    el.addEventListener("input", function() {
      _items[+el.dataset.idx].name = el.value;
      _items[+el.dataset.idx].item_id = null;
      _activeItemInput = el;
      _showItemDropdown(el);
    });
    el.addEventListener("focus", function() {
      _activeItemInput = el;
      _showItemDropdown(el);
    });
    el.addEventListener("keydown", function(e) { if(e.key==="Escape") _hideItemDropdown(); });
  });
  tb.querySelectorAll(".it-qty").forEach(function(el) {
    el.addEventListener("input", function() {
      _items[+el.dataset.idx].qty = el.value;
      _updateItemSA(+el.dataset.idx);
      updateCockpit();
    });
  });
  tb.querySelectorAll(".it-up").forEach(function(el) {
    el.addEventListener("input", function() {
      _items[+el.dataset.idx].unit_price = el.value;
      _updateItemSA(+el.dataset.idx);
      updateCockpit();
    });
  });
  tb.querySelectorAll(".it-cost").forEach(function(el) {
    el.addEventListener("input", function() {
      _items[+el.dataset.idx].cost = el.value !== "" ? el.value : null;
      updateCockpit();
    });
  });
  tb.querySelectorAll(".it-memo").forEach(function(el) {
    el.addEventListener("input", function() {
      _items[+el.dataset.idx].memo = el.value;
    });
  });
  tb.querySelectorAll(".it-del").forEach(function(btn) {
    btn.addEventListener("click", function() { removeItemRow(+btn.dataset.idx); });
  });

  /* 합계 표시 */
  var totalS = 0, totalC = 0;
  _items.forEach(function(item) {
    totalS += Math.round(TE.n(item.qty) * TE.n(item.unit_price));
    totalC += TE.n(item.cost);
  });
  $("totalSupply").textContent = TE.fmt(totalS);
  $("totalCost").textContent = TE.fmt(totalC);
}

function _updateItemSA(idx) {
  var item = _items[idx];
  var sa = Math.round(TE.n(item.qty) * TE.n(item.unit_price));
  var saEl = $("itemsBody").querySelectorAll(".sa")[idx];
  if (saEl) saEl.textContent = sa > 0 ? TE.fmt(sa) : "—";
  /* 합계 업데이트 */
  var totalS = 0, totalC = 0;
  _items.forEach(function(it) {
    totalS += Math.round(TE.n(it.qty) * TE.n(it.unit_price));
    totalC += TE.n(it.cost);
  });
  $("totalSupply").textContent = TE.fmt(totalS);
  $("totalCost").textContent = TE.fmt(totalC);
}

/* 품목 자동완성 드롭다운 (공유) */
function _showItemDropdown(inputEl) {
  var dd = $("itemDropdown");
  if (typeof GoLabItemMaster === "undefined") { dd.style.display = "none"; return; }
  var query = inputEl.value || "";
  var results = GoLabItemMaster.search(query).slice(0, 8);
  if (!results.length) { dd.style.display = "none"; return; }

  dd.innerHTML = "";
  results.forEach(function(item) {
    var row = document.createElement("div");
    row.className = "item-dd-row";
    row.textContent = item.item_name + (item.spec ? " (" + item.spec + ")" : "");
    row.addEventListener("click", function() {
      var idx = +inputEl.dataset.idx;
      _items[idx].item_id = item.item_id;
      _items[idx].name = item.item_name;
      inputEl.value = item.item_name;
      _hideItemDropdown();
      updateCockpit();
    });
    dd.appendChild(row);
  });

  var rect = inputEl.getBoundingClientRect();
  dd.style.left = rect.left + "px";
  dd.style.top = (rect.bottom + 4) + "px";
  dd.style.width = Math.max(rect.width, 200) + "px";
  dd.style.display = "block";
}
function _hideItemDropdown() { $("itemDropdown").style.display = "none"; }
document.addEventListener("mousedown", function(e) {
  if (!$("itemDropdown").contains(e.target) && !e.target.classList.contains("it-name")) _hideItemDropdown();

    Object.keys(TYPES).forEach(function(key) {
      typeOpts += '<option value="'+key+'"'+(ec.type===key?' selected':'')+'>'+TYPES[key]+'</option>';
    });
    var apChecked = (ec.affects_profit !== false) ? ' checked' : '';
    tr.innerHTML =
      '<td><select class="ec-type" data-idx="'+idx+'">'+typeOpts+'</select></td>' +

      '<td style="text-align:center"><input class="ec-ap" data-idx="'+idx+'" type="checkbox"'+apChecked+' title="수익 반영" /></td>' +
      '<td><input class="ec-memo" data-idx="'+idx+'" value="'+esc(ec.memo||"")+'" placeholder="" style="width:120px" /></td>' +
      '<td><button class="danger ec-del" data-idx="'+idx+'" style="padding:4px 8px;font-size:10px" title="삭제">✕</button></td>';
    tb.appendChild(tr);
  });

  /* 이벤트 바인딩 */
  tb.querySelectorAll(".ec-type").forEach(function(el) {
    el.addEventListener("change", function() {
      _extraCosts[+el.dataset.idx].type = el.value;
      _extraCosts[+el.dataset.idx].label = TYPES[el.value] || "기타";
      updateCockpit();
    });
  });
  tb.querySelectorAll(".ec-amt").forEach(function(el) {
    el.addEventListener("input", function() {
      _extraCosts[+el.dataset.idx].amount = el.value;
      _updateExtraCostTotal();
      updateCockpit();
    });
  });
  /* v2.8a: 수익 반영 체크박스 */
  tb.querySelectorAll(".ec-ap").forEach(function(el) {
    el.addEventListener("change", function() {
      _extraCosts[+el.dataset.idx].affects_profit = el.checked;
      _updateExtraCostTotal();
      updateCockpit();
    });

  tb.querySelectorAll(".ec-memo").forEach(function(el) {
    el.addEventListener("input", function() {
      _extraCosts[+el.dataset.idx].memo = el.value;
    });
  });
  tb.querySelectorAll(".ec-del").forEach(function(btn) {
    btn.addEventListener("click", function() { removeExtraCostRow(+btn.dataset.idx); });

  _updateExtraCostTotal();
}

function _updateExtraCostTotal() {

  _extraCosts.forEach(function(ec) { total += TE.n(ec.amount); });

/* ══════ 조종석 실시간 업데이트 ══════ */
/* v3.0: 3-way 유형 기반 임시 거래 객체 생성 */
function _buildTempTrade() {
  var typeVal   = $("inTradeType").value;
  var isChannel = typeVal === "channel";
  var isSolo    = typeVal === "solo";
  return {
    trade_type: isChannel ? "channel" : "direct",
    items: _items.map(function(it) {
      return {
        qty: TE.n(it.qty),
        unit_price: TE.n(it.unit_price),
        cost: (it.cost != null && it.cost !== "") ? TE.n(it.cost) : null
      };
    }),
    /* 부대비용 (v2.8a: affects_profit 포함) */
    extra_costs: _extraCosts.map(function(ec) {
      return { type: ec.type, amount: TE.n(ec.amount), affects_profit: ec.affects_profit !== false, memo: ec.memo || "" };
    }),
    rates: isChannel ? {
      save_rate: 0,
      rebate_rate: TE.n($("inRebateRate").value),
      S_rate: TE.n($("inSRate_ch").value),
      my_rate: TE.n($("inMyRate_ch").value)
    } : isSolo ? {
      save_rate: 0, rebate_rate: 0, S_rate: 0, my_rate: 100
    } : {
      save_rate: TE.n($("inSaveRate").value),
      rebate_rate: 0,
      S_rate: TE.n($("inSRate").value),
      my_rate: TE.n($("inMyRate").value)
    },
    settlement: isChannel ? {
      payout_fee: TE.n($("inPayoutFee").value),
      actual_S_amount: TE.n($("inActualS_ch").value)
    } : isSolo ? {
      payout_fee: 0, actual_S_amount: 0
    } : {
      payout_fee: 0,
      actual_S_amount: TE.n($("inActualS_direct").value)
    }
  };
}

/* v2.9: updateCockpit(savedTrade) — 이중 모드 조종석
   인자 없음 → 라이브 모드 (폼 입력값 기반, 리플레이 자동 해제)
   savedTrade 전달 → 복구 모드 (저장된 거래 기반 렌더링) */
function updateCockpit(savedTrade) {
  /* Event 객체가 인자로 들어올 수 있으므로 trade_type 존재 여부로 판별 */
  var isReplay = !!(savedTrade && savedTrade.trade_type);

  /* v3.0: 정산형 자동 S지급액 반영 (라이브 모드, _buildTempTrade 전에 실행) */
  if (!isReplay) _autoSyncSettleS();

  var trade = isReplay ? savedTrade : _buildTempTrade();
  var c = TE.calcTrade(trade);
  var isChannel = trade.trade_type === "channel";
  var body = $("cockpitBody");
  var title = $("cockpitTitle");

  /* 라이브 모드 진입 시 리플레이 상태 자동 해제 */
  if (!isReplay && _restoreId) {
    _restoreId = null;
    _applyReplayHighlight(null);
  }

  /* 제목 동적 변경 */
  if (isReplay) {
    var tName = trade.partner_name_snapshot || "";
    var itemSummary = TE.itemDisplayName(trade);
    title.textContent = "📊 수익 분석 — " + tName + " / " + itemSummary;
  } else {
    title.textContent = "📊 수익 분석";
  }

  /* 라이브 모드: 공급가 0이면 빈 안내 */
  if (!isReplay && c.total_supply === 0) {
    body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:11px">품목을 추가하면 실시간 수익이 표시됩니다</div>';
    return;
  }

  var html = "";

  /* 복구 모드 안내 문구 */
  if (isReplay) {
    html += '<div class="cockpit-notice">저장 시점 기준 계산값입니다.</div>';
  }

  /* ── v3.0: 유형별 조종석 ── */
  var tradeClass = TE.classifyTrade(trade);
  html += _cr("총 공급가", TE.fmt(c.total_supply));
  html += _cr("VAT", TE.fmt(c.vat_amount));
  html += _cr("합계 (공급가+VAT)", TE.fmt(c.total_amount));
  html += '<div class="cockpit-divider"></div>';

  if (isChannel) {
    html += _cr("리베이트율", TE.n(trade.rates.rebate_rate) + "%");
    html += _cr("리베이트 금액", TE.fmt(c.rebate_amount));
    html += _cr("지급 수수료", TE.fmt(TE.n(trade.settlement.payout_fee)));
    if (c.extra_cost_total > 0) {
      html += _cr("부대비용 (차감)", TE.fmt(c.extra_cost_total));
    }
    html += '<div class="cockpit-divider"></div>';
    html += _cr("배분 대상 금액", "<b>" + TE.fmt(c.distributable) + "</b>");
    html += _cr("S 예상몫 (" + TE.n(trade.rates.S_rate) + "%)", TE.fmt(c.expected_S_amount));
    html += _cr("내 예상몫 (" + TE.n(trade.rates.my_rate) + "%)", TE.fmt(c.expected_my_amount));
    html += '<div class="cockpit-divider"></div>';
    html += _cr("S 실제 지급액", TE.fmt(TE.n(trade.settlement.actual_S_amount)));
  } else if (tradeClass === "solo") {
    /* 단독형: 원가 → 바로 내 순익 */
    html += _cr("품목 원가", TE.fmt(c.item_cost_total));
    if (c.extra_cost_total > 0) {
      html += _cr("부대비용", TE.fmt(c.extra_cost_total));
    }
    html += _cr("총 원가", TE.fmt(c.total_cost));
    html += '<div class="cockpit-divider"></div>';
  } else {
    /* 정산형: SAVE + 배분 */
    html += _cr("품목 원가", TE.fmt(c.item_cost_total));
    if (c.extra_cost_total > 0) {
      html += _cr("부대비용", TE.fmt(c.extra_cost_total));
    }
    html += _cr("총 원가", TE.fmt(c.total_cost));
    html += _cr("총수익 (매출-원가)", TE.fmt(c.gross_profit));
    html += _cr("SAVE " + TE.n(trade.rates.save_rate) + "%", TE.fmt(c.save_amount));
    html += '<div class="cockpit-divider"></div>';
    html += _cr("배분 대상 금액", "<b>" + TE.fmt(c.distributable) + "</b>");
    html += _cr("S 예상몫 (" + TE.n(trade.rates.S_rate) + "%)", TE.fmt(c.expected_S_amount));
    html += _cr("내 예상몫 (" + TE.n(trade.rates.my_rate) + "%)", TE.fmt(c.expected_my_amount));
    html += '<div class="cockpit-divider"></div>';
    html += _cr("S 실제 지급액", TE.fmt(TE.n(trade.settlement.actual_S_amount)));
  }
  html += '<div class="cockpit-row highlight"><span class="lbl">✨ 내 최종 몫</span><span class="val">' + TE.fmt(c.final_my_amount) + '</span></div>';

  /* v2.9: 거래 유형별 한 줄 계산식 요약 */
  html += _buildFormulaLine(trade, c, isChannel);

  body.innerHTML = html;
}

/* v2.9: 거래 유형별 계산식 한 줄 요약 */
function _buildFormulaLine(trade, c, isChannel) {
  var f = '<div class="cockpit-formula">';
  if (isChannel) {
    /* 채널형 */
    f += '리베이트 <b>' + TE.fmt(c.rebate_amount) + '</b>';
    f += ' − 지급수수료 <b>' + TE.fmt(TE.n(trade.settlement.payout_fee)) + '</b>';
    if (c.extra_cost_total > 0) f += ' − 차감성 부대비용 <b>' + TE.fmt(c.extra_cost_total) + '</b>';
    f += ' = 배분대상 <b>' + TE.fmt(c.distributable) + '</b>';
    f += ' → 내 최종 몫 <b>' + TE.fmt(c.final_my_amount) + '</b>';
  } else if (TE.n(trade.rates.S_rate) > 0 || TE.n(trade.rates.save_rate) > 0) {
    /* 정산형 (S_rate 또는 save_rate > 0) */
    f += '매출 <b>' + TE.fmt(c.total_supply) + '</b>';
    f += ' − 원가 <b>' + TE.fmt(c.item_cost_total) + '</b>';
    if (c.extra_cost_total > 0) f += ' − 부대비용 <b>' + TE.fmt(c.extra_cost_total) + '</b>';
    f += ' = 순익 <b>' + TE.fmt(c.gross_profit) + '</b>';
    f += ' → SAVE <b>' + TE.fmt(c.save_amount) + '</b> 차감';
    f += ' → 배분대상 <b>' + TE.fmt(c.distributable) + '</b>';
    f += ' → 내 최종 몫 <b>' + TE.fmt(c.final_my_amount) + '</b>';
  } else {
    /* 단독형 */
    f += '매출 <b>' + TE.fmt(c.total_supply) + '</b>';
    f += ' − 원가 <b>' + TE.fmt(c.item_cost_total) + '</b>';
    if (c.extra_cost_total > 0) f += ' − 부대비용 <b>' + TE.fmt(c.extra_cost_total) + '</b>';
    f += ' = 내 순익 <b>' + TE.fmt(c.final_my_amount) + '</b>';
  }
  f += '</div>';
  return f;
}
function _cr(label, value) {
  return '<div class="cockpit-row"><span class="lbl">' + label + '</span><span class="val">' + value + '</span></div>';
}

/* ══════ 진행 바 ══════ */
function renderProgressBar(d, interactive) {
  var stepIdx = TE.currentStepIndex(d);
  var html = '<div class="progress-bar">';
  TE.STEPS.forEach(function(step, i) {
    var isDone = !!d[step.field];
    var isCurrent = (i === stepIdx && !isDone);
    var dotClass = isDone ? "done" : (isCurrent ? "current" : "");
    var labelClass = isDone ? "done" : (isCurrent ? "current" : "");
    var dateStr = d[step.field] ? d[step.field].substring(5) : "";

    html += '<div class="pb-wrap">';
    if (interactive) {
      html += '<div class="pb-dot '+dotClass+'" data-step-tid="'+d.id+'" data-step-key="'+step.key+'" title="'+(isDone ? step.label+' 완료 — 클릭하여 취소' : step.label+' — 클릭하여 처리')+'">';
    } else {
      html += '<div class="pb-dot '+dotClass+'">';
    }
    html += (isDone ? "✓" : step.icon) + '</div>';
    html += '<div class="pb-label '+labelClass+'">'+step.label+'</div>';
    if (dateStr) html += '<div class="pb-date">'+dateStr+'</div>';
    html += '</div>';
    if (i < TE.STEPS.length - 1) html += '<div class="pb-line'+(isDone?" done":"")+'"></div>';
  });
  html += '</div>';
  return html;
}

/* ══════ v3.3: 정렬 함수 ══════ */
function sortTrades(deals) {
  var key = currentSortKey;
  var dir = currentSortDir === "desc" ? 1 : -1;

  return deals.slice().sort(function(a, b) {
    if (key === "date") {
      var da = a.created_at || "";
      var db = b.created_at || "";
      /* null은 맨 아래 */
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return dir * db.localeCompare(da);
    }
    if (key === "supply") {
      var ca = TE.calcTrade(a).total_supply;
      var cb = TE.calcTrade(b).total_supply;
      return dir * (cb - ca);
    }
    if (key === "profit") {
      var ca = TE.calcTrade(a).final_my_amount;
      var cb = TE.calcTrade(b).final_my_amount;
      return dir * (cb - ca);
    }
    return 0;
  });
}

/* v3.3: 정렬 UI 동기화 */
function updateSortUI() {
  var arrow = currentSortDir === "desc" ? "↓" : "↑";
  document.querySelectorAll(".list-table thead .sortable").forEach(function(th) {
    var arrowEl = th.querySelector(".sort-arrow");
    if (!arrowEl) return;
    var isActive = th.dataset.sort === currentSortKey;
    arrowEl.classList.toggle("active", isActive);
    arrowEl.textContent = isActive ? arrow : "";
  });
}

/* ══════ 렌더링 ══════ */
function render() {
  var all = TE.loadAll();
  var q = ($("fSearch").value || "").trim().toLowerCase();
  var statusFilter = $("fStatus").value;
  var tradeClassFilter = $("fTradeClass").value;
  var dealStatusFilter = $("fDealStatus").value;
  var channelFilter = $("fChannel").value;
  var filtered = all;

  if (q) {
    filtered = filtered.filter(function(t) {
      var itemNames = (t.items || []).map(function(it) { return (it.name || "").toLowerCase(); }).join(" ");
      return (t.partner_name_snapshot || "").toLowerCase().includes(q) ||
             itemNames.includes(q) ||
             (t.memo || "").toLowerCase().includes(q);
    });
  }
  if (statusFilter) filtered = filtered.filter(function(t) { return t.status === statusFilter; });
  /* v3.0: 유형 필터 — classifyTrade()로 분류 */
  if (tradeClassFilter) filtered = filtered.filter(function(t) { return TE.classifyTrade(t) === tradeClassFilter; });
  if (dealStatusFilter) filtered = filtered.filter(function(t) { return t.deal_status === dealStatusFilter; });
  if (channelFilter === "direct") {
    filtered = filtered.filter(function(t) { return !t.channel_id; });
  } else if (channelFilter) {
    filtered = filtered.filter(function(t) { return t.channel_id === channelFilter; });
  }

  /* v3.7: 칩 카운트 (전체 기준, 필터 전) */
  var _cfNoCost = 0, _cfUnsettled = 0, _cfTodo = 0;
  all.forEach(function(t) {
    if (t.deal_status === "cancelled") return;
    if ((t.items||[]).some(function(it){ return it.cost == null || it.cost === 0; })) _cfNoCost++;
    if (!t.payment_at) _cfUnsettled++;
    if (DealTodo.getByDeal(t.id).some(function(td){ return td.status !== "completed"; })) _cfTodo++;
  });
  $("cfNoCost").textContent = _cfNoCost;
  $("cfUnsettled").textContent = _cfUnsettled;
  $("cfTodo").textContent = _cfTodo;

  /* v3.7: 칩 필터 적용 */
  if (chipFilter === "no-cost") {
    filtered = filtered.filter(function(t) {
      return t.deal_status !== "cancelled" &&
             (t.items||[]).some(function(it){ return it.cost == null || it.cost === 0; });
    });
  } else if (chipFilter === "unsettled") {
    filtered = filtered.filter(function(t) {
      return t.deal_status !== "cancelled" && !t.payment_at;
    });
  } else if (chipFilter === "todo") {
    filtered = filtered.filter(function(t) {
      return DealTodo.getByDeal(t.id).some(function(td){ return td.status !== "completed"; });
    });
  }

  /* v3.3: 정렬 적용 */
  filtered = sortTrades(filtered);

  $("listBadge").textContent = filtered.length;

  /* v3.3: filtered 기준 KPI 재계산 */
  var kTotalN = filtered.length;
  var kActiveN = 0, kCompleteN = 0, kPaymentN = 0, kPaymentAmtN = 0;
  filtered.forEach(function(t) {
    if (t.deal_status === "cancelled") return;
    if (t.payment_at) { kCompleteN++; }
    else {
      kActiveN++;
      if (t.invoice_at && !t.payment_at) {
        kPaymentN++;
        kPaymentAmtN += (TE.calcTrade(t)).total_amount;
      }
    }
  });
  $("kTotal").textContent = kTotalN;
  $("kActive").textContent = kActiveN;
  $("kComplete").textContent = kCompleteN;
  $("kPayment").textContent = kPaymentN + "건";
  /* v3.3: 미입금 금액 강조 */
  var _kpEl = $("kPaymentAmt");
  if (kPaymentAmtN > 0) {
    _kpEl.textContent = TE.fmt(kPaymentAmtN);
    _kpEl.style.color = "var(--bad)";
  } else {
    _kpEl.textContent = "✅ 전액 수금";
    _kpEl.style.color = "var(--accent)";
  }

  var tb = $("tbody");
  if (!filtered.length) { tb.innerHTML = ""; $("emptyMsg").style.display = "block"; return; }
  $("emptyMsg").style.display = "none";

  var html = "";
  filtered.forEach(function(t) {
    var calc = TE.calcTrade(t);
    var isCancelled = t.deal_status === "cancelled";
    var rowStyle = isCancelled ? 'style="cursor:pointer;opacity:.5;text-decoration:line-through"' : 'style="cursor:pointer"';
    var dispName = TE.itemDisplayName(t);

    html += '<tr '+rowStyle+' data-id="'+t.id+'" data-toggle="'+t.id+'">';
    /* v3.3: 등록일 컬럼 */
    html += '<td style="white-space:nowrap;color:var(--muted);font-size:11px">'+(t.created_at ? t.created_at.substring(0,10) : '—')+'</td>';
    /* v3.7: 거래처 셀 + 상태 칩 */
    var _chips = _getStatusChips(t);
    var _chipHtml = "";
    if (_chips.length) {
      _chipHtml = '<div style="margin-top:3px">';
      _chips.forEach(function(c) { _chipHtml += '<span class="status-chip '+c.type+'">'+c.label+'</span>'; });
      _chipHtml += '</div>';
    }
    html += '<td><b>'+esc(t.partner_name_snapshot)+'</b>'+_chipHtml+'</td>';
    html += '<td>'+esc(dispName)+'</td>';
    html += '<td>'+TE.fmt(calc.total_supply)+'</td>';
    html += '<td>'+renderProgressBar(t, false)+'</td>';
    /* 내 최종 몫 */
    html += '<td>';
    var myColor = calc.final_my_amount >= 0 ? "var(--accent)" : "var(--bad)";
    html += '<span style="font-weight:700;color:'+myColor+'">'+TE.fmt(calc.final_my_amount)+'</span>';
    html += '</td>';
    /* v3.0: 유형 배지 — 관리업체는 실명 표시 */
    var _tc = TE.classifyTrade(t);
    var _tcLabel;
    if (_tc === "channel") {

/* v3.7: 비용 빠른입력 저장 함수 */
function _saveQuickCost(tid, field, value) {
  var trade = TE.getById(tid);
  if (!trade) return;
  if (field === "purchase") {
    /* 구매비 → items[].cost에 분배 */
    var items = trade.items || [];
    if (items.length === 1) {
      /* 단일 품목: 직접 설정 */
      items[0].cost = value;
    } else if (items.length > 1) {
      /* 복수 품목: 공급가 비율로 분배 */
      var totalSupply = 0;
      items.forEach(function(it) { totalSupply += (it.supply_amount || 0); });
      items.forEach(function(it) {
        var ratio = totalSupply > 0 ? (it.supply_amount || 0) / totalSupply : 1 / items.length;
        it.cost = Math.round(value * ratio);
      });
    }
    TE.update(tid, { items: items });
  } else if (field === "shipping") {
    /* 운송비 → extra_costs type=shipping 갱신/생성 */
    var extras = (trade.extra_costs || []).slice();
    var found = false;
    extras.forEach(function(ec) {
      if (ec.type === "shipping" && ec.affects_profit !== false) { ec.amount = value; found = true; }
    });
    if (!found && value > 0) {
      extras.push({ type: "shipping", label: "운송비", amount: value, affects_profit: true, memo: "" });
    }
    TE.update(tid, { extra_costs: extras });
  } else if (field === "other") {
    /* 기타비용 → extra_costs type=misc 갱신/생성 */
    var extras = (trade.extra_costs || []).slice();
    var found = false;
    extras.forEach(function(ec) {
      if (ec.type === "misc" && ec.affects_profit !== false) { ec.amount = value; found = true; }
    });
    if (!found && value > 0) {
      extras.push({ type: "misc", label: "기타", amount: value, affects_profit: true, memo: "" });
    }
    TE.update(tid, { extra_costs: extras });
  }
  /* 라이브 재계산: 최종원가 + 순이익 갱신 */
  _updateQuickCostUI(tid);
}

/* v3.7: 비용 UI 라이브 갱신 (full re-render 없이) */
function _updateQuickCostUI(tid) {
  var trade = TE.getById(tid);
  if (!trade) return;
  var calc = TE.calcTrade(trade);
  var _qPurchase = 0;
  (trade.items||[]).forEach(function(it) { _qPurchase += (it.cost||0); });
  var _qShipping = 0, _qOther = 0;
  (trade.extra_costs||[]).forEach(function(ec) {
    if (ec.affects_profit === false) return;
    if (ec.type === "shipping") _qShipping += ec.amount;
    else _qOther += ec.amount;
  });
  var _qTotal = _qPurchase + _qShipping + _qOther;
  var _qProfit = calc.total_supply - _qTotal;
  /* 최종원가 필드 갱신 */
  var totalEl = document.querySelector('[data-qcost-total="'+tid+'"]');
  if (totalEl) totalEl.value = _qTotal;
  /* 순이익 라이브 갱신 */
  var profitEl = document.querySelector('[data-qcost-profit="'+tid+'"]');
  if (profitEl) {
    profitEl.textContent = TE.fmt(_qProfit);
    profitEl.className = _qProfit >= 0 ? "profit" : "loss";
  }
}

/* v2.9: 리플레이 하이라이트 적용 */
function _applyReplayHighlight(tid) {
  /* 이전 하이라이트 제거 */
  document.querySelectorAll("tr.replay-highlight").forEach(function(tr) {
    tr.classList.remove("replay-highlight");
  });
  /* 현재 거래행 하이라이트 (data-id 기준) */
  if (tid) {
    var row = document.querySelector('tr[data-id="' + tid + '"]');
    if (row) row.classList.add("replay-highlight");
  }
}

function toggleDetail(tid) {
  _expandedId = (_expandedId === tid) ? null : tid;
  render();
}


/* ══════ CRUD ══════ */
function saveTrade() {
  var partnerId = acPartner.getValue();
  if (!partnerId) { alert("거래처를 선택해주세요."); return; }

  /* 품목 검증 */
  var validItems = _items.filter(function(it) {
    return (it.name || "").trim() && TE.n(it.qty) > 0 && TE.n(it.unit_price) > 0;
  });
  if (validItems.length === 0) { alert("품목을 1개 이상 입력해주세요.\n(품목명, 수량, 단가 필수)"); return; }

  var partner = GoLabPartnerMaster.getById(partnerId);
  /* v3.0: 3-way 유형 (solo/settle/channel) */
  var typeVal   = $("inTradeType").value;
  var isChannel = typeVal === "channel";
  var isSolo    = typeVal === "solo";
  var channelId = isChannel ? ($("inChannel").value || null) : null;

  if (isChannel && !channelId) { alert("관리업체를 선택해주세요."); return; }

  var fields = {
    partner_id: partnerId,
    partner_name_snapshot: partner ? (partner.display_name || partner.name) : "",
    channel_id: channelId,
    /* v3.0: trade_type은 저장소에서 direct/channel 유지 (하위 호환) */
    items: validItems.map(function(it) {
      return {
        item_id: it.item_id || null,
        name: (it.name || "").trim(),
        qty: TE.n(it.qty),
        unit_price: TE.n(it.unit_price),
        cost: (it.cost != null && it.cost !== "") ? TE.n(it.cost) : null,
        memo: (it.memo || "").trim()
      };
    }),
    /* v3.0: 유형별 비율 — solo는 모두 0/100 */
    rates: isChannel ? {
      save_rate: 0,
      rebate_rate: TE.n($("inRebateRate").value),
      S_rate: TE.n($("inSRate_ch").value),
      my_rate: TE.n($("inMyRate_ch").value)
    } : isSolo ? {
      save_rate: 0, rebate_rate: 0, S_rate: 0, my_rate: 100
    } : {
      save_rate: TE.n($("inSaveRate").value),
      rebate_rate: 0,
      S_rate: TE.n($("inSRate").value),
      my_rate: TE.n($("inMyRate").value)
    },
    /* 부대비용 (v2.8a: affects_profit 포함) */
    extra_costs: _extraCosts.filter(function(ec) {
      return TE.n(ec.amount) > 0;
    }).map(function(ec) {
      return {
        type: ec.type || "misc",
        amount: TE.n(ec.amount),
        affects_profit: ec.affects_profit !== false,
        memo: (ec.memo || "").trim()
      };
    }),
    settlement: isChannel ? {
      payout_fee: TE.n($("inPayoutFee").value),
      actual_S_amount: TE.n($("inActualS_ch").value),
      memo: ($("inSettlementMemo_ch").value || "").trim()
    } : isSolo ? {
      payout_fee: 0, actual_S_amount: 0, memo: ""
    } : {
      payout_fee: 0,
      actual_S_amount: TE.n($("inActualS_direct").value),
      memo: ($("inSettlementMemo").value || "").trim()
    },
    /* v2.9c: 장부 기준일 */
    deal_date: $("inDealDate").value || new Date().toISOString().substring(0, 10),
    memo: ($("inMemo").value || "").trim()
  };

  try {
    if (editingId) {
      TE.update(editingId, fields);
    } else {
      TE.create(fields);
    }
    clearForm();
    computeKPI();
    render();
  } catch (err) {
    alert("저장 실패: " + err.message);
  }
}

function startEdit(tid) {
  var t = TE.getById(tid);
  if (!t) return;
  editingId = t.id;
  /* v3.0: 기존 거래 편집 시 S지급액이 이미 입력된 상태 → 수동 편집 모드 */
  _sManuallyEdited = true;

  if (t.partner_id) acPartner.setValue(t.partner_id);
  /* v3.0: trade_type + rates로 UI 셀렉터 결정 */
  var r = t.rates || {};
  if (t.trade_type === "channel") {
    $("inTradeType").value = "channel";
  } else if (TE.n(r.S_rate) > 0 || TE.n(r.save_rate) > 0) {
    $("inTradeType").value = "settle";
  } else {
    $("inTradeType").value = "solo";
  }
  $("inTradeType").dispatchEvent(new Event("change"));

  if (t.channel_id) {
    $("inChannel").value = t.channel_id;
  }

  $("inMemo").value = t.memo || "";
  /* v2.9c: 거래일 복원 */
  $("inDealDate").value = t.deal_date || "";

  /* 품목 복원 */
  _items = (t.items || []).map(function(it, i) {
    return {
      seq: i + 1,
      item_id: it.item_id,
      name: it.name,
      qty: it.qty,
      unit_price: it.unit_price,
      cost: it.cost,
      memo: it.memo || ""
    };
  });
  _nextItemSeq = _items.length + 1;
  renderItems();

  /* 부대비용 복원 (v2.8a: affects_profit 포함) */
  _extraCosts = (t.extra_costs || []).map(function(ec) {
    return {
      type: ec.type || "misc",
      label: ec.label || (TE.EXTRA_COST_TYPES[ec.type] || "기타"),
      amount: ec.amount,
      affects_profit: ec.affects_profit !== false,
      memo: ec.memo || ""
    };
  });
  renderExtraCosts();

  /* v3.0: tracking_number / deal_owner 폐기 */

  /* 비율 복원 — r은 이미 위에서 선언 */
  if (t.trade_type === "channel") {
    $("inRebateRate").value = r.rebate_rate || 30;
    $("inPayoutFee").value = (t.settlement || {}).payout_fee || 0;
    $("inSRate_ch").value = r.S_rate || 60;
    $("inMyRate_ch").value = r.my_rate || 40;
    $("inActualS_ch").value = (t.settlement || {}).actual_S_amount || 0;
    $("inSettlementMemo_ch").value = (t.settlement || {}).memo || "";
  } else {
    $("inSaveRate").value = r.save_rate || 30;
    $("inSRate").value = r.S_rate || 60;
    $("inMyRate").value = r.my_rate || 40;
    $("inActualS_direct").value = (t.settlement || {}).actual_S_amount || 0;
    $("inSettlementMemo").value = (t.settlement || {}).memo || "";
  }

  $("btnSave").textContent = "저장";
  $("btnCancel").style.display = "inline-block";
  updateCockpit();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteTrade(tid) {
  var t = TE.getById(tid);
  if (!t) return;
  var dispName = TE.itemDisplayName(t);
  if (!confirm('"'+esc(t.partner_name_snapshot)+" - "+esc(dispName)+'" 거래를 삭제하시겠습니까?')) return;
  TE.remove(tid);
  if (_expandedId === tid) _expandedId = null;
  computeKPI(); render();
}

function clearForm() {
  acPartner.clear();
  _sManuallyEdited = false; /* v3.0: S지급액 자동 반영 모드 복원 */
  /* v3.0: 기본 유형 = solo */
  $("inTradeType").value = "solo";
  $("inTradeType").dispatchEvent(new Event("change"));
  $("inChannel").value = "";
  $("inMemo").value = "";
  /* v2.9c: 거래일 기본값 = 오늘 */
  $("inDealDate").value = new Date().toISOString().substring(0, 10);

  _items = [];
  _nextItemSeq = 1;
  addItemRow();

  /* 부대비용 초기화 (v2.8) */
  _extraCosts = [];
  renderExtraCosts();

  $("inSaveRate").value = 30; $("inSRate").value = 60; $("inMyRate").value = 40;
  $("inActualS_direct").value = 0; $("inSettlementMemo").value = "";
  $("inRebateRate").value = 30; $("inPayoutFee").value = 0;
  $("inSRate_ch").value = 60; $("inMyRate_ch").value = 40;
  $("inActualS_ch").value = 0; $("inSettlementMemo_ch").value = "";

  editingId = null;
  $("btnSave").textContent = "등록";
  $("btnCancel").style.display = "none";
  updateCockpit();
}

/* ── 이벤트 ── */
$("btnSave").addEventListener("click", saveTrade);
$("btnCancel").addEventListener("click", clearForm);

var _searchTimer = null;
$("fSearch").addEventListener("input", function() { clearTimeout(_searchTimer); _searchTimer = setTimeout(render, 200); });
$("fStatus").addEventListener("change", render);
$("fTradeClass").addEventListener("change", render);
$("fDealStatus").addEventListener("change", render);
$("fChannel").addEventListener("change", render);

/* v3.3: thead 정렬 클릭 */
document.querySelectorAll(".list-table thead .sortable").forEach(function(th) {
  th.addEventListener("click", function() {
    var key = th.dataset.sort;
    if (currentSortKey === key) {
      currentSortDir = currentSortDir === "desc" ? "asc" : "desc";
    } else {
      currentSortKey = key;
      currentSortDir = "desc";
    }
    _expandedId = null;
    render();
  });
});

/* v3.7: 칩 필터 바 클릭 이벤트 */
$("chipFilterBar").addEventListener("click", function(e) {
  var btn = e.target.closest("[data-chip-filter]");
  if (!btn) return;
  chipFilter = btn.dataset.chipFilter;
  $("chipFilterBar").querySelectorAll(".chip-filter").forEach(function(b) {
    b.classList.toggle("active", b.dataset.chipFilter === chipFilter);
  });
  _expandedId = null;
  render();
});

/* 크로스탭 동기화 */
window.addEventListener("storage", function(e) {
  if (e.key && e.key.startsWith("golab_")) { computeKPI(); render(); }
});

/* ── Init ── */
/* v2.9c: 거래일 기본값 = 오늘 */
$("inDealDate").value = new Date().toISOString().substring(0, 10);
/* v3.0: 초기 유형 상태 반영 (solo → 비율 필드 숨김) */
$("inTradeType").dispatchEvent(new Event("change"));
computeKPI();
render();
</script>
</body>
</html>
