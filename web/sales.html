<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 매출 관리</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--muted:#64748b;--text:#0f172a;
      --line:#e5e7eb;--accent:#16a34a;--warn:#d97706;--bad:#dc2626;--point:#2563eb;
      --chip:#f8fafc;--sales:#d97706;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial;}
    header{padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);z-index:10}
    header .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
    header h1{margin:0;font-size:16px;letter-spacing:.2px;color:var(--sales)}
    .tabs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .tab{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid var(--line);color:var(--muted);text-decoration:none;background:transparent;font-size:12px}
    .tab.active{color:var(--sales);background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.3)}
    .wrap{max-width:1440px;margin:0 auto;padding:16px 16px 36px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card h2{margin:0 0 12px;font-size:13px;color:var(--sales);display:flex;align-items:center;gap:8px}
    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
    .kpi{padding:14px;border-radius:10px;border:1px solid var(--line);background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .kpi .t{font-size:11px;color:var(--muted)}
    .kpi .v{margin-top:6px;font-size:24px;font-weight:600;color:var(--sales)}
    .kpi .v.blue{color:var(--point)}
    .kpi .sub{margin-top:4px;font-size:10px;color:var(--muted);font-weight:400}
    /* Form */
    .row{display:grid;gap:10px;margin-bottom:10px}
    .r2{grid-template-columns:1fr 1fr}
    .r3{grid-template-columns:1fr 1fr 1fr}
    .r4{grid-template-columns:1fr 1fr 1fr 1fr}
    .r5{grid-template-columns:1fr 1fr 1fr 1fr 1fr}
    label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700}
    label .opt{font-weight:400;color:#94a3b8}
    input,select{width:100%;border-radius:10px;border:1px solid var(--line);background:var(--chip);color:var(--text);padding:9px 10px;font-size:12px;outline:none;transition:border .2s}
    input:focus,select:focus{border-color:var(--sales)}
    input::placeholder{color:#94a3b8}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:10px 14px;font-size:12px;cursor:pointer;font-weight:700}
    button:hover{border-color:#cbd5e1;background:#f8fafc}
    button.primary{background:var(--sales);border:none;color:#fff}
    button.primary:hover{background:#b45309}
    button.save{background:var(--sales);border:none;color:#fff}
    button.danger{color:var(--bad);background:none;border:1px solid rgba(220,38,38,.3)}
    button.secondary{background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.25);color:var(--sales)}
    button:disabled{opacity:.5;cursor:not-allowed}
    /* Table */
    .tableWrap{overflow:auto;border-radius:10px;border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;min-width:1000px;font-size:12px}
    th{background:#f8fafc;color:var(--muted);text-align:left;padding:10px 12px;position:sticky;top:0;white-space:nowrap;z-index:2;border-bottom:1px solid var(--line)}
    th.num,td.num{text-align:right}
    td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:hover{background:rgba(217,119,6,.03)}
    .highlight{color:var(--sales);font-weight:900}
    .muted{color:var(--muted)}
    .mini{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
    /* Filter */
    .filter-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
    .filter-bar>div{flex:1;min-width:130px}
    .filter-bar .wide{flex:2;min-width:200px}
    .tools-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
    .stat-inline{font-size:11px;color:var(--muted);margin-left:auto}
    /* Pagination */
    .pagination{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:12px}
    .pagination button{padding:6px 12px;font-size:11px}
    .pagination .current{color:var(--sales);font-weight:900;font-size:12px}
    input[type="file"]{display:none}
    .note-box{padding:12px;background:rgba(217,119,6,.04);border-left:3px solid var(--sales);font-size:12px;color:var(--muted);line-height:1.6;border-radius:10px}
    @media(max-width:900px){
      .kpi-grid{grid-template-columns:1fr 1fr}
      .r4,.r5{grid-template-columns:1fr 1fr}
      .filter-bar{flex-direction:column}
    }
  </style>
</head>
<body>
<header>
  <div class="top">
    <h1>GoLab · 매출 관리</h1>
    <nav class="tabs">
      <a class="tab" href="./console.html">🏠 업무</a>
      <a class="tab" href="./calendar.html">📅 캘린더</a>
      <a class="tab" href="./profit.html">📊 수익</a>
      <a class="tab active" href="./sales.html">💰 매출</a>
      <a class="tab" href="./index.html">📦 재고</a>
      <a class="tab" href="./purchases.html">📥 입고</a>
      <a class="tab" href="./deal.html">🔥 기회</a>
    </nav>
  </div>
</header>
<div class="wrap">

  <!-- KPI -->
  <div class="card">
    <h2>💰 매출 현황</h2>
    <div class="kpi-grid">
      <div class="kpi">
        <div class="t">총 매출액</div>
        <div id="kTotal" class="v">₩ 0</div>
        <div id="kTotalSub" class="sub"></div>
      </div>
      <div class="kpi">
        <div class="t">매출 건수</div>
        <div id="kCount" class="v">0 건</div>
        <div id="kCountSub" class="sub"></div>
      </div>
      <div class="kpi">
        <div class="t">거래처 수</div>
        <div id="kClients" class="v">0</div>
        <div id="kClientsSub" class="sub"></div>
      </div>
      <div class="kpi">
        <div class="t">최근 매출일</div>
        <div id="kLatest" class="v blue">-</div>
        <div id="kLatestSub" class="sub"></div>
      </div>
    </div>
  </div>

  <!-- Input Form -->
  <div class="card">
    <h2>➕ 매출 등록</h2>
    <div class="row r4">
      <div>
        <label>매출일</label>
        <input id="inDate" type="date" />
      </div>
      <div>
        <label>판매처(거래처)</label>
        <input id="inClient" list="dlClient" placeholder="예: 대성금속" />
        <datalist id="dlClient"></datalist>
      </div>
      <div>
        <label>문서번호 <span class="opt">(선택)</span></label>
        <input id="inDocNo" placeholder="인보이스/PO 번호" />
      </div>
      <div>
        <label>품번 <span class="opt">(선택)</span></label>
        <input id="inPartNo" list="dlPartNo" placeholder="예: AGC-123" />
        <datalist id="dlPartNo"></datalist>
      </div>
    </div>
    <div class="row r5">
      <div>
        <label>상품명</label>
        <input id="inItem" list="dlItem" placeholder="예: Silver Powder 1kg" />
        <datalist id="dlItem"></datalist>
      </div>
      <div>
        <label>수량</label>
        <input id="inQty" type="number" step="0.01" placeholder="0" />
      </div>
      <div>
        <label>단위</label>
        <select id="inUnit">
          <option value="ea" selected>ea</option>
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="BOX">BOX</option>
          <option value="SET">SET</option>
          <option value="L">L</option>
          <option value="mL">mL</option>
        </select>
      </div>
      <div>
        <label>판매 단가 (KRW)</label>
        <input id="inPrice" type="number" step="1" placeholder="₩ 단가" />
      </div>
      <div>
        <label>비고 <span class="opt">(선택)</span></label>
        <input id="inMemo" placeholder="특이사항" />
      </div>
    </div>
    <div class="row r4">
      <div style="grid-column:span 2"></div>
      <div style="display:flex;align-items:flex-end;gap:8px">
        <button id="btnAdd" class="save" style="flex:1">등록</button>
        <button id="btnCancel" class="secondary" style="display:none;flex:1">취소</button>
      </div>
      <div>
        <div id="formCalc" class="mini" style="text-align:right;margin-top:0;padding-top:12px"></div>
      </div>
    </div>
  </div>

  <!-- List -->
  <div class="card">
    <h2>
      📋 매출 내역
      <span id="filterInfo" class="stat-inline"></span>
    </h2>
    <div class="filter-bar">
      <div class="wide">
        <label>검색 (상품명/품번/거래처/비고)</label>
        <input id="fSearch" placeholder="검색어 입력..." />
      </div>
      <div>
        <label>거래처</label>
        <select id="fClient"><option value="">전체</option></select>
      </div>
      <div>
        <label>시작일</label>
        <input id="fFrom" type="date" />
      </div>
      <div>
        <label>종료일</label>
        <input id="fTo" type="date" />
      </div>
    </div>
    <div class="tools-row">
      <button id="btnCsv" class="secondary" style="background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.3);color:var(--sales)">📥 엑셀 저장</button>
      <button id="btnExport" class="secondary">내보내기(JSON)</button>
      <button id="btnImport" class="secondary">가져오기(JSON)</button>
      <input id="fileIn" type="file" accept="application/json" />
      <button id="btnReset" class="danger">전체 초기화</button>
      <!-- 매출 Import 2-Phase 버튼 -->
      <button id="btnSalesDry" class="secondary"
        style="border-color:rgba(217,119,6,.4);color:#d97706;margin-left:16px">
        🔍 매출 DRY_RUN
      </button>
      <button id="btnSalesCommit" class="secondary"
        style="border-color:rgba(22,163,74,.4);color:#16a34a">
        ✅ 매출 COMMIT
      </button>
    </div>
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>매출일</th>
            <th>거래처</th>
            <th>문서번호</th>
            <th>품번</th>
            <th>상품명</th>
            <th class="num">수량</th>
            <th>단위</th>
            <th class="num">판매단가</th>
            <th class="num">매출액</th>
            <th>비고</th>
            <th style="text-align:right">관리</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pgArea"></div>
    <div class="mini">※ 매출액 = 수량 x 판매단가 (자동 계산)</div>
  </div>

  <!-- [CSV PATCH] 저장 상태 표시 -->
  <div id="saveStatus" style="text-align:center;padding:8px;font-size:11px;color:var(--sales);font-weight:600;opacity:0;transition:opacity .3s">💾 저장됨</div>

  <div class="note-box">
    💡 이 페이지는 <b>매출(판매) 관리</b> 전용입니다. 원가/마진 분석은 향후 수익 분석 모듈에서 별도 처리됩니다.
  </div>

  <!-- 매출 Import 리포트 영역 -->
  <div id="salesReport" class="card" style="display:none;font-family:monospace;white-space:pre-wrap;font-size:12px;line-height:1.6;max-height:500px;overflow:auto;margin-top:12px">
    <div id="salesReportBody"></div>
  </div>
</div>

<script src="js/costing.js"></script>
<script>
/* ── Constants ── */
const SALES_KEY = "golab_sales_v1";
const AUDIT_KEY = "golab_sales_audit";

/* ── 매출 Import 전용 키 (데이터 저장 분리) ── */
const SALES_IMPORT_RAW_KEY = "golab_sales_import_raw_log";
const SALES_IMPORTED_IDS_KEY = "golab_sales_imported_ids";
const INV_KEY = "golab_inventory_v01";
const IS_DEV = new URLSearchParams(location.search).has("dev");
const PAGE_SIZE = 50;
const DEBOUNCE_MS = 300;
const $ = id => document.getElementById(id);

/* ── Audit Log ── */
function emitAudit(event, detail){
  // event: CREATE | UPDATE | DELETE | IMPORTED
  try{
    const log = JSON.parse(localStorage.getItem(AUDIT_KEY)||"[]");
    log.push({
      event,
      ts: new Date().toISOString(),
      detail: detail || {}
    });
    if(log.length>2000) log.splice(0, log.length-2000);
    localStorage.setItem(AUDIT_KEY, JSON.stringify(log));
  }catch(e){ /* silent */ }
}

/* ── State ── */
let editingId = null;
let currentPage = 1;
let debounceTimer = null;
let _cache = null;

/* ── Init date ── */
$("inDate").value = new Date().toISOString().substring(0,10);

/* ── Helpers ── */
function n(v,fb=0){ const x=Number(v); return Number.isFinite(x)?x:fb; }
function esc(s){ return (s||"").replace(/</g,"&lt;"); }
function fmt(v){ return "\u20a9"+Math.round(v).toLocaleString(); }
function normStr(s){ return (s==null)?"":String(s).trim(); }
function normUpper(s){ return normStr(s).toUpperCase(); }
function normNum(v){
  if(v==null) return 0;
  if(typeof v==="number") return Number.isFinite(v)?v:0;
  const cleaned = String(v).replace(/[\u20a9,\s]/g,"");
  const x = Number(cleaned);
  return Number.isFinite(x)?x:0;
}
function normDate(v){
  if(!v) return "";
  if(v instanceof Date){
    const y=v.getFullYear(), m=String(v.getMonth()+1).padStart(2,"0"), d=String(v.getDate()).padStart(2,"0");
    return y+"-"+m+"-"+d;
  }
  if(typeof v==="number"){
    const base=new Date(1899,11,30);
    base.setDate(base.getDate()+Math.floor(v));
    const y=base.getFullYear(), m=String(base.getMonth()+1).padStart(2,"0"), d=String(base.getDate()).padStart(2,"0");
    return y+"-"+m+"-"+d;
  }
  let s=String(v).trim();
  s=s.replace(/^(\d{4})[./](\d{1,2})[./](\d{1,2})/, (_, y, m, d) =>
    y+"-"+m.padStart(2,"0")+"-"+d.padStart(2,"0")
  );
  if(s.length>=10) return s.substring(0,10);
  return s;
}

/* ── Storage ── */
function load(){
  if(_cache) return _cache;
  try{ _cache=JSON.parse(localStorage.getItem(SALES_KEY)||"[]"); }
  catch{ _cache=[]; }
  return _cache;
}
function save(data){
  _cache=data;
  localStorage.setItem(SALES_KEY,JSON.stringify(data));
}
function invalidateCache(){ _cache=null; }

/* ── Normalize record ── */
function normalizeRecord(r){
  const client = normStr(r.client || r.vendor || "");
  const partNo = normUpper(r.partNo);
  const itemName = normStr(r.itemName || r.product || "");
  return {
    id: r.id || crypto.randomUUID(),
    salesDate: normDate(r.salesDate || r.date || ""),
    client,
    docNo: normStr(r.docNo),
    partNo,
    itemName,
    qty: normNum(r.qty),
    unit: normStr(r.unit) || "ea",
    sellUnitPrice: normNum(r.sellUnitPrice || r.sellPrice || r.unitPrice || 0),
    memo: normStr(r.memo || r.note || ""),
    createdAt: r.createdAt || new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
}

/* ── Autocomplete ── */
function uniqueVals(key){
  return [...new Set(load().map(r=>normStr(r[key])).filter(Boolean))].sort();
}
function refreshAC(){
  const fill=(dlId,key)=>{
    const dl=$(dlId); dl.innerHTML="";
    uniqueVals(key).forEach(v=>{ const o=document.createElement("option"); o.value=v; dl.appendChild(o); });
  };
  fill("dlClient","client");
  fill("dlPartNo","partNo");
  fill("dlItem","itemName");
}

/* ── Filters ── */
function refreshFilterSelects(){
  const sel=$("fClient");
  const cur=sel.value;
  const opts=uniqueVals("client");
  sel.innerHTML='<option value="">전체</option>';
  opts.forEach(v=>{ const o=document.createElement("option"); o.value=v; o.textContent=v; sel.appendChild(o); });
  sel.value=cur;
}

function getFiltered(){
  let data=load();
  const q=($("fSearch").value||"").trim().toLowerCase();
  const client=$("fClient").value;
  const from=$("fFrom").value;
  const to=$("fTo").value;
  if(q){
    data=data.filter(r=>
      (r.itemName||"").toLowerCase().includes(q)||
      (r.partNo||"").toLowerCase().includes(q)||
      (r.client||"").toLowerCase().includes(q)||
      (r.memo||"").toLowerCase().includes(q)||
      (r.docNo||"").toLowerCase().includes(q)
    );
  }
  if(client) data=data.filter(r=>r.client===client);
  if(from) data=data.filter(r=>(r.salesDate||"")>=from);
  if(to) data=data.filter(r=>(r.salesDate||"")<=to);
  return data;
}

/* ── KPI ── */
function hasActiveFilter(){
  return !!($("fSearch").value||"").trim()
    || !!$("fClient").value
    || !!$("fFrom").value
    || !!$("fTo").value;
}
function computeKPI(){
  const all=load();
  const filtered=getFiltered();
  const isFiltered = hasActiveFilter();

  const calc=(arr)=>{
    let total=0; const clients=new Set(); let latest="";
    arr.forEach(r=>{
      total += n(r.sellUnitPrice)*n(r.qty);
      if(r.client) clients.add(r.client);
      if(r.salesDate && r.salesDate>latest) latest=r.salesDate;
    });
    return {total,count:arr.length,clients:clients.size,latest};
  };

  const a=calc(all);
  const f=isFiltered?calc(filtered):null;

  $("kTotal").textContent = fmt(a.total);
  $("kCount").textContent = a.count.toLocaleString()+" 건";
  $("kClients").textContent = a.clients.toLocaleString();
  $("kLatest").textContent = a.latest || "-";

  if(f){
    $("kTotalSub").textContent = "필터: "+fmt(f.total);
    $("kCountSub").textContent = "필터: "+f.count.toLocaleString()+" 건";
    $("kClientsSub").textContent = "필터: "+f.clients.toLocaleString();
    $("kLatestSub").textContent = "필터: "+(f.latest||"-");
  } else {
    $("kTotalSub").textContent="";
    $("kCountSub").textContent="";
    $("kClientsSub").textContent="";
    $("kLatestSub").textContent="";
  }
}

/* ── Form calc preview ── */
function updateFormCalc(){
  const qty=n($("inQty").value);
  const price=n($("inPrice").value);
  const el=$("formCalc");
  if(qty>0 && price>0){
    el.textContent="매출액: "+fmt(qty*price);
  } else {
    el.textContent="";
  }
}

/* ── Render ── */
function render(){
  const filtered=getFiltered();
  const total=load().length;
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(currentPage>totalPages) currentPage=totalPages;
  const start=(currentPage-1)*PAGE_SIZE;
  const page=filtered.slice(start,start+PAGE_SIZE);

  $("filterInfo").textContent = filtered.length===total
    ? total+"건"
    : filtered.length+" / "+total+"건 (필터 적용 중)";

  const tb=$("tbody");
  tb.innerHTML="";
  if(page.length===0){
    tb.innerHTML='<tr><td colspan="11" class="muted" style="text-align:center;padding:24px">데이터가 없습니다.</td></tr>';
  }
  page.forEach(r=>{
    const salesTotal=n(r.sellUnitPrice)*n(r.qty);
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td class="muted">${esc(r.salesDate)}</td>
      <td><b>${esc(r.client)}</b></td>
      <td class="muted">${esc(r.docNo)}</td>
      <td class="muted">${esc(r.partNo)}</td>
      <td>${esc(r.itemName)}</td>
      <td class="num">${n(r.qty).toLocaleString()}</td>
      <td class="muted">${esc(r.unit)}</td>
      <td class="num">${fmt(n(r.sellUnitPrice))}</td>
      <td class="num highlight">${fmt(salesTotal)}</td>
      <td class="muted">${esc(r.memo)}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="secondary" style="padding:5px 8px;font-size:11px" data-edit="${r.id}">수정</button>
        <button class="danger" style="padding:5px 8px;font-size:11px" data-del="${r.id}">삭제</button>
      </td>`;
    tb.appendChild(tr);
  });

  tb.querySelectorAll("button[data-del]").forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation(); deleteRecord(btn.dataset.del); };
  });
  tb.querySelectorAll("button[data-edit]").forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation(); startEdit(btn.dataset.edit); };
  });

  // Pagination
  const pg=$("pgArea");
  pg.innerHTML="";
  if(totalPages>1){
    const mk=(label,p,dis)=>{
      const b=document.createElement("button");
      b.textContent=label; b.className="secondary"; b.disabled=dis;
      b.onclick=()=>{ currentPage=p; render(); };
      return b;
    };
    pg.appendChild(mk("◀ 이전",currentPage-1,currentPage<=1));
    const s=document.createElement("span");
    s.className="current";
    s.textContent=currentPage+" / "+totalPages;
    pg.appendChild(s);
    pg.appendChild(mk("다음 ▶",currentPage+1,currentPage>=totalPages));
  }
}

/* ── CRUD ── */
function clearForm(){
  $("inDate").value=new Date().toISOString().substring(0,10);
  $("inClient").value=""; $("inDocNo").value=""; $("inPartNo").value="";
  $("inItem").value=""; $("inQty").value=""; $("inUnit").value="ea";
  $("inPrice").value=""; $("inMemo").value="";
  editingId=null;
  $("btnAdd").textContent="등록";
  $("btnCancel").style.display="none";
  $("formCalc").textContent="";
}

function addOrUpdate(){
  const client=normStr($("inClient").value);
  const itemName=normStr($("inItem").value);
  if(!client && !itemName){ alert("거래처 또는 상품명을 입력해주세요."); return; }

  const rec=normalizeRecord({
    id: editingId||undefined,
    salesDate: $("inDate").value,
    client,
    docNo: $("inDocNo").value,
    partNo: $("inPartNo").value,
    itemName,
    qty: $("inQty").value,
    unit: $("inUnit").value,
    sellUnitPrice: $("inPrice").value,
    memo: $("inMemo").value,
    createdAt: editingId ? (load().find(x=>x.id===editingId)||{}).createdAt : undefined
  });

  const all=load();
  if(editingId){
    const idx=all.findIndex(x=>x.id===editingId);
    if(idx>=0) all[idx]=rec;
    emitAudit("UPDATE",{id:rec.id, client:rec.client, itemName:rec.itemName});
  } else {
    all.unshift(rec);
    emitAudit("CREATE",{id:rec.id, client:rec.client, itemName:rec.itemName});
  }
  save(all);
  clearForm();
  refreshAC();
  refreshFilterSelects();
  computeKPI();
  render();
}

function startEdit(id){
  const r=load().find(x=>x.id===id);
  if(!r) return;
  editingId=r.id;
  $("inDate").value=r.salesDate||"";
  $("inClient").value=r.client||"";
  $("inDocNo").value=r.docNo||"";
  $("inPartNo").value=r.partNo||"";
  $("inItem").value=r.itemName||"";
  $("inQty").value=n(r.qty)||"";
  $("inUnit").value=r.unit||"ea";
  $("inPrice").value=n(r.sellUnitPrice)||"";
  $("inMemo").value=r.memo||"";
  $("btnAdd").textContent="저장";
  $("btnCancel").style.display="block";
  updateFormCalc();
  window.scrollTo({top:0,behavior:"smooth"});
}

function deleteRecord(id){
  if(!confirm("이 매출 기록을 삭제하시겠습니까?")) return;
  const target=load().find(x=>x.id===id);
  if(target) emitAudit("DELETE",{id, client:target.client, itemName:target.itemName});
  save(load().filter(x=>x.id!==id));
  refreshFilterSelects();
  computeKPI();
  render();
}

/* ── Import/Export ── */
function exportJson(){
  const data=localStorage.getItem(SALES_KEY)||"[]";
  const blob=new Blob([data],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="GoLab_Sales_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
}

/* ── Duplicate detection key ── */
function dupKey(r){
  return [r.salesDate, r.client, r.partNo, String(r.qty), String(r.sellUnitPrice)].join("|");
}

function importJson(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const raw=JSON.parse(reader.result);
      if(!Array.isArray(raw)) throw new Error("JSON 배열이 아닙니다.");
      let ok=0, skip=0, dup=0;
      const cleaned=[];

      const existing=load();
      const existingKeys=new Set(existing.map(r=>dupKey(r)));

      raw.forEach((r,i)=>{
        try{
          const rec=normalizeRecord(r);
          const key=dupKey(rec);
          if(existingKeys.has(key)){
            dup++;
            return;
          }
          existingKeys.add(key);
          cleaned.push(rec);
          ok++;
        }catch(e){
          skip++;
        }
      });

      if(skip>0) alert(skip+"건의 데이터가 형식 오류로 건너뛰었습니다.");
      const merged=[...cleaned,...existing];
      save(merged);
      invalidateCache();
      refreshAC();
      refreshFilterSelects();
      computeKPI();
      render();

      emitAudit("IMPORTED",{added:ok, duplicates:dup, skipped:skip, totalAfter:merged.length});

      let msg=ok+"건 가져오기 완료 (기존 "+existing.length+"건 + 신규 "+ok+"건 = 총 "+merged.length+"건)";
      if(dup>0) msg+="\n중복 건너뛰기: "+dup+"건";
      alert(msg);
    }catch(e){
      alert("JSON 형식 오류: "+e.message);
    }
  };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════════
   매출 Import 2-Phase (DRY_RUN / COMMIT)
   ═══════════════════════════════════════════════ */

/* ── 매출 Import Idempotency 해시 (8필드) ── */
function salesDupKey(r) {
  return [
    normStr(r.vendor || r.client || ""),
    normDate(r.saleDate || r.salesDate || ""),
    normUpper(r.itemCode || r.partNo || ""),
    String(normNum(r.qty)),
    String(normNum(r.unitPrice || r.sellUnitPrice)),
    normStr(r.currency || "KRW"),
    normStr(r.docType || "SALE"),
    String(r.sourceRowId || "")
  ].join("|");
}

function loadSalesImportedIds() {
  try { return new Set(JSON.parse(localStorage.getItem(SALES_IMPORTED_IDS_KEY) || "[]")); }
  catch { return new Set(); }
}
function saveSalesImportedIds(setObj) {
  localStorage.setItem(SALES_IMPORTED_IDS_KEY, JSON.stringify([...setObj]));
}

function showSalesReport(html) {
  $("salesReport").style.display = "";
  $("salesReportBody").innerHTML = html;
  $("salesReport").scrollIntoView({ behavior: "smooth" });
}

/* ── DRY_RUN: 검증만, 데이터 변경 없음 ── */
async function salesDryRun() {
  let raw;
  try {
    const res = await fetch("data/sales_import.json");
    raw = await res.json();
  } catch (e) {
    alert("매출 JSON 로드 실패: " + e.message);
    return;
  }
  if (!Array.isArray(raw) || raw.length === 0) {
    alert("매출 JSON이 비어있거나 배열이 아닙니다.");
    return;
  }

  // 원본 불변 저장 (deep copy)
  localStorage.setItem(SALES_IMPORT_RAW_KEY, JSON.stringify(JSON.parse(JSON.stringify(raw))));

  const importedIds = loadSalesImportedIds();
  const inv = JSON.parse(localStorage.getItem(INV_KEY) || "[]");

  const result = {
    total: raw.length,
    valid: 0,
    invalid: 0,
    dupSkip: 0,
    newCount: 0,
    totalAmount: 0,
    marginPreview: [],
    missingInv: [],
    goNoGo: true,
    errors: []
  };

  raw.forEach((r, i) => {
    const rowId = r.sourceRowId || (i + 1);

    // 필수 필드 검증: vendor 또는 itemName 중 1개 이상
    if (!normStr(r.vendor) && !normStr(r.itemName)) {
      result.invalid++;
      result.errors.push("행 " + rowId + ": vendor/itemName 모두 비어있음");
      return;
    }
    result.valid++;

    // idempotency 중복 체크
    const idemKey = r.idempotencyKey || salesDupKey(r);
    if (importedIds.has(idemKey)) {
      result.dupSkip++;
      return;
    }
    result.newCount++;

    const qty = normNum(r.qty);
    const unitPrice = normNum(r.unitPrice || r.sellUnitPrice);
    result.totalAmount += unitPrice * qty;

    // 마진 시뮬 (재고 avgPrice 조회)
    const itemCode = normUpper(r.itemCode || r.partNo || "");
    const itemName = normStr(r.itemName || "");
    let invItem = null;
    if (itemCode) invItem = inv.find(x => x.id === itemCode);
    if (!invItem && itemName) invItem = inv.find(x => normStr(x.name || "").indexOf(itemName.slice(0, 10)) >= 0);

    if (invItem) {
      const avgPrice = n(invItem.buyPrice);
      const margin = (unitPrice - avgPrice) * qty;
      const rate = unitPrice > 0 ? ((unitPrice - avgPrice) / unitPrice * 100).toFixed(1) : "N/A";
      result.marginPreview.push({ row: rowId, vendor: normStr(r.vendor), item: itemName.slice(0, 25), qty, unitPrice, avgPrice, margin, rate });
    } else if (itemCode || itemName) {
      result.missingInv.push({ row: rowId, code: itemCode, name: itemName.slice(0, 25) });
    }
  });

  // Go/No-Go: 형식 오류 10% 초과 → No-Go
  if (result.invalid > result.total * 0.1) result.goNoGo = false;

  // audit 기록
  emitAudit("SALES_IMPORT_DRY_RUN", {
    total: result.total, valid: result.valid, invalid: result.invalid,
    dupSkip: result.dupSkip, newCount: result.newCount,
    marginPreviewCount: result.marginPreview.length,
    missingInvCount: result.missingInv.length,
    goNoGo: result.goNoGo
  });

  // 리포트 생성
  let h = "";
  h += "<b>매출 Import DRY_RUN 리포트</b>  (" + new Date().toLocaleString("ko-KR") + ")\n";
  h += "────────────────────────────────────────────────────\n";
  h += "원본: " + result.total + "건 → SALES_IMPORT_RAW_KEY 저장 완료\n";
  h += "   유효: " + result.valid + "건 / 형식오류: " + result.invalid + "건\n";
  h += "Idempotency: 신규 " + result.newCount + "건 / 중복 스킵 " + result.dupSkip + "건\n";
  h += "신규 매출액 합계: " + Math.round(result.totalAmount).toLocaleString() + "원\n\n";

  h += result.goNoGo
    ? ">>> <b>Go</b> — COMMIT 가능 <<<\n\n"
    : ">>> <b>No-Go</b> — 형식 오류 비율 초과 (" + result.invalid + "/" + result.total + ") <<<\n\n";

  // 마진 미리보기 (상위 20건)
  if (result.marginPreview.length > 0) {
    h += "마진 미리보기 (재고 매칭 " + result.marginPreview.length + "건, display-only):\n";
    h += "────────────────────────────────────────────────────\n";
    result.marginPreview.slice(0, 20).forEach(m => {
      h += "  [" + m.row + "] " + m.vendor + " " + m.item + "\n";
      h += "    판매 " + m.unitPrice.toLocaleString() + " - 원가 " + m.avgPrice.toLocaleString();
      h += " = 마진 " + Math.round(m.margin).toLocaleString() + " (" + m.rate + "%)\n";
    });
    if (result.marginPreview.length > 20) h += "  ... 외 " + (result.marginPreview.length - 20) + "건\n";
    h += "\n";
  }

  // 재고 미매칭 경고
  if (result.missingInv.length > 0) {
    h += "재고 미매칭 (마진 계산 불가): " + result.missingInv.length + "건\n";
    result.missingInv.slice(0, 15).forEach(m => {
      h += "  [" + m.row + "] " + m.code + " " + m.name + "\n";
    });
    if (result.missingInv.length > 15) h += "  ... 외 " + (result.missingInv.length - 15) + "건\n";
    h += "\n";
  }

  // 오류
  if (result.errors.length > 0) {
    h += "오류 상세:\n";
    result.errors.slice(0, 10).forEach(e => { h += "  " + e + "\n"; });
    if (result.errors.length > 10) h += "  ... 외 " + (result.errors.length - 10) + "건\n";
  }

  h += "────────────────────────────────────────────────────\n";
  h += result.goNoGo ? ">>> [매출 COMMIT] 클릭하여 반영 <<<\n" : ">>> 형식 오류를 수정 후 재실행하세요 <<<\n";

  showSalesReport(h);
}

/* ── COMMIT: DRY_RUN 후 실제 저장 ── */
function salesCommit() {
  const rawStr = localStorage.getItem(SALES_IMPORT_RAW_KEY);
  if (!rawStr) {
    alert("DRY_RUN을 먼저 실행해주세요.");
    return;
  }
  const raw = JSON.parse(rawStr);
  if (!confirm("DRY_RUN 결과를 확인했습니까?\n" + raw.length + "건을 매출 데이터에 반영합니다.")) return;

  const importedIds = loadSalesImportedIds();
  const existing = load();

  const result = { added: 0, dupSkip: 0, failed: 0 };
  const newRecords = [];

  raw.forEach((r, i) => {
    const idemKey = r.idempotencyKey || salesDupKey(r);

    if (importedIds.has(idemKey)) {
      result.dupSkip++;
      return;
    }

    try {
      // 기존 normalizeRecord 재사용
      const memoParts = [normStr(r.memo)];
      if (r.docType && r.docType !== "SALE") memoParts.push("유형:" + r.docType);
      if (r.currency && r.currency !== "KRW") memoParts.push("통화:" + r.currency);
      if (r.vatIncluded) memoParts.push("VAT포함");
      if (r.priceBasis && r.priceBasis !== "SUPPLY") memoParts.push("기준:" + r.priceBasis);
      if (r.customerType && r.customerType !== "B2B") memoParts.push("구분:" + r.customerType);

      const rec = normalizeRecord({
        salesDate: r.saleDate || r.salesDate,
        client: r.vendor || r.client,
        docNo: r.docNo || "",
        partNo: r.itemCode || r.partNo || "",
        itemName: r.itemName || "",
        qty: r.qty,
        unit: r.unit || "ea",
        sellUnitPrice: r.unitPrice || r.sellUnitPrice,
        memo: memoParts.filter(Boolean).join(" / ")
      });

      newRecords.push(rec);
      importedIds.add(idemKey);
      result.added++;
    } catch (e) {
      result.failed++;
    }
  });

  // 저장
  const merged = [...newRecords, ...existing];
  save(merged);
  saveSalesImportedIds(importedIds);
  invalidateCache();
  refreshAC();
  refreshFilterSelects();
  computeKPI();
  render();

  // audit 기록
  emitAudit("SALES_IMPORT_COMMIT", {
    added: result.added, dupSkip: result.dupSkip, failed: result.failed,
    totalAfter: merged.length
  });

  // COMMIT 리포트
  let h = "";
  h += "<b>매출 COMMIT 결과</b>  (" + new Date().toLocaleString("ko-KR") + ")\n";
  h += "────────────────────────────────────────────────────\n";
  h += "매출 등록: +" + result.added + "건\n";
  h += "중복 스킵: " + result.dupSkip + "건\n";
  h += "실패: " + result.failed + "건\n";
  h += "총 매출 건수: " + merged.length + "건\n";
  showSalesReport(h);
}

/* ── Debounced filter ── */
function debouncedRender(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{
    currentPage=1;
    computeKPI();
    render();
  },DEBOUNCE_MS);
}

/* ═══════════════════════════════════════════════
   [CSV PATCH] 엑셀(CSV) 저장 + 저장 상태 표시
   ═══════════════════════════════════════════════ */

// CSV 다운로드 (UTF-8 BOM 포함 → 엑셀 한글 정상)
function exportCsv(){
  try{
    const data = load();
    if(!data.length){ alert("다운로드할 데이터가 없습니다."); return; }
    const headers = ["매출일","거래처","문서번호","품번","상품명","수량","단위","판매단가","매출액","비고"];
    const rows = data.map(r => [
      r.salesDate||"", r.client||"", r.docNo||"", r.partNo||"",
      r.itemName||"", n(r.qty), r.unit||"",
      n(r.sellUnitPrice), n(r.sellUnitPrice)*n(r.qty),
      r.memo||""
    ]);
    const csvContent = [headers, ...rows].map(row =>
      row.map(cell => '"' + String(cell).replace(/"/g,'""') + '"').join(",")
    ).join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], {type:"text/csv;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "GoLab_매출_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){ console.warn("[CSV PATCH] exportCsv error:", e); alert("CSV 저장 실패: "+e.message); }
}

// 저장 상태 플래시
let _saveStatusTimer = null;
function flashSaveStatus(){
  try{
    const el = $("saveStatus");
    if(!el) return;
    el.style.opacity = "1";
    clearTimeout(_saveStatusTimer);
    _saveStatusTimer = setTimeout(()=>{ el.style.opacity="0"; }, 2500);
  }catch(e){}
}

// 기존 save() 래핑 → 저장 시 상태 표시
const _origSave = save;
save = function(data){
  _origSave(data);
  flashSaveStatus();
};

// 버튼 바인딩
try{ $("btnCsv").onclick = exportCsv; }catch(e){}

refreshAC();
refreshFilterSelects();
computeKPI();
render();
