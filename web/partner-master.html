<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 거래처 관리</title>
  <link rel="stylesheet" href="./css/ui.css">
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--muted:#64748b;--text:#0f172a;
      --line:#e5e7eb;--accent:#16a34a;--warn:#d97706;--bad:#dc2626;--point:#2563eb;
      --chip:#f8fafc;--partner:#7c3aed;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial;}
    /* [GoLab v4.1] header/tabs → ui.css로 이동 */

    /* ═══════════════════════════════════════════
       v6.7: 좌측 사이드바 네비게이션 (6페이지 통합)
       — console/deals/profit v6.5~v6.6과 완전 동일한 블록
       — 상단 탭(.tabs)은 DOM 유지, CSS로만 비노출
       — auth-guard.js가 .tabs를 querySelector로 참조하므로 DOM 제거 금지
       ═══════════════════════════════════════════ */
    /* 상단 탭 비노출 (DOM 유지) */
    header .tabs{display:none !important}
    /* header 축소 — "GoLab" 타이틀 + 로그아웃 버튼만 */
    header{height:40px}
    header h1{font-size:14px}

    /* 앱 쉘: 사이드바 + 콘텐츠 2컬럼 */
    .app-shell{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 40px)}

    /* 사이드바 */
    .sidebar-nav-col{
      background:#111827;
      border-right:1px solid #1f2937;
      padding:18px 14px 24px;
      position:sticky;
      top:40px;
      height:calc(100vh - 40px);
      overflow-y:auto;
    }
    .sidebar-brand{
      display:flex;align-items:center;gap:8px;
      color:#f9fafb;font-size:11px;font-weight:700;
      letter-spacing:1px;text-transform:uppercase;
      padding:6px 12px 16px;opacity:.45;
    }
    .sidebar-nav{display:flex;flex-direction:column;gap:3px}
    .sidebar-nav-col .nav-item{
      display:flex;align-items:center;gap:12px;
      padding:0 14px;height:42px;border-radius:10px;
      color:#cbd5e1;font-size:13px;font-weight:600;
      text-decoration:none;white-space:nowrap;
      transition:background .15s,color .15s;
    }
    .sidebar-nav-col .nav-item:hover{background:#1f2937;color:#f9fafb}
    .sidebar-nav-col .nav-item.active{background:#1f2937;color:#ffffff;font-weight:700}
    .sidebar-nav-col .nav-item .ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}

    /* 페이지 콘텐츠 영역 */
    .page-content{min-width:0;background:var(--bg)}
    /* partner-master 전용: .wrap을 page-content 내부에서 정상 동작하도록 조정 */
    .page-content .wrap{max-width:none;margin:0;padding:20px 22px 36px}

    /* partner-master-shell 반응형: 1023px 이하 사이드바 상단 바로 축소 */
    @media(max-width:1023px){
      .app-shell{grid-template-columns:1fr}
      .sidebar-nav-col{
        position:static;height:auto;top:auto;
        padding:10px;border-right:none;border-bottom:1px solid #1f2937;
      }
      .sidebar-brand{display:none}
      .sidebar-nav{flex-direction:row;gap:4px;overflow-x:auto}
      .sidebar-nav-col .nav-item{
        padding:0 12px;height:36px;font-size:11px;flex-shrink:0;
      }
      .page-content .wrap{padding:14px}
      /* side-panel: 사이드바가 상단 바로 바뀌면 패널은 전체 폭 */
      .side-panel{width:100%;border-left:none}
    }

    .wrap{max-width:1440px;margin:0 auto;padding:16px 16px 36px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card h2{margin:0 0 12px;font-size:13px;color:var(--partner);display:flex;align-items:center;gap:8px}
    /* KPI */
    .kpi-row{display:flex;gap:10px;margin-bottom:16px;align-items:stretch}
    .kpi{padding:14px;border-radius:10px;border:1px solid var(--line);background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04);flex:1}
    .kpi .t{font-size:11px;color:var(--muted)}
    .kpi .v{margin-top:6px;font-size:24px;font-weight:600;color:var(--partner)}
    .btn-new{
      display:flex;align-items:center;justify-content:center;gap:6px;
      padding:14px 20px;border-radius:10px;border:2px dashed var(--partner);
      background:rgba(124,58,237,.04);color:var(--partner);font-size:13px;
      font-weight:800;cursor:pointer;white-space:nowrap;transition:background .2s;
    }
    .btn-new:hover{background:rgba(124,58,237,.1)}
    /* Form */
    .row{display:grid;gap:10px;margin-bottom:10px}
    .r2{grid-template-columns:1fr 1fr}
    .r3{grid-template-columns:1fr 1fr 1fr}
    label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700}
    label .opt{font-weight:400;color:#94a3b8}
    input,select,textarea{width:100%;border-radius:10px;border:1px solid var(--line);background:var(--chip);color:var(--text);padding:9px 10px;font-size:12px;outline:none;transition:border .2s;box-sizing:border-box}
    input:focus,select:focus,textarea:focus{border-color:var(--partner)}
    input::placeholder,textarea::placeholder{color:#94a3b8}
    textarea{min-height:36px;resize:vertical}
    button{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:10px 14px;font-size:12px;cursor:pointer;font-weight:700}
    button:hover{border-color:#cbd5e1;background:#f8fafc}
    button.save{background:var(--partner);border:none;color:#fff}
    button.save:hover{background:#6d28d9}
    button.danger{color:var(--bad);background:none;border:1px solid rgba(220,38,38,.3)}
    button.secondary{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.25);color:var(--partner)}
    button:disabled{opacity:.5;cursor:not-allowed}
    /* Table */
    .tableWrap{overflow:auto;border-radius:10px;border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:#f8fafc;color:var(--muted);text-align:left;padding:10px 12px;position:sticky;top:0;white-space:nowrap;z-index:2;border-bottom:1px solid var(--line)}
    td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:hover{background:rgba(124,58,237,.03)}
    tr.active-row{background:rgba(124,58,237,.06)}
    .muted{color:var(--muted)}
    .badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:var(--partner);color:#fff;border-radius:99px;min-width:20px;height:20px;padding:0 6px;margin-left:6px}
    .type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
    .type-badge.sell{background:rgba(217,119,6,.1);color:#92400e}
    .type-badge.buy{background:rgba(37,99,235,.1);color:#1d4ed8}
    .type-badge.both{background:rgba(124,58,237,.1);color:#6d28d9}
    /* 복사 버튼 */
    .copy-btn{
      display:inline-flex;align-items:center;justify-content:center;
      border:none;background:rgba(124,58,237,.08);color:var(--partner);
      border-radius:6px;padding:2px 6px;font-size:10px;cursor:pointer;
      margin-left:4px;vertical-align:middle;font-weight:400;position:relative;
    }
    .copy-btn:hover{background:rgba(124,58,237,.18)}
    /* Toast (복사 피드백) */
    .copy-toast{
      position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);
      background:var(--partner);color:#fff;font-size:10px;font-weight:700;
      padding:3px 8px;border-radius:6px;white-space:nowrap;
      opacity:0;transition:opacity .2s;pointer-events:none;
    }
    .copy-toast.show{opacity:1}
    /* Search */
    .search-bar{margin-bottom:12px}
    /* 섹션 구분 */
    .form-section{margin-bottom:4px}
    .form-section-label{font-size:10px;color:#94a3b8;margin-bottom:6px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

    /* ══ 사이드 패널 ══ */
    .panel-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90;
      opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;
    }
    .panel-overlay.open{opacity:1;visibility:visible}
    .side-panel{
      position:fixed;top:0;right:0;bottom:0;width:440px;
      background:var(--card);border-left:1px solid var(--line);
      box-shadow:-8px 0 30px rgba(0,0,0,.1);z-index:100;
      transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .side-panel.open{transform:translateX(0)}
    .sp-top{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 20px;border-bottom:1px solid var(--line);
      background:rgba(124,58,237,.03);flex-shrink:0;
    }
    .sp-top-title{font-size:14px;font-weight:800;color:var(--partner)}
    .sp-close{
      border:none;background:transparent;color:var(--muted);font-size:20px;
      cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1;
    }
    .sp-close:hover{background:rgba(0,0,0,.06);color:var(--text)}
    .sp-body{flex:1;overflow-y:auto;padding:0}
    /* 패널 내부 섹션 */
    .sp-section{padding:16px 20px;border-bottom:1px solid var(--line)}
    .sp-section:last-child{border-bottom:none}
    .sp-section-title{font-size:11px;font-weight:700;color:var(--partner);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    /* 패널 View: 상태 요약 */
    .sp-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .sp-header .sp-name{font-size:16px;font-weight:800;color:var(--text)}
    .sp-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:11px;color:var(--muted);margin-bottom:12px}
    .sp-info-grid b{color:var(--text);font-weight:600}
    /* 정산 정보 */
    .sp-settle-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:11px;color:var(--muted)}
    .sp-settle-grid b{color:var(--text);font-weight:600}
    .sp-settle-item{display:flex;align-items:center;gap:4px;position:relative}
    /* KPI 바 */
    .sp-kpi-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
    .sp-kpi{padding:8px;border-radius:8px;text-align:center;border:1px solid var(--line);background:var(--chip)}
    .sp-kpi .spk-label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .sp-kpi .spk-value{font-size:18px;font-weight:800;margin-top:2px}
    .sp-kpi .spk-value.purple{color:var(--partner)}
    .sp-kpi .spk-value.red{color:var(--bad)}
    .sp-kpi .spk-value.green{color:var(--accent)}
    /* 경고 플래그 */
    .sp-warnings{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .sp-warn-flag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
    /* 히스토리 테이블 */
    .sp-history table{width:100%;border-collapse:collapse;font-size:11px}
    .sp-history th{background:#f8fafc;color:var(--muted);padding:6px 8px;text-align:left;border-bottom:1px solid var(--line);font-size:10px}
    .sp-history td{padding:6px 8px;border-bottom:1px solid var(--line)}
    .sp-history .h-amt{text-align:right;font-weight:700;color:var(--text)}
    .sp-history .h-status{text-align:center}
    .sp-deposit-badge{display:inline-block;padding:2px 6px;border-radius:999px;font-size:9px;font-weight:700}
    .sp-deposit-badge.paid{background:#dcfce7;color:#166534}
    .sp-deposit-badge.unpaid{background:#fee2e2;color:#991b1b}
    .sp-deposit-badge.progress{background:#fef3c7;color:#92400e}
    /* 패널 Edit: 폼 버튼 */
    .sp-form-btns{display:flex;gap:8px;margin-top:8px;padding:16px 20px;border-top:1px solid var(--line);flex-shrink:0;background:var(--card)}

    /* ══ 반응형 (v6.7: 사이드바 220px만큼 +220 이동) ══ */
    @media(max-width:1120px){
      .kpi-row{flex-wrap:wrap}
      .kpi{min-width:calc(50% - 5px)}
      .r3{grid-template-columns:1fr 1fr}
      .sp-kpi-bar{grid-template-columns:1fr 1fr}
      .sp-info-grid{grid-template-columns:1fr}
    }
    /* side-panel 100% 전환은 사이드바 해체 시점(@1023)과 맞춰서 위 블록으로 이동 */
    @media(max-width:820px){
      .r3{grid-template-columns:1fr}
      .r2{grid-template-columns:1fr}
      .kpi{min-width:100%}
      .sp-kpi-bar{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<!-- GoLab Auth Guard — 인증 전 화면 차단 -->
<div id="golab-auth-wall" style="position:fixed;inset:0;z-index:9999;background:#f5f7fa;display:flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .3s,visibility .3s"></div>
<header data-title="GoLab · 거래처 관리"></header>
<script src="./js/navbar.js"></script>

<!-- ═══ v6.7: 좌측 사이드바 + 페이지 콘텐츠 쉘 ═══ -->
<div class="app-shell">
  <aside class="sidebar-nav-col">
    <div class="sidebar-brand">GoLab</div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="./console.html"><span class="ni-icon">🏠</span>메인</a>
      <a class="nav-item" href="./deals.html"><span class="ni-icon">🔥</span>거래</a>
      <a class="nav-item" href="./item-master.html"><span class="ni-icon">🏷</span>품목</a>
      <a class="nav-item" href="./index.html"><span class="ni-icon">📦</span>재고</a>
      <a class="nav-item" href="./profit.html"><span class="ni-icon">💰</span>수익</a>
      <a class="nav-item active" href="./partner-master.html"><span class="ni-icon">👥</span>거래처</a>
    </nav>
  </aside>
  <main class="page-content">
<div class="wrap">
  <!-- KPI + 신규등록 버튼 -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="t">전체 거래처</div>
      <div class="v" id="kTotal">0</div>
    </div>
    <div class="kpi">
      <div class="t">매출처</div>
      <div class="v" id="kSell">0</div>
    </div>
    <div class="kpi">
      <div class="t">매입처</div>
      <div class="v" id="kBuy">0</div>
    </div>
    <button class="btn-new" id="btnNew">+ 신규 등록</button>
  </div>

  <!-- 목록 -->
  <div class="card">
    <h2>📋 거래처 목록 <span class="badge" id="listBadge">0</span>
      <span style="flex:1"></span>
      <button id="btnMigrate" class="secondary" style="padding:5px 10px;font-size:10px">📥 매출에서 가져오기</button>
    </h2>
    <div class="search-bar">
      <input id="fSearch" placeholder="거래처명/별칭/지역/담당자/전화/메모 검색..." />
    </div>
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>거래처명</th>
            <th>지역</th>
            <th>담당자</th>
            <th>전화번호</th>
            <th>유형</th>
            <th style="text-align:right">관리</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="emptyMsg" class="muted" style="text-align:center;padding:24px;display:none">등록된 거래처가 없습니다.</div>
  </div>
</div>
  </main>
</div>
<!-- ═══ /v6.7: 사이드바 + 콘텐츠 쉘 끝 (side-panel은 app-shell 바깥 유지) ═══ -->

<!-- ══ 사이드 패널 (오버레이 + 패널) ══ -->
<div class="panel-overlay" id="panelOverlay"></div>
<div class="side-panel" id="sidePanel">
  <div class="sp-top">
    <span class="sp-top-title" id="panelTitle">거래처 등록</span>
    <button class="sp-close" id="panelClose">&times;</button>
  </div>
  <div class="sp-body" id="panelBody">
    <!-- View 섹션: 동적 렌더링 -->
    <div id="panelView" class="sp-section" style="display:none"></div>
    <!-- History 섹션: 동적 렌더링 -->
    <div id="panelHistory" class="sp-section" style="display:none"></div>
    <!-- Edit 섹션: 폼 -->
    <div class="sp-section">
      <div class="sp-section-title">기본 정보</div>
      <div class="row r2">
        <div>
          <label>거래처명 *</label>
          <input id="inName" placeholder="예: 대성금속" />
        </div>
        <div>
          <label>유형</label>
          <select id="inType">
            <option value="매출처" selected>매출처</option>
            <option value="매입처">매입처</option>
            <option value="겸용">겸용</option>
          </select>
        </div>
      </div>
      <div class="row r2">
        <div>
          <label>별칭 <span class="opt">(선택)</span></label>
          <input id="inAlias" placeholder="예: 시흥공장" />
        </div>
        <div>
          <label>지역 <span class="opt">(선택)</span></label>
          <input id="inRegion" placeholder="예: 시흥, 도쿄" />
        </div>
      </div>
      <!-- v5.4: partner_tag 입력 (수익탭 주요거래처 분류용) -->
      <div class="row">
        <div>
          <label>태그 <span class="opt">(선택)</span></label>
          <input id="inPartnerTag" placeholder="예: daesung (수익탭 분류용)" />
        </div>
      </div>
      <div class="row r2" style="margin-top:8px">
        <div>
          <label>기본 거래유형 <span class="opt">(선택)</span></label>
          <select id="inDefaultTradeType">
            <option value="">없음</option>
            <option value="solo">직접-단독</option>
            <option value="settle">직접-정산</option>
            <option value="channel">관리업체</option>
          </select>
        </div>
        <div>
          <label>대표 거래처 <span class="opt">(신규 거래 기본 선택)</span></label>
          <label style="display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--chip);font-size:12px;font-weight:500;color:var(--text);cursor:pointer">
            <input type="checkbox" id="inIsPrimary" style="width:auto;margin:0" />
            신규 거래 기본 거래처
          </label>
        </div>
      </div>

      <div class="sp-section-title" style="margin-top:12px">연락 정보</div>
      <div class="row r2">
        <div>
          <label>담당자명 <span class="opt">(선택)</span></label>
          <input id="inContactName" placeholder="예: 김철수" />
        </div>
        <div>
          <label>전화번호 <span class="opt">(선택)</span></label>
          <input id="inPhone" placeholder="예: 01012345678" />
        </div>
      </div>
      <div class="row r2">
        <div>
          <label>부서 <span class="opt">(선택)</span></label>
          <input id="inDept" placeholder="예: 영업1팀" />
        </div>
        <div>
          <label>이메일 <span class="opt">(선택)</span></label>
          <input id="inEmail" placeholder="예: kim@company.com" type="email" />
        </div>
      </div>

      <div class="sp-section-title" style="margin-top:12px">정산 정보</div>
      <div class="row r2">
        <div>
          <label>은행명 <span class="opt">(선택)</span></label>
          <input id="inBankName" placeholder="예: 국민은행" />
        </div>
        <div>
          <label>예금주 <span class="opt">(선택)</span></label>
          <input id="inAccountHolder" placeholder="예: 홍길동" />
        </div>
      </div>
      <div class="row r2">
        <div>
          <label>계좌번호 <span class="opt">(선택)</span></label>
          <input id="inAccountNumber" placeholder="예: 12345678901234" />
        </div>
        <div>
          <label>정산 이메일 <span class="opt">(선택)</span></label>
          <input id="inBillingEmail" placeholder="예: billing@company.com" type="email" />
        </div>
      </div>

      <div class="sp-section-title" style="margin-top:12px">메모</div>
      <div class="row">
        <div>
          <textarea id="inMemo" placeholder="메모" rows="2"></textarea>
        </div>
      </div>
    </div>
  </div>
  <!-- 패널 하단 버튼 -->
  <div class="sp-form-btns">
    <button id="btnSave" class="save">등록</button>
    <button id="btnCancel" class="secondary">취소</button>
    <div style="flex:1"></div>
    <button id="btnPanelDelete" class="danger" style="display:none">삭제</button>
  </div>
</div>

<!-- Firebase SDK (CDN) — 미로드 시 local 모드로 자동 fallback -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/storage-adapter.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/channel-master.js"></script>
<script src="js/deal-tracker.js?v=5"></script>
<script src="js/partner-master.js?v=4"></script>
<script>
/* ══════════════════════════════════════════
   GoLab v4.1 거래처 운영 조종석
   — 사이드패널 (View + History + Edit)
   ══════════════════════════════════════════ */
var $ = function(id){ return document.getElementById(id); };
var editingId = null;
var _panelOpen = false;
var _savedScrollY = 0;

/* ── 모바일 감지 ── */
var _isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

/* ══════════════════════════════════════
   KPI
   ══════════════════════════════════════ */
function computeKPI(){
  var all = GoLabPartnerMaster.loadAll();
  $("kTotal").textContent = all.length;
  $("kSell").textContent = all.filter(function(p){ return p.type === "매출처" || p.type === "겸용"; }).length;
  $("kBuy").textContent = all.filter(function(p){ return p.type === "매입처" || p.type === "겸용"; }).length;
}

/* ══════════════════════════════════════
   유틸리티
   ══════════════════════════════════════ */
function typeClass(t){
  if(t === "매입처") return "buy";
  if(t === "매출처") return "sell";
  return "both";
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function fmtAmt(v){
  return "\u20a9" + Math.round(v).toLocaleString();
}

/* ── 전화번호 표시 ── */
function renderPhone(digits){
  if(!digits) return "";
  var formatted = GoLabPartnerMaster.formatPhone(digits);
  if(_isMobile){
    return '<a href="javascript:void(0)" class="tel-link" data-tel="' + esc(digits) + '" style="color:var(--partner);text-decoration:none">' + esc(formatted) + '</a>';
  }
  return esc(formatted) + ' <button class="copy-btn" data-copy="' + esc(digits) + '" title="복사">📋<span class="copy-toast">복사됨</span></button>';
}

/* ── 이메일 표시 (.mailto-link 패턴) ── */
function renderEmail(email){
  if(!email) return "";
  return '<a href="javascript:void(0)" class="mailto-link" data-email="' + esc(email) + '" style="color:var(--partner);text-decoration:none;font-size:11px">' + esc(email) + '</a>' +
         ' <button class="copy-btn" data-copy="' + esc(email) + '" title="복사">📋<span class="copy-toast">복사됨</span></button>';
}

/* ── 계좌번호 마스킹 (목록용) ── */
function maskAccount(num){
  if(!num) return "";
  if(num.length <= 4) return "****";
  return "****" + num.slice(-4);
}

/* ── 계좌번호 전체 표시 + 복사 (패널용) ── */
function renderAccountFull(num){
  if(!num) return '<span class="muted">-</span>';
  return '<b>' + esc(num) + '</b> <button class="copy-btn" data-copy="' + esc(num) + '" title="복사">📋<span class="copy-toast">복사됨</span></button>';
}

/* ══════════════════════════════════════
   목록 렌더링
   ══════════════════════════════════════ */
function render(){
  var all = GoLabPartnerMaster.loadAll();
  var q = ($("fSearch").value||"").trim();
  var filtered = all;
  if(q){
    var qNorm = GoLabPartnerMaster.normalize(q);
    filtered = all.filter(function(p){
      return (p.search_text || "").includes(qNorm);
    });
  }

  $("listBadge").textContent = filtered.length;
  var tb = $("tbody");

  if(filtered.length === 0){
    tb.innerHTML = "";
    $("emptyMsg").style.display = "block";
    return;
  }

  $("emptyMsg").style.display = "none";
  var html = "";
  filtered.forEach(function(p, i){
    /* 패널에서 편집 중인 행 하이라이트 */
    var rowClass = (editingId === p.partner_id) ? ' class="active-row"' : '';
    html += '<tr' + rowClass + ' data-pid="' + p.partner_id + '" style="cursor:pointer">' +
      '<td class="muted">' + (i+1) + '</td>' +
      '<td><b>' + esc(p.display_name || p.name) + '</b></td>' +
      '<td class="muted">' + esc(p.region) + '</td>' +
      '<td class="muted">' + esc(p.contact_name) + '</td>' +
      '<td class="muted">' + renderPhone(p.phone) + '</td>' +
      '<td><span class="type-badge ' + typeClass(p.type) + '">' + esc(p.type) + '</span></td>' +
      '<td style="text-align:right;white-space:nowrap">' +
        '<button class="danger" style="padding:5px 8px;font-size:11px" data-del="' + p.partner_id + '">삭제</button>' +
      '</td>' +
    '</tr>';
  });
  tb.innerHTML = html;

  /* 이벤트 바인딩 — 행 클릭 → 패널 열기 (삭제·복사 버튼 제외) */
  tb.querySelectorAll("tr[data-pid]").forEach(function(tr){
    tr.onclick = function(e){
      /* 삭제 버튼이나 복사 버튼 클릭은 무시 */
      /* 삭제·복사·전화링크 클릭은 행 클릭 무시 */
      if(e.target.closest("button[data-del]") || e.target.closest(".copy-btn") || e.target.closest(".tel-link")) return;
      openPanel(tr.dataset.pid);
    };
  });
  tb.querySelectorAll("button[data-del]").forEach(function(btn){
    btn.onclick = function(e){ e.stopPropagation(); deletePartner(btn.dataset.del); };
  });
}

/* ══════════════════════════════════════
   사이드 패널 — 열기 / 닫기
   ══════════════════════════════════════ */

/** 패널 열기 — partnerId가 있으면 수정, 없으면 신규 */
function openPanel(partnerId){
  _savedScrollY = window.scrollY;
  editingId = partnerId || null;
  var p = partnerId ? GoLabPartnerMaster.getById(partnerId) : null;

  /* 패널 타이틀 */
  $("panelTitle").textContent = p ? (p.display_name || p.name) : "거래처 등록";
  $("btnSave").textContent = p ? "저장" : "등록";
  $("btnPanelDelete").style.display = p ? "inline-block" : "none";

  /* View 섹션 */
  if(p){
    $("panelView").innerHTML = buildPanelView(p);
    $("panelView").style.display = "";
  } else {
    $("panelView").style.display = "none";
    $("panelView").innerHTML = "";
  }

  /* History 섹션 */
  if(p){
    $("panelHistory").innerHTML = buildPanelHistory(p);
    $("panelHistory").style.display = "";
  } else {
    $("panelHistory").style.display = "none";
    $("panelHistory").innerHTML = "";
  }

  /* Edit 폼 채우기 */
  fillForm(p);

  /* 패널 열기 */
  $("panelOverlay").classList.add("open");
  $("sidePanel").classList.add("open");
  _panelOpen = true;

  /* 목록에서 편집 중인 행 하이라이트 */
  render();

  /* 첫 입력에 포커스 */
  setTimeout(function(){ $("inName").focus(); }, 300);
}

/** 패널 닫기 */
function closePanel(){
  $("panelOverlay").classList.remove("open");
  $("sidePanel").classList.remove("open");
  _panelOpen = false;
  editingId = null;
  clearForm();
  render();
  /* 스크롤 위치 복원 */
  window.scrollTo(0, _savedScrollY);
}

/* ══════════════════════════════════════
   패널 View 섹션 — 상태 요약 + 정산 정보
   ══════════════════════════════════════ */
function buildPanelView(p){
  var stats = GoLabPartnerMaster.calcPartnerStats(p.partner_id);
  var html = '';

  /* 헤더: 거래처명 + 유형 */
  html += '<div class="sp-header">';
  html += '<span class="sp-name">' + esc(p.display_name || p.name) + '</span>';
  html += '<span class="type-badge ' + typeClass(p.type) + '">' + esc(p.type) + '</span>';
  html += '</div>';

  /* 기본 정보 그리드 */
  html += '<div class="sp-info-grid">';
  if(p.alias)        html += '<span><b>별칭:</b> ' + esc(p.alias) + '</span>';
  if(p.region)       html += '<span><b>지역:</b> ' + esc(p.region) + '</span>';
  if(p.contact_name) html += '<span><b>담당자:</b> ' + esc(p.contact_name) + '</span>';
  if(p.dept)         html += '<span><b>부서:</b> ' + esc(p.dept) + '</span>';
  if(p.phone)        html += '<span><b>전화:</b> ' + renderPhone(p.phone) + '</span>';
  if(p.email)        html += '<span><b>이메일:</b> ' + renderEmail(p.email) + '</span>';
  if(p.partner_tag)  html += '<span><b>태그:</b> ' + esc(p.partner_tag) + '</span>';
  if(p.memo)         html += '<span><b>메모:</b> ' + esc(p.memo) + '</span>';
  var regDate = p.created_at ? p.created_at.substring(0,10) : "-";
  html += '<span><b>등록일:</b> ' + regDate + '</span>';
  html += '</div>';

  /* ── 정산/연락 정보 ── */
  if(p.bank_name || p.account_holder || p.account_number || p.billing_email){
    html += '<div class="sp-section-title" style="margin-top:4px">정산 정보</div>';
    html += '<div class="sp-settle-grid">';
    if(p.bank_name)      html += '<span class="sp-settle-item"><b>은행:</b>&nbsp;' + esc(p.bank_name) + '</span>';
    if(p.account_holder) html += '<span class="sp-settle-item"><b>예금주:</b>&nbsp;' + esc(p.account_holder) + '</span>';
    if(p.account_number) html += '<span class="sp-settle-item"><b>계좌:</b>&nbsp;' + renderAccountFull(p.account_number) + '</span>';
    if(p.billing_email)  html += '<span class="sp-settle-item"><b>정산메일:</b>&nbsp;' + renderEmail(p.billing_email) + '</span>';
    html += '</div>';
  }

  /* KPI 바 */
  html += '<div class="sp-kpi-bar" style="margin-top:12px">';
  html += '<div class="sp-kpi"><div class="spk-label">누적 매출</div><div class="spk-value purple">' + fmtAmt(stats.totalAmount) + '</div></div>';
  html += '<div class="sp-kpi"><div class="spk-label">미입금</div><div class="spk-value ' + (stats.receivableAmount > 0 ? 'red' : 'green') + '">' + fmtAmt(stats.receivableAmount) + '</div></div>';
  html += '<div class="sp-kpi"><div class="spk-label">거래 건수</div><div class="spk-value purple">' + stats.txCount + '건</div></div>';
  html += '</div>';

  /* 경고 플래그 */
  if(stats.receivableCount > 0){
    html += '<div class="sp-warnings">';
    html += '<span class="sp-warn-flag">\u26a0 입금 대기 ' + stats.receivableCount + '건 (' + fmtAmt(stats.receivableAmount) + ')</span>';
    html += '</div>';
  }

  return html;
}

/* ══════════════════════════════════════
   패널 History 섹션 — 최근 거래 3건
   ══════════════════════════════════════ */
function buildPanelHistory(p){
  var stats = GoLabPartnerMaster.calcPartnerStats(p.partner_id);
  var html = '<div class="sp-section-title">최근 거래</div>';

  /* deals 기반 최근 3건 */
  var deals = stats.recentDeals.slice(0, 3);
  if(deals.length > 0){
    html += '<div class="sp-history"><table><thead><tr><th>날짜</th><th>품목</th><th style="text-align:right">공급가</th><th style="text-align:center">상태</th></tr></thead><tbody>';
    deals.forEach(function(deal){
      var dDate = deal.quote_at || deal.created_at || "";
      if(dDate.length > 10) dDate = dDate.substring(0,10);
      /* v3.8: items[] 배열 대응 */
      var itemName = (deal.items && deal.items.length > 0) ? deal.items[0].name : (deal.item_name || "");
      var amt = 0;
      if(deal.items && deal.items.length > 0){
        deal.items.forEach(function(it){ amt += Number(it.supply_amount) || Math.round((Number(it.qty)||0)*(Number(it.unit_price)||0)); });
      } else {
        amt = Number(deal.supply_amount) || 0;
      }
      var statusLabel = "진행";
      var statusClass = "progress";
      if(deal.deal_status === "completed"){ statusLabel = "완료"; statusClass = "paid"; }
      else if(deal.payment_at){ statusLabel = "입금"; statusClass = "paid"; }
      else if(deal.invoice_at){ statusLabel = "미입금"; statusClass = "unpaid"; }
      html += '<tr>';
      html += '<td class="muted">' + esc(dDate) + '</td>';
      html += '<td>' + esc(itemName) + '</td>';
      html += '<td class="h-amt">' + fmtAmt(amt) + '</td>';
      html += '<td class="h-status"><span class="sp-deposit-badge ' + statusClass + '">' + statusLabel + '</span></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
  }

  /* sales 폴백 */
  if(stats.useSalesFallback && stats.sales.recentTx.length > 0){
    var salesTx = stats.sales.recentTx.slice(0, 3);
    html += '<div class="sp-history"><table><thead><tr><th>매출일</th><th>상품명</th><th style="text-align:right">매출액</th><th style="text-align:center">입금</th></tr></thead><tbody>';
    salesTx.forEach(function(r){
      var amt = (Number(r.sellUnitPrice)||0) * (Number(r.qty)||0);
      var isPaid = r.deposit_date != null;
      html += '<tr>';
      html += '<td class="muted">' + esc(r.salesDate) + '</td>';
      html += '<td>' + esc(r.itemName) + '</td>';
      html += '<td class="h-amt">' + fmtAmt(amt) + '</td>';
      html += '<td class="h-status"><span class="sp-deposit-badge ' + (isPaid?'paid':'unpaid') + '">' + (isPaid?'입금':'미입금') + '</span></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    html += '<div style="font-size:9px;color:var(--warn);margin-top:4px;text-align:right">[레거시 매출 데이터]</div>';
    html += '</div>';
    return html;
  }

  /* 거래 데이터 없음 */
  html += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">최근 거래 내역이 없습니다</div>';
  return html;
}

/* ══════════════════════════════════════
   폼 채우기 / 비우기
   ══════════════════════════════════════ */
function fillForm(p){
  if(!p){
    clearForm();
    return;
  }
  $("inName").value          = p.name || "";
  $("inType").value          = p.type || "매출처";
  $("inAlias").value         = p.alias || "";
  $("inRegion").value        = p.region || "";
  $("inContactName").value   = p.contact_name || "";
  $("inPhone").value         = GoLabPartnerMaster.formatPhone(p.phone || "");
  $("inDept").value          = p.dept || "";
  $("inEmail").value         = p.email || "";
  $("inBankName").value      = p.bank_name || "";
  $("inAccountHolder").value = p.account_holder || "";
  $("inAccountNumber").value = p.account_number || "";
  $("inBillingEmail").value  = p.billing_email || "";
  $("inPartnerTag").value       = p.partner_tag || "";
  $("inDefaultTradeType").value = p.default_trade_type || "";
  $("inIsPrimary").checked      = p.is_primary === true;
  $("inMemo").value             = p.memo || "";
}

function clearForm(){
  $("inName").value          = "";
  $("inType").value          = "매출처";
  $("inAlias").value         = "";
  $("inRegion").value        = "";
  $("inContactName").value   = "";
  $("inPhone").value         = "";
  $("inDept").value          = "";
  $("inEmail").value         = "";
  $("inBankName").value      = "";
  $("inAccountHolder").value = "";
  $("inAccountNumber").value = "";
  $("inBillingEmail").value  = "";
  $("inPartnerTag").value       = "";
  $("inDefaultTradeType").value = "";
  $("inIsPrimary").checked      = false;
  $("inMemo").value             = "";
  editingId = null;
}

/* ══════════════════════════════════════
   CRUD
   ══════════════════════════════════════ */
function savePartner(){
  var name = $("inName").value.trim();
  if(!name){ alert("거래처명을 입력해주세요."); $("inName").focus(); return; }

  var fields = {
    name:           name,
    type:           $("inType").value,
    alias:          $("inAlias").value,
    region:         $("inRegion").value,
    contact_name:   $("inContactName").value,
    phone:          $("inPhone").value,
    dept:           $("inDept").value,
    email:          $("inEmail").value,
    bank_name:      $("inBankName").value,
    account_holder: $("inAccountHolder").value,
    account_number: $("inAccountNumber").value,
    billing_email:  $("inBillingEmail").value,
    partner_tag:        $("inPartnerTag").value,
    default_trade_type: ($("inDefaultTradeType").value || "").trim(),
    is_primary:         $("inIsPrimary").checked === true,
    memo:               $("inMemo").value
  };

  try{
    if(editingId){
      GoLabPartnerMaster.update(editingId, fields);
    } else {
      GoLabPartnerMaster.create(fields);
    }
    closePanel();
    computeKPI();
    render();
  } catch(err){
    alert("저장 실패: " + err.message);
  }
}

function deletePartner(partnerId){
  var p = GoLabPartnerMaster.getById(partnerId);
  if(!p) return;
  if(!confirm('"' + (p.display_name || p.name) + '" 거래처를 삭제하시겠습니까?')) return;
  GoLabPartnerMaster.remove(partnerId);
  /* 패널 열려있으면 닫기 */
  if(_panelOpen && editingId === partnerId) closePanel();
  computeKPI();
  render();
}

/* ── 마이그레이션 ── */
function runMigration(){
  if(!confirm("매출 데이터에서 거래처를 자동 추출합니다.\n기존 거래처와 중복되지 않게 처리됩니다. 실행할까요?")) return;
  var result = GoLabPartnerMaster.migrateFromSales();
  alert(
    "마이그레이션 완료!\n" +
    "• 새로 생성: " + result.created + "건\n" +
    "• 기존 유지: " + result.existing + "건\n" +
    "• 전체: " + result.total + "건\n" +
    "• 매출 레코드 backfill: " + result.backfilled + "건"
  );
  computeKPI();
  render();
}

/* ══════════════════════════════════════
   글로벌 이벤트
   ══════════════════════════════════════ */

/* ── Toast 복사 / 전화 / 이메일 ── */
document.addEventListener("click", function(e){
  /* 복사 버튼 → Toast 표시 */
  var copyBtn = e.target.closest(".copy-btn");
  if(copyBtn){
    e.stopPropagation();
    var text = copyBtn.dataset.copy;
    var toast = copyBtn.querySelector(".copy-toast");
    navigator.clipboard.writeText(text).then(function(){
      if(toast){
        toast.classList.add("show");
        setTimeout(function(){ toast.classList.remove("show"); }, 1000);
      }
    });
    return;
  }
  /* 전화 링크 */
  var telLink = e.target.closest(".tel-link");
  if(telLink){
    e.preventDefault();
    var tel = telLink.dataset.tel;
    if(confirm(GoLabPartnerMaster.formatPhone(tel) + " 로 전화하시겠습니까?")){
      window.location.href = "tel:" + tel;
    }
    return;
  }
  /* 이메일 링크 */
  var mailLink = e.target.closest(".mailto-link");
  if(mailLink){
    e.preventDefault();
    var email = mailLink.dataset.email;
    if(confirm(email + " 에 메일을 보내시겠습니까?")){
      window.location.href = "mailto:" + email;
    }
    return;
  }
});

/* ── 패널 이벤트 ── */
$("btnNew").addEventListener("click", function(){ openPanel(null); });
$("btnSave").addEventListener("click", savePartner);
$("btnCancel").addEventListener("click", closePanel);
$("panelClose").addEventListener("click", closePanel);
$("panelOverlay").addEventListener("click", closePanel);
$("btnMigrate").addEventListener("click", runMigration);

/* 패널 내 삭제 버튼 */
$("btnPanelDelete").addEventListener("click", function(){
  if(editingId) deletePartner(editingId);
});

/* ESC → 패널 닫기 */
document.addEventListener("keydown", function(e){
  if(e.key === "Escape" && _panelOpen) closePanel();
});

/* Enter → 저장 (패널 내 입력 필드에서만, textarea 제외) */
$("sidePanel").addEventListener("keydown", function(e){
  if(e.key === "Enter" && e.target.tagName !== "TEXTAREA"){
    e.preventDefault();
    savePartner();
  }
});

/* 검색 디바운스 */
var _searchTimer = null;
$("fSearch").addEventListener("input", function(){
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(render, 200);
});

/* ── Init ── */
computeKPI();
render();
</script>
</body>
</html>
