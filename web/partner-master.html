<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 거래처 관리</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--muted:#64748b;--text:#0f172a;
      --line:#e5e7eb;--accent:#16a34a;--warn:#d97706;--bad:#dc2626;--point:#2563eb;
      --chip:#f8fafc;--partner:#7c3aed;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial;}
    header{padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);z-index:10}
    header .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
    header h1{margin:0;font-size:16px;letter-spacing:.2px;color:var(--partner)}
    .tabs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .tab{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid var(--line);color:var(--muted);text-decoration:none;background:transparent;font-size:12px}
    .tab.active{color:var(--partner);background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.3)}
    .wrap{max-width:1440px;margin:0 auto;padding:16px 16px 36px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card h2{margin:0 0 12px;font-size:13px;color:var(--partner);display:flex;align-items:center;gap:8px}
    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
    .kpi{padding:14px;border-radius:10px;border:1px solid var(--line);background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .kpi .t{font-size:11px;color:var(--muted)}
    .kpi .v{margin-top:6px;font-size:24px;font-weight:600;color:var(--partner)}
    .kpi .sub{margin-top:4px;font-size:10px;color:var(--muted);font-weight:400}
    /* Form */
    .row{display:grid;gap:10px;margin-bottom:10px}
    .r2{grid-template-columns:1fr 1fr}
    .r3{grid-template-columns:1fr 1fr 1fr}
    .r4{grid-template-columns:1fr 1fr 1fr 1fr}
    label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700}
    label .opt{font-weight:400;color:#94a3b8}
    input,select,textarea{width:100%;border-radius:10px;border:1px solid var(--line);background:var(--chip);color:var(--text);padding:9px 10px;font-size:12px;outline:none;transition:border .2s;box-sizing:border-box}
    input:focus,select:focus,textarea:focus{border-color:var(--partner)}
    input::placeholder,textarea::placeholder{color:#94a3b8}
    textarea{min-height:36px;resize:vertical}
    button{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:10px 14px;font-size:12px;cursor:pointer;font-weight:700}
    button:hover{border-color:#cbd5e1;background:#f8fafc}
    button.save{background:var(--partner);border:none;color:#fff}
    button.save:hover{background:#6d28d9}
    button.danger{color:var(--bad);background:none;border:1px solid rgba(220,38,38,.3)}
    button.secondary{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.25);color:var(--partner)}
    button:disabled{opacity:.5;cursor:not-allowed}
    /* Table */
    .tableWrap{overflow:auto;border-radius:10px;border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:#f8fafc;color:var(--muted);text-align:left;padding:10px 12px;position:sticky;top:0;white-space:nowrap;z-index:2;border-bottom:1px solid var(--line)}
    td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:hover{background:rgba(124,58,237,.03)}
    .muted{color:var(--muted)}
    .badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:var(--partner);color:#fff;border-radius:99px;min-width:20px;height:20px;padding:0 6px;margin-left:6px}
    .type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
    .type-badge.sell{background:rgba(217,119,6,.1);color:#92400e}
    .type-badge.buy{background:rgba(37,99,235,.1);color:#1d4ed8}
    .type-badge.both{background:rgba(124,58,237,.1);color:#6d28d9}
    /* Search */
    .search-bar{margin-bottom:12px}
    .stat-inline{font-size:11px;color:var(--muted);margin-left:auto}
    @media(max-width:900px){
      .kpi-grid{grid-template-columns:1fr 1fr}
      .r4{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<header>
  <div class="top">
    <h1>GoLab · 거래처 관리</h1>
    <nav class="tabs">
      <a class="tab" href="./console.html">🏠 업무</a>
      <a class="tab" href="./calendar.html">📅 캘린더</a>
      <a class="tab" href="./profit.html">📊 수익</a>
      <a class="tab" href="./sales.html">💰 매출</a>
      <a class="tab" href="./index.html">📦 재고</a>
      <a class="tab" href="./purchases.html">📥 입고</a>
      <a class="tab" href="./deal.html">🔥 기회</a>
      <a class="tab active" href="./partner-master.html">🤝 거래처</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi">
      <div class="t">전체 거래처</div>
      <div class="v" id="kTotal">0</div>
    </div>
    <div class="kpi">
      <div class="t">매출처</div>
      <div class="v" id="kSell">0</div>
    </div>
    <div class="kpi">
      <div class="t">매입처</div>
      <div class="v" id="kBuy">0</div>
    </div>
  </div>

  <!-- 등록/수정 폼 -->
  <div class="card">
    <h2>➕ 거래처 등록</h2>
    <div class="row r4">
      <div>
        <label>거래처명 *</label>
        <input id="inName" placeholder="예: 대성금속" />
      </div>
      <div>
        <label>유형</label>
        <select id="inType">
          <option value="매출처" selected>매출처</option>
          <option value="매입처">매입처</option>
          <option value="겸용">겸용</option>
        </select>
      </div>
      <div>
        <label>연락처 <span class="opt">(선택)</span></label>
        <input id="inContact" placeholder="예: 010-1234-5678" />
      </div>
      <div>
        <label>비고 <span class="opt">(선택)</span></label>
        <input id="inNote" placeholder="메모" />
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button id="btnSave" class="save">등록</button>
      <button id="btnCancel" class="secondary" style="display:none">취소</button>
      <div style="flex:1"></div>
      <button id="btnMigrate" class="secondary">📥 매출에서 거래처 가져오기</button>
    </div>
  </div>

  <!-- 목록 -->
  <div class="card">
    <h2>📋 거래처 목록 <span class="badge" id="listBadge">0</span></h2>
    <div class="search-bar">
      <input id="fSearch" placeholder="거래처명/연락처/비고 검색..." />
    </div>
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>거래처명</th>
            <th>유형</th>
            <th>연락처</th>
            <th>비고</th>
            <th>등록일</th>
            <th style="text-align:right">관리</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="emptyMsg" class="muted" style="text-align:center;padding:24px;display:none">등록된 거래처가 없습니다.</div>
  </div>
</div>

<script src="js/partner-master.js"></script>
<script>
/* ══════════════════════════════════════════
   GoLab 거래처 마스터 관리 페이지
   ══════════════════════════════════════════ */
const $ = id => document.getElementById(id);
let editingId = null;

/* ── KPI ── */
function computeKPI(){
  const all = GoLabPartnerMaster.loadAll();
  $("kTotal").textContent = all.length;
  $("kSell").textContent = all.filter(p => p.type === "매출처" || p.type === "겸용").length;
  $("kBuy").textContent = all.filter(p => p.type === "매입처" || p.type === "겸용").length;
}

/* ── 유형 뱃지 클래스 ── */
function typeClass(t){
  if(t === "매입처") return "buy";
  if(t === "매출처") return "sell";
  return "both";
}

/* ── HTML 이스케이프 ── */
function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ── 렌더링 ── */
function render(){
  const all = GoLabPartnerMaster.loadAll();
  const q = ($("fSearch").value||"").trim().toLowerCase();
  let filtered = all;
  if(q){
    filtered = all.filter(p => {
      const combined = (p.name||"") + " " + (p.contact||"") + " " + (p.note||"");
      return combined.toLowerCase().includes(q);
    });
  }

  $("listBadge").textContent = filtered.length;
  const tb = $("tbody");

  if(filtered.length === 0){
    tb.innerHTML = "";
    $("emptyMsg").style.display = "block";
    return;
  }

  $("emptyMsg").style.display = "none";
  tb.innerHTML = filtered.map((p, i) => {
    const dateStr = p.created_at ? p.created_at.substring(0,10) : "-";
    return `<tr>
      <td class="muted">${i+1}</td>
      <td><b>${esc(p.name)}</b></td>
      <td><span class="type-badge ${typeClass(p.type)}">${esc(p.type)}</span></td>
      <td class="muted">${esc(p.contact)}</td>
      <td class="muted">${esc(p.note)}</td>
      <td class="muted">${dateStr}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="secondary" style="padding:5px 8px;font-size:11px" data-edit="${p.partner_id}">수정</button>
        <button class="danger" style="padding:5px 8px;font-size:11px" data-del="${p.partner_id}">삭제</button>
      </td>
    </tr>`;
  }).join("");

  // 이벤트 바인딩
  tb.querySelectorAll("button[data-edit]").forEach(btn => {
    btn.onclick = () => startEdit(btn.dataset.edit);
  });
  tb.querySelectorAll("button[data-del]").forEach(btn => {
    btn.onclick = () => deletePartner(btn.dataset.del);
  });
}

/* ── CRUD ── */
function savePartner(){
  const name = $("inName").value.trim();
  if(!name){ alert("거래처명을 입력해주세요."); $("inName").focus(); return; }

  try{
    if(editingId){
      GoLabPartnerMaster.update(editingId, {
        name,
        type: $("inType").value,
        contact: $("inContact").value,
        note: $("inNote").value
      });
    } else {
      GoLabPartnerMaster.create({
        name,
        type: $("inType").value,
        contact: $("inContact").value,
        note: $("inNote").value
      });
    }
    clearForm();
    computeKPI();
    render();
  } catch(err){
    alert("저장 실패: " + err.message);
  }
}

function startEdit(partnerId){
  const p = GoLabPartnerMaster.getById(partnerId);
  if(!p) return;
  editingId = p.partner_id;
  $("inName").value = p.name || "";
  $("inType").value = p.type || "매출처";
  $("inContact").value = p.contact || "";
  $("inNote").value = p.note || "";
  $("btnSave").textContent = "저장";
  $("btnCancel").style.display = "inline-block";
  window.scrollTo({top:0, behavior:"smooth"});
}

function deletePartner(partnerId){
  const p = GoLabPartnerMaster.getById(partnerId);
  if(!p) return;
  if(!confirm(`"${p.name}" 거래처를 삭제하시겠습니까?`)) return;
  GoLabPartnerMaster.remove(partnerId);
  computeKPI();
  render();
}

function clearForm(){
  $("inName").value = "";
  $("inType").value = "매출처";
  $("inContact").value = "";
  $("inNote").value = "";
  editingId = null;
  $("btnSave").textContent = "등록";
  $("btnCancel").style.display = "none";
}

/* ── 마이그레이션 ── */
function runMigration(){
  if(!confirm("매출 데이터에서 거래처를 자동 추출합니다.\n기존 거래처와 중복되지 않게 처리됩니다. 실행할까요?")) return;
  const result = GoLabPartnerMaster.migrateFromSales();
  alert(
    `마이그레이션 완료!\n` +
    `• 새로 생성: ${result.created}건\n` +
    `• 기존 유지: ${result.existing}건\n` +
    `• 전체: ${result.total}건\n` +
    `• 매출 레코드 backfill: ${result.backfilled}건`
  );
  computeKPI();
  render();
}

/* ── 이벤트 ── */
$("btnSave").addEventListener("click", savePartner);
$("btnCancel").addEventListener("click", clearForm);
$("btnMigrate").addEventListener("click", runMigration);

let _searchTimer = null;
$("fSearch").addEventListener("input", () => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(render, 200);
});

// Enter → 저장
$("inName").addEventListener("keydown", e => { if(e.key==="Enter") savePartner(); });
$("inContact").addEventListener("keydown", e => { if(e.key==="Enter") savePartner(); });
$("inNote").addEventListener("keydown", e => { if(e.key==="Enter") savePartner(); });

/* ── Init ── */
computeKPI();
render();
</script>
</body>
</html>
