<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 수익 대시보드</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--border:#e5e7eb;
      --text:#0f172a;--muted:#64748b;
      --primary:#2563eb;--warn:#dc2626;--accent:#16a34a;--orange:#d97706;
      --purple:#7c3aed;--chip:#f8fafc;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      font-size:13px;line-height:1.5}

    /* ─ Header ─ */
    header{padding:12px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);z-index:20;display:flex;align-items:center;justify-content:space-between}
    header h1{font-size:15px;font-weight:800;color:var(--primary);letter-spacing:-.2px}
    .tabs{display:flex;gap:6px;flex-wrap:wrap}
    .tab{padding:6px 10px;border-radius:8px;border:1px solid var(--border);color:var(--muted);text-decoration:none;font-size:11px;font-weight:600;background:transparent;transition:all .15s}
    .tab:hover{color:var(--text);border-color:#cbd5e1}
    .tab.active{color:var(--primary);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.3)}

    /* ─ Container ─ */
    .container{max-width:1200px;margin:0 auto;padding:20px}

    /* ─ 경고 카드 ─ */
    .warn-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .warn-card{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid}
    .warn-card.orange{background:#fffbeb;border-color:#fbbf24;color:#92400e}
    .warn-card.red{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
    .warn-card .wi{font-size:16px}
    .warn-card .wv{font-weight:800;margin-left:4px}
    .warn-card.clickable{cursor:pointer;transition:transform .15s,box-shadow .15s}
    .warn-card.clickable:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .warn-card.clickable.active{outline:2px solid var(--point,#2563eb);outline-offset:1px}

    /* ─ 기간 필터 ─ */
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .fbtn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
    .fbtn:hover{color:var(--text);border-color:#cbd5e1}
    .fbtn.active{color:var(--primary);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.3)}
    .date-input{padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:11px;font-family:inherit;color:var(--text);background:var(--chip);outline:none}
    .date-input:focus{border-color:var(--primary)}
    .date-sep{color:var(--muted);font-size:11px}

    /* ─ KPI 카드 4개 ─ */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .kpi .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .kpi .value{font-size:28px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
    .kpi .sub{font-size:10px;color:var(--muted);margin-top:4px}
    .kpi .value.blue{color:var(--primary)}
    .kpi .value.red{color:var(--warn)}
    .kpi .value.green{color:var(--accent)}
    .kpi .value.orange{color:var(--orange)}

    /* ─ 테이블 카드 ─ */
    .table-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .tcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .tcard h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .tcard h3 .badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;background:#dbeafe;color:var(--primary)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
    thead th.right{text-align:right}
    tbody td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
    tbody td.right{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
    tbody td.name{font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    tbody tr:hover{background:rgba(37,99,235,.03)}
    .margin-positive{color:var(--accent)}
    .margin-negative{color:var(--warn)}
    .no-data{text-align:center;padding:30px 20px;color:var(--muted);font-size:12px}

    /* ─ 마진 바 (인라인) ─ */
    .margin-bar{display:inline-block;height:6px;border-radius:3px;min-width:2px;vertical-align:middle;margin-right:6px}

    /* ─ 환율 입력 바 ─ */
    .fx-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .fx-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
    .fx-title{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
    .fx-toggle{font-size:10px;color:var(--muted);font-weight:600}
    .fx-body{display:flex;align-items:center;gap:16px;margin-top:12px;flex-wrap:wrap}
    .fx-body.hidden{display:none}
    .fx-field{display:flex;align-items:center;gap:6px}
    .fx-field label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
    .fx-field input{width:110px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-family:inherit;color:var(--text);background:var(--chip);outline:none;font-variant-numeric:tabular-nums;text-align:right}
    .fx-field input:focus{border-color:var(--primary)}
    .fx-updated{font-size:10px;color:var(--muted);margin-left:auto}

    /* ─ 환율 리스크 KPI (3열) ─ */
    .fx-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
    .kpi .value.purple{color:var(--purple)}
    .kpi .hint{font-size:10px;color:var(--muted);margin-top:2px;font-style:italic}
    .fx-placeholder{background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:24px 20px;text-align:center;color:var(--muted);font-size:12px;grid-column:1/-1}

    /* ─ 역마진 경고 ─ */
    .reverse-bar{margin-bottom:20px}
    .reverse-card{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid;margin-bottom:8px}
    .reverse-card:last-child{margin-bottom:0}
    .reverse-card.danger{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
    .reverse-card.safe{background:#f0fdf4;border-color:#86efac;color:#166534}
    .reverse-card .ri{font-size:14px}
    .reverse-card .rv{font-weight:800;margin-left:4px}
    .reverse-card .rdetail{margin-left:auto;font-size:11px;font-weight:700}

    /* ─ 프리셋 필터 바 ─ */
    .preset-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
    .preset-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .preset-btn:hover{border-color:#94a3b8;background:#f8fafc}
    .preset-btn.active{outline:2px solid var(--primary);outline-offset:1px;background:rgba(37,99,235,.06)}
    .preset-btn .picon{font-size:14px}
    .preset-btn .pcount{font-size:10px;font-weight:800;background:var(--primary);color:#fff;padding:1px 6px;border-radius:6px;margin-left:2px}
    .preset-btn.danger .pcount{background:var(--warn)}
    .preset-btn.warn .pcount{background:var(--orange)}
    .client-dropdown{position:relative;display:inline-block}
    .client-dropdown-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .client-dropdown-btn:hover{border-color:#94a3b8;background:#f8fafc}
    .client-dropdown-btn.active{outline:2px solid var(--primary);outline-offset:1px;background:rgba(37,99,235,.06)}
    .client-dropdown-menu{position:absolute;top:100%;left:0;margin-top:4px;min-width:220px;max-height:280px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:30;display:none;padding:4px 0}
    .client-dropdown-menu.open{display:block}
    .client-dropdown-menu .cd-search{width:calc(100% - 12px);margin:4px 6px 6px;padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:11px;outline:none;box-sizing:border-box}
    .client-dropdown-menu .cd-search:focus{border-color:var(--primary)}
    .client-dropdown-menu .cd-item{padding:7px 12px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text)}
    .client-dropdown-menu .cd-item:hover{background:rgba(37,99,235,.06)}
    .client-dropdown-menu .cd-item.selected{background:rgba(37,99,235,.1);font-weight:700;color:var(--primary)}
    .client-dropdown-menu .cd-item .cd-rev{margin-left:auto;font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}

    /* ─ Responsive ─ */
    @media(max-width:900px){
      .kpi-row{grid-template-columns:repeat(2,1fr)}
      .fx-kpi-row{grid-template-columns:1fr 1fr}
      .table-row{grid-template-columns:1fr}
    }
    @media(max-width:600px){
      .kpi-row{grid-template-columns:1fr}
      .fx-kpi-row{grid-template-columns:1fr}
      .container{padding:12px}
      .fx-body{flex-direction:column;align-items:stretch}
      .fx-field input{width:100%}
    }
  </style>
</head>
<body>
<header>
  <h1>GoLab</h1>
  <nav class="tabs">
    <a class="tab" href="./console.html">🏠 업무</a>
    <a class="tab active" href="./profit.html">📊 수익</a>
    <a class="tab" href="./sales.html">💰 매출</a>
    <a class="tab" href="./deals.html">📑 거래</a>
    <a class="tab" href="./index.html">📦 재고</a>
    <a class="tab" href="./purchases.html">📥 입고</a>
    <a class="tab" href="./deal.html">🔥 기회</a>
      <a class="tab" href="./partner-master.html">🤝 거래처</a>
  </nav>
</header>

<div class="container">

  <!-- ═══ 경고 바 ═══ -->
  <div class="warn-bar" id="warnBar"></div>

  <!-- ═══ 프리셋 필터 ═══ -->
  <div class="preset-bar" id="presetBar">
    <button class="preset-btn danger" id="presetNoCost">
      <span class="picon">🔴</span>원가입력 필요<span class="pcount" id="presetNoCostN">0</span>
    </button>
    <button class="preset-btn warn" id="presetReverse">
      <span class="picon">⚠️</span>역마진 주의<span class="pcount" id="presetReverseN">0</span>
    </button>
    <div class="client-dropdown" id="clientDropdown">
      <button class="client-dropdown-btn" id="presetClient">
        <span class="picon">📊</span>거래처 빠른필터<span style="font-size:10px;color:var(--muted)">▼</span>
      </button>
      <div class="client-dropdown-menu" id="clientDropdownMenu">
        <input class="cd-search" id="cdSearch" placeholder="거래처 검색..." />
        <div id="cdList"></div>
      </div>
    </div>
  </div>

  <!-- ═══ 기간 필터 ═══ -->
  <div class="filter-bar">
    <button class="fbtn active" data-range="month">이번 달</button>
    <button class="fbtn" data-range="30d">최근 30일</button>
    <button class="fbtn" data-range="all">전체</button>
    <button class="fbtn" data-range="custom">직접 입력</button>
    <input type="date" class="date-input" id="dateFrom" style="display:none" />
    <span class="date-sep" id="dateSep" style="display:none">~</span>
    <input type="date" class="date-input" id="dateTo" style="display:none" />
  </div>

  <!-- ═══ 환율 입력 ═══ -->
  <div class="fx-bar">
    <div class="fx-header" id="fxHeaderToggle">
      <span class="fx-title">💱 현재 환율</span>
      <span class="fx-toggle" id="fxToggleLabel">▼ 접기</span>
    </div>
    <div class="fx-body" id="fxBody">
      <div class="fx-field">
        <label>USD/KRW</label>
        <input type="number" id="fxUsd" step="0.1" placeholder="예: 1380.0" />

        <label>JPY/KRW (1엔)</label>
        <input type="number" id="fxJpy" step="0.01" placeholder="예: 9.20" />
      </div>
      <span class="fx-updated" id="fxUpdated"></span>
    </div>
  </div>

  <!-- ═══ KPI 요약 카드 ═══ -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="label">총 매출</div>
      <div class="value orange" id="kRevenue">₩0</div>
      <div class="sub" id="kRevenueSub">0건</div>
    </div>
    <div class="kpi">
      <div class="label">총 원가</div>
      <div class="value blue" id="kCost">₩0</div>
      <div class="sub" id="kCostSub">0건</div>
    </div>
    <div class="kpi">
      <div class="label">총 마진</div>
      <div class="value green" id="kMargin">₩0</div>
      <div class="sub" id="kMarginSub">원가 확인된 매출 기준</div>
    </div>
    <div class="kpi">
      <div class="label">마진율</div>
      <div class="value green" id="kRate">0.0%</div>
      <div class="sub" id="kRateSub">마진 ÷ 매출</div>
    </div>
  </div>

  <!-- ═══ 환율 리스크 KPI ═══ -->
  <div class="fx-kpi-row" id="fxKpiRow">
    <div class="kpi">
      <div class="label">확정 마진</div>
      <div class="value green" id="kConfirmed">₩0</div>
      <div class="sub" id="kConfirmedSub">매입 시점 환율 기준</div>
    </div>
    <div class="kpi">
      <div class="label">위험 마진 (현재 환율)</div>
      <div class="value purple" id="kRisk">—</div>
      <div class="sub" id="kRiskSub">환율 입력 시 계산</div>
    </div>
    <div class="kpi">
      <div class="label">잠재 손실 (환율)</div>
      <div class="value" id="kFxLoss">—</div>
      <div class="sub" id="kFxLossSub">환율 입력 시 계산</div>
      <div class="hint" id="kFxLossHint"></div>
    </div>
  </div>

  <!-- ═══ 역마진 경고 ═══ -->
  <div class="reverse-bar" id="reverseBar"></div>

  <!-- ═══ 테이블 2개 ═══ -->
  <div class="table-row">
    <!-- 거래처별 마진 TOP -->
    <div class="tcard">
      <h3>거래처별 마진 TOP <span class="badge" id="clientBadge">0</span></h3>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>거래처</th>
            <th class="right">매출</th>
            <th class="right">원가</th>
            <th class="right">마진</th>
            <th class="right">마진율</th>
            <th>문서번호</th>
          </tr>
        </thead>
        <tbody id="clientTable"></tbody>
      </table>
      <div class="no-data" id="clientEmpty" style="display:none">해당 기간 데이터 없음</div>
    </div>

    <!-- 품목별 마진 TOP -->
    <div class="tcard">
      <h3>품목별 마진 TOP <span class="badge" id="itemBadge">0</span></h3>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>품목</th>
            <th class="right">매출</th>
            <th class="right">원가</th>
            <th class="right">마진</th>
            <th class="right">마진율</th>
            <th>문서번호</th>
          </tr>
        </thead>
        <tbody id="itemTable"></tbody>
      </table>
      <div class="no-data" id="itemEmpty" style="display:none">해당 기간 데이터 없음</div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════
   GoLab Profit Dashboard v1.2
   읽기 전용 — golab_* localStorage만 참조
   매입 기회 → deal.html로 분리됨
   ══════════════════════════════════════════ */

const $ = id => document.getElementById(id);

/* ── 유틸 ── */
function n(v, fb=0){ const x=Number(v); return Number.isFinite(x)?x:fb; }
function fmtW(v){ return "₩"+Math.round(v).toLocaleString(); }
function fmtRate(v){ return (v*100).toFixed(1)+"%"; }

/* ── 날짜 유틸 ── */
function todayStr(){ return new Date().toISOString().substring(0,10); }
function monthStart(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}
function daysAgo(n){
  const d=new Date(); d.setDate(d.getDate()-n);
  return d.toISOString().substring(0,10);
}

/* ══════════════════════════════════════════
   1️⃣ 날짜 필드 자동 탐지
   우선순위: salesDate → saleDate → date → createdAt
   ══════════════════════════════════════════ */
const DATE_FIELDS = ["salesDate","saleDate","date","createdAt"];

function extractDate(rec){
  for(const f of DATE_FIELDS){
    if(rec[f] && typeof rec[f] === "string" && rec[f].length >= 10){
      return rec[f].substring(0,10);
    }
  }
  return null; // 날짜 미정
}

/* ══════════════════════════════════════════
   2️⃣ 원가(avgPrice) 매핑 — 자동 탐지
   소스: golab_trade_v1 → buyUnitPrice 기준 품목별 가중평균
         golab_inventory_v01 → buyPrice (이동평균 원가)
         golab_purchases_v2 → inbound_history unitPriceKrw
   매핑 키: partNo → itemName fallback
   ══════════════════════════════════════════ */
function buildCostMap(){
  const costMap = new Map(); // key → { totalCost, totalQty, source }

  // (A) golab_trade_v1 — 구매 이력에서 품목별 가중평균 원가
  try{
    const trades = JSON.parse(localStorage.getItem("golab_trade_v1")||"[]");
    trades.forEach(t => {
      const price = n(t.buyUnitPrice);
      const qty = n(t.qty);
      if(price <= 0 || qty <= 0) return;

      const keys = [];
      if(t.partNo) keys.push("partNo:"+t.partNo);
      if(t.itemName) keys.push("name:"+t.itemName);
      if(t.itemId) keys.push("itemId:"+t.itemId);

      keys.forEach(k => {
        const prev = costMap.get(k) || {totalCost:0, totalQty:0, source:"TRADE"};
        prev.totalCost += price * qty;
        prev.totalQty += qty;
        costMap.set(k, prev);
      });
    });
  }catch{}

  // (B) golab_inventory_v01 — 재고 마스터의 buyPrice
  try{
    const inv = JSON.parse(localStorage.getItem("golab_inventory_v01")||"[]");
    inv.forEach(item => {
      const price = n(item.buyPrice);
      if(price <= 0) return;
      if(item.item_id){
        const k = "item_id:"+item.item_id;
        if(!costMap.has(k)){
          costMap.set(k, {totalCost: price, totalQty: 1, source:"INVENTORY_AVG"});
        }
      }
      if(item.name){
        const k = "name:"+item.name;
        if(!costMap.has(k)){
          costMap.set(k, {totalCost: price, totalQty: 1, source:"INVENTORY_AVG"});
        }
      }
    });
  }catch{}

  // (C) golab_purchases_v2 → inbound_history에서 단가
  try{
    const history = JSON.parse(localStorage.getItem("golab_inventory_inbound_history_v01")||"[]");
    history.forEach(h => {
      const price = n(h.unitPriceKrw);
      const qty = n(h.qty);
      if(price <= 0 || qty <= 0) return;
      if(h.name){
        const k = "name:"+h.name;
        const prev = costMap.get(k) || {totalCost:0, totalQty:0, source:"INBOUND_AVG"};
        prev.totalCost += price * qty;
        prev.totalQty += qty;
        // 기존 source가 TRADE면 유지 (우선순위 높음)
        if(!costMap.has(k)) costMap.set(k, prev);
        else {
          const existing = costMap.get(k);
          existing.totalCost += price * qty;
          existing.totalQty += qty;
        }
      }
    });
  }catch{}

  // 가중평균 단가로 변환 — { cost, source } 반환
  const avgMap = new Map();
  costMap.forEach((v,k) => {
    if(v.totalQty > 0) avgMap.set(k, {
      cost: Math.round(v.totalCost / v.totalQty),
      source: v.source || "TRADE"
    });
  });

  return avgMap;
}

/* ══════════════════════════════════════════
   2-b️⃣ 환율 리스크 계산
   golab_purchases_v2 배치에서 외화 매입을 현재 환율로 재평가
   ══════════════════════════════════════════ */
function loadFxRates(){

  catch{ return {}; }

/* 환율 리스크 델타 계산 — golab_purchases_v2 기반 */
function calcFxRisk(currentRates){
  let confirmedForeignCost = 0;  // 매입 시점 환율 기준 외화 원가(KRW)
  let revaluedForeignCost = 0;   // 현재 환율 기준 외화 원가(KRW)
  let hasForeignData = false;

  try{
    const batches = JSON.parse(localStorage.getItem("golab_purchases_v2")||"[]");
    batches.forEach(batch => {
      const cur = batch.currency;
      if(!cur || cur === "KRW") return; // 원화 배치는 환율 영향 없음
      const rateKey = cur + "_KRW";
      const currentRate = n(currentRates[rateKey]);
      const origRate = n(batch.exchangeRate, 1);
      if(!currentRate || origRate <= 0) return;
      hasForeignData = true;

      batch.items.forEach(item => {
        const foreignAmount = n(item.price) * n(item.qty);
        confirmedForeignCost += foreignAmount * origRate;
        revaluedForeignCost += foreignAmount * currentRate;
      });
      // 물류비(KRW)는 환율 변동 영향 없으므로 양쪽 동일 → 델타 계산에서 상쇄
    });
  }catch(e){}

  return {
    confirmedForeignCost,
    revaluedForeignCost,
    fxDelta: revaluedForeignCost - confirmedForeignCost, // 양수 = 비용 증가 = 손실
    hasForeignData
  };
}

/* 역마진 감지 — avgMap(원가) vs 매출 데이터의 판매단가 비교 */
function detectReverseMargins(avgMap, sales){
  // 품목별 평균 판매단가 집계
  const sellMap = new Map();
  sales.forEach(rec => {
    const key = rec.itemName || rec.partNo;
    if(!key) return;
    const sell = n(rec.sellUnitPrice);
    if(sell <= 0) return;
    const prev = sellMap.get(key) || { totalSell:0, count:0 };
    prev.totalSell += sell;
    prev.count++;
    sellMap.set(key, prev);
  });

  const reverseItems = [];
  sellMap.forEach((v, itemName) => {
    const avgSell = v.totalSell / v.count;
    // 원가 조회 (name 키 우선) — { cost, source } 객체
    const entry = avgMap.get("name:"+itemName);
    if(!entry || entry.cost === undefined || entry.cost === null) return;
    const cost = entry.cost;
    if(cost >= avgSell){
      reverseItems.push({
        name: itemName,
        avgCost: Math.round(cost),
        avgSell: Math.round(avgSell),
        gap: Math.round(cost - avgSell)
      });
    }
  });
  reverseItems.sort((a,b) => b.gap - a.gap);
  return reverseItems;
}

/* ── 매출 레코드에서 원가 찾기 ── */
/* 반환: { cost: number|null, source: string, matchBy: string|null } */
function lookupCost(rec, avgMap){
  // 0순위: 수동 원가 override (sales에서 설정)
  if(rec.costOverrideUnitPriceKrw != null && rec.costOverrideUnitPriceKrw !== ""){
    const co = n(rec.costOverrideUnitPriceKrw);
    if(co >= 0) return { cost: co, source: "MANUAL_OVERRIDE", matchBy: "costOverride" };
  }
  // 1순위: item_id 직접 매칭 (품목 마스터 참조)
  if(rec.item_id){
    const v = avgMap.get("item_id:"+rec.item_id);
    if(v !== undefined) return { cost: v.cost, source: v.source, matchBy: "item_id" };
  }
  // 2순위: partNo (itemCode) 기준
  if(rec.partNo){
    const v = avgMap.get("partNo:"+rec.partNo);
    if(v !== undefined) return { cost: v.cost, source: v.source, matchBy: "partNo" };
  }
  // 3순위: itemId (레거시)
  if(rec.itemId){
    const v = avgMap.get("itemId:"+rec.itemId);
    if(v !== undefined) return { cost: v.cost, source: v.source, matchBy: "itemId" };
  }
  // 4순위: itemName fallback
  if(rec.itemName){
    const v = avgMap.get("name:"+rec.itemName);
    if(v !== undefined) return { cost: v.cost, source: v.source, matchBy: "itemName" };
  }
  return { cost: null, source: "NONE", matchBy: null }; // 매핑 실패
}

/* ══════════════════════════════════════════
   데이터 로드 + 분석
   ══════════════════════════════════════════ */
let currentRange = "month";
let customFrom = "";
let customTo = "";
let activeWarnFilter = null; // 경고 배너 필터: "no-item-id"|"no-cost"|"bad-qty-price"|null
let activePresetFilter = null; // 프리셋 필터: "need-cost"|"reverse"|null
let activeClientFilter = null; // 거래처 빠른필터: client 이름 또는 null

/* Fix-1: sales 키 자동 탐지 (golab_sales prefix 전수 스캔) */
function detectSalesKey(){
  // 1순위: golab_sales_v1 존재하면 즉시 반환
  if(localStorage.getItem("golab_sales_v1") !== null) return "golab_sales_v1";
  // 2순위: golab_sales* 중 JSON 배열 파싱 가능한 후보 → 레코드 수 최대
  let best = null, bestLen = -1;
  for(let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if(!k.startsWith("golab_sales")) continue;
    try{
      const arr = JSON.parse(localStorage.getItem(k));
      if(Array.isArray(arr) && arr.length > bestLen){ best = k; bestLen = arr.length; }
    }catch{}
  }
  return best; // null이면 키 없음
}

/** deals_v1 SSoT 감지: 마이그레이션된 레코드 존재 여부 */
var _profitUseDeals = false;
function checkDealsSSoT(){
  try{
    var deals = JSON.parse(localStorage.getItem("golab_deals_v1") || "[]");
    return deals.some(function(d){ return d.source === "migrated"; });
  }catch(e){ return false; }
}

/** deal → sales 호환 형식 변환 (기존 analyze/lookupCost 코드 재활용) */
function dealToSalesFormat(d){
  return {
    id: d.deal_id,
    item_id: d.item_id,
    partner_id: d.partner_id,
    salesDate: (d.quote_at || d.created_at || "").substring(0,10),
    client: d.partner_name_snapshot || "",
    docNo: "",
    partNo: "",
    itemName: d.item_name || "",
    itemId: d.item_id || "",
    qty: Number(d.qty) || 0,
    unit: "ea",
    sellUnitPrice: Number(d.unit_price) || 0,
    costOverrideUnitPriceKrw: d.purchase_cost != null ? d.purchase_cost : null,
    memo: d.memo || "",
    deposit_date: d.payment_at || null,
    /* 확장 필드 — profit 전용 */
    _deal_owner: d.deal_owner || "mine",
    _deal_status: d.deal_status || "active",
    _fee: Number(d.fee) || 0,
    _supply_amount: Number(d.supply_amount) || 0
  };
}

function loadSales(){
  /* deals_v1 SSoT 모드: 마이그레이션 완료 시 deals 우선 */
  _profitUseDeals = checkDealsSSoT();
  if(_profitUseDeals){
    console.log("[Profit] SSoT mode → deals_v1");
    try{
      var deals = JSON.parse(localStorage.getItem("golab_deals_v1") || "[]");
      /* cancelled 제외 */
      return deals.filter(function(d){ return d.deal_status !== "cancelled"; })
                  .map(dealToSalesFormat);
    }catch(e){ return []; }
  }
  /* 레거시: sales_v1 */
  const key = detectSalesKey();
  console.log("[Profit] sales key →", key || "(없음)");
  if(!key) return [];
  try{ return JSON.parse(localStorage.getItem(key)||"[]"); }
  catch{ return []; }
}

/* Fix-2: 종료일 — preset은 todayStr(), custom은 사용자 지정 값 */
function getDateRange(){
  const today = todayStr();
  if(currentRange === "month") return { from: monthStart(), to: today };
  if(currentRange === "30d") return { from: daysAgo(30), to: today };
  if(currentRange === "all") return { from: "0000-01-01", to: today };
  if(currentRange === "custom") return { from: customFrom || "0000-01-01", to: customTo || today };
  return { from: monthStart(), to: today };
}

function analyze(){
  const sales = loadSales();
  const avgMap = buildCostMap();
  const range = getDateRange();

  // 집계 변수
  let totalRevenue = 0;
  let totalCost = 0;
  let totalMargin = 0;
  let revenueCount = 0;     // 기간 내 전체 매출 건수
  let marginCount = 0;      // 원가 확인된 건수
  let noDateCount = 0;       // 날짜 미정 건수
  let noCostCount = 0;       // 원가 미정 건수 (source=NONE)
  let noCostRevenue = 0;     // 원가 미정 매출액
  let marginRevenue = 0;     // 마진 계산 포함 매출액
  let noItemIdCount = 0;     // item_id 없는 매출 건수
  let badQtyPriceCount = 0;  // 수량·단가 이상 건수

  // 거래처별 / 품목별 집계
  const byClient = new Map();
  const byItem = new Map();

  sales.forEach(rec => {
    const dt = extractDate(rec);

    // 날짜 미정: 기간 필터에서 제외
    if(!dt){
      noDateCount++;
      return;
    }

    // 기간 필터
    if(dt < range.from || dt > range.to) return;

    // 경고 카운터
    if(!rec.item_id) noItemIdCount++;
    if(n(rec.qty) === 0 || n(rec.sellUnitPrice) === 0) badQtyPriceCount++;

    // activeWarnFilter 적용
    if(activeWarnFilter){
      if(activeWarnFilter === "no-item-id" && rec.item_id) return;
      if(activeWarnFilter === "bad-qty-price" && n(rec.qty) !== 0 && n(rec.sellUnitPrice) !== 0) return;
    }

    // 거래처 빠른필터 적용
    if(activeClientFilter){
      const clientName = rec.client || "(미지정)";
      if(clientName !== activeClientFilter) return;
    }

    const revenue = n(rec.sellUnitPrice) * n(rec.qty);
    totalRevenue += revenue;
    revenueCount++;

    // 원가 조회 — { cost, source, matchBy } 반환
    const costInfo = lookupCost(rec, avgMap);

    if(costInfo.cost === null){
      noCostCount++;
      noCostRevenue += revenue;
      accumulateGroup(byClient, rec.client || "(미지정)", revenue, null, n(rec.qty), rec.docNo);
      accumulateGroup(byItem, rec.itemName || rec.partNo || "(미지정)", revenue, null, n(rec.qty), rec.docNo);
      // "need-cost" 프리셋: 원가 미정 → 포함
      return;
    }

    // "no-cost" 필터: 원가 있는 건은 제외 (원가 미정만 보기)
    if(activeWarnFilter === "no-cost") return;

    // "need-cost" 프리셋: 원가 확인된 건은 제외
    if(activePresetFilter === "need-cost") return;

    const cost = costInfo.cost * n(rec.qty);
    /* fee 반영 (deals SSoT 모드에서 수수료 차감) */
    const fee = n(rec._fee);
    const margin = revenue - cost - fee;
    totalCost += cost;
    totalMargin += margin;
    marginCount++;
    marginRevenue += revenue;

    accumulateGroup(byClient, rec.client || "(미지정)", revenue, cost, n(rec.qty), rec.docNo);
    accumulateGroup(byItem, rec.itemName || rec.partNo || "(미지정)", revenue, cost, n(rec.qty), rec.docNo);
  });

  return {
    totalRevenue, totalCost, totalMargin, marginRevenue,
    revenueCount, marginCount,
    noDateCount, noCostCount, noCostRevenue,
    noItemIdCount, badQtyPriceCount,
    byClient, byItem,
    avgMap, sales,  // 환율 리스크 + 역마진 계산용
    isDealsMode: _profitUseDeals
  };
}

function accumulateGroup(map, key, revenue, cost, qty, docNo){
  const prev = map.get(key) || {revenue:0, cost:0, qty:0, hasCost:false, count:0, noCostRevenue:0, noCostCount:0, docNos: new Set()};
  prev.revenue += revenue;
  prev.qty += qty;
  prev.count++;
  if(cost !== null){
    prev.cost += cost;
    prev.hasCost = true;
  } else {
    prev.noCostRevenue += revenue;
    prev.noCostCount++;
  }
  if(docNo) prev.docNos.add(docNo);
  map.set(key, prev);
}

}

/* ── 환율 리스크 KPI 렌더링 ── */
function renderFxRisk(confirmedMargin){
  const fxRates = loadFxRates();
  const hasUsd = n(fxRates.USD_KRW) > 0;
  const hasJpy = n(fxRates.JPY_KRW) > 0;
  const hasRates = hasUsd || hasJpy;

  // 확정 마진 (항상 표시)
  $("kConfirmed").textContent = fmtW(confirmedMargin);
  $("kConfirmed").className = "value " + (confirmedMargin >= 0 ? "green" : "red");

  if(!hasRates){
    // 환율 미입력 — 안내 메시지
    $("kRisk").textContent = "—";
    $("kRisk").className = "value purple";
    $("kRiskSub").textContent = "환율 입력 시 계산";
    $("kFxLoss").textContent = "—";
    $("kFxLoss").className = "value";
    $("kFxLossSub").textContent = "환율 입력 시 계산";
    $("kFxLossHint").textContent = "💡 위 환율 바에 현재 환율을 입력하세요";
    return;
  }

  const fx = calcFxRisk(fxRates);

  if(!fx.hasForeignData){
    // 외화 배치 없음
    $("kRisk").textContent = fmtW(confirmedMargin);
    $("kRisk").className = "value " + (confirmedMargin >= 0 ? "green" : "red");
    $("kRiskSub").textContent = "외화 매입 데이터 없음 (확정=위험)";
    $("kFxLoss").textContent = "₩0";
    $("kFxLoss").className = "value green";
    $("kFxLossSub").textContent = "환율 영향 없음";
    $("kFxLossHint").textContent = "";
    return;
  }

  // 위험 마진 = 확정 마진 - (현재환율 원가 - 매입환율 원가)
  const riskMargin = confirmedMargin - fx.fxDelta;
  $("kRisk").textContent = fmtW(riskMargin);
  $("kRisk").className = "value " + (riskMargin >= 0 ? "green" : "red");
  $("kRiskSub").textContent = "현재 환율 반영";

  // 잠재 손실 = fxDelta (양수 = 비용 증가 = 손실)
  const loss = fx.fxDelta;
  const absLoss = Math.abs(loss);
  const absMargin = Math.abs(confirmedMargin) || 1;
  const pct = absLoss / absMargin;

  // 임계값 색상
  let lossColor, lossLabel;
  if(loss <= 0){
    // 환율 이득 (현재 환율이 매입보다 낮음)
    lossColor = "green";
    lossLabel = "환율 이득";
  } else if(pct < 0.05){
    lossColor = "green";
    lossLabel = "안전";
  } else if(pct < 0.15){
    lossColor = "orange";
    lossLabel = "주의";
  } else {
    lossColor = "red";
    lossLabel = "위험";
  }

  $("kFxLoss").textContent = (loss >= 0 ? "-" : "+") + fmtW(absLoss);
  $("kFxLoss").className = "value " + lossColor;
  $("kFxLossSub").textContent = loss >= 0 ? "환율 상승으로 원가 증가" : "환율 하락으로 원가 감소";
  $("kFxLossHint").textContent = lossLabel + " (확정 마진 대비 " + (pct*100).toFixed(1) + "%)";
}

/* ── 역마진 경고 렌더링 ── */
function renderReverseMargins(avgMap, sales){
  const items = detectReverseMargins(avgMap, sales);
  const el = $("reverseBar");

  if(!items.length){
    el.innerHTML = '<div class="reverse-card safe"><span class="ri">✅</span>역마진 품목 없음 — 모든 품목이 원가 이하로 판매되지 않고 있습니다</div>';
    return;
  }

  el.innerHTML = items.slice(0,10).map(it =>
    `<div class="reverse-card danger">
      <span class="ri">🔴</span>
      <strong>${esc(it.name)}</strong>
      <span>원가 ${fmtW(it.avgCost)} &gt; 판매 ${fmtW(it.avgSell)}</span>
      <span class="rdetail">역마진 -${fmtW(it.gap)}</span>
    </div>`
  ).join("");
}

function renderGroupTable(map, tbodyId, emptyId, badgeId, reverseNameSet){
  let entries = [...map.entries()].map(([name, v]) => {
    const marginableRevenue = v.revenue - v.noCostRevenue;
    const margin = marginableRevenue - v.cost;
    const marginRate = marginableRevenue > 0 ? margin / marginableRevenue : 0;
    const docNos = v.docNos ? [...v.docNos].join(", ") : "";
    return { name, revenue: v.revenue, cost: v.cost, margin, marginRate, count: v.count, hasCost: v.hasCost, noCostCount: v.noCostCount, docNos };
  });

  // 역마진 프리셋 필터 적용 — 해당 이름만 남기기
  if(reverseNameSet){
    entries = entries.filter(e => reverseNameSet.has(e.name));
  }

  entries.sort((a,b) => b.margin - a.margin);
  const top20 = entries.slice(0, 20);

  $(badgeId).textContent = entries.length;

  if(!top20.length){
    $(tbodyId).innerHTML = "";
    $(emptyId).style.display = "block";
    return;
  }

  $(emptyId).style.display = "none";
  const maxMargin = Math.max(...top20.map(e => Math.abs(e.margin)), 1);

  $(tbodyId).innerHTML = top20.map((e, i) => {
    const barWidth = Math.max(2, Math.round(Math.abs(e.margin) / maxMargin * 60));
    const barColor = e.margin >= 0 ? "var(--accent)" : "var(--warn)";
    const marginClass = e.margin >= 0 ? "margin-positive" : "margin-negative";
    const costDisplay = e.hasCost ? fmtW(e.cost) : '<span style="color:var(--muted)">미정</span>';
    const marginDisplay = e.hasCost
      ? `<span class="${marginClass}">${fmtW(e.margin)}</span>`
      : '<span style="color:var(--muted)">—</span>';
    const rateDisplay = e.hasCost
      ? `<span class="${marginClass}">${fmtRate(e.marginRate)}</span>`
      : '<span style="color:var(--muted)">—</span>';

    return `<tr>
      <td>${i+1}</td>
      <td class="name" title="${esc(e.name)}">${esc(e.name)}${e.noCostCount ? ' <span style="color:var(--warn);font-size:9px">⚠'+e.noCostCount+'</span>' : ''}</td>
      <td class="right">${fmtW(e.revenue)}</td>
      <td class="right">${costDisplay}</td>
      <td class="right"><span class="margin-bar" style="width:${barWidth}px;background:${barColor}"></span>${marginDisplay}</td>
      <td class="right">${rateDisplay}</td>
      <td class="muted" style="font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.docNos)}">${esc(e.docNos)}</td>
    </tr>`;
  }).join("");
}

function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

   기간 필터 이벤트
   ══════════════════════════════════════════ */
document.querySelectorAll(".fbtn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentRange = btn.dataset.range;

    const isCustom = currentRange === "custom";
    $("dateFrom").style.display = isCustom ? "inline-block" : "none";
    $("dateSep").style.display = isCustom ? "inline" : "none";
    $("dateTo").style.display = isCustom ? "inline-block" : "none";

    if(isCustom){
      if(!$("dateFrom").value) $("dateFrom").value = monthStart();
      if(!$("dateTo").value) $("dateTo").value = todayStr();
      customFrom = $("dateFrom").value;
      customTo = $("dateTo").value;
    }

    render();
  });
});

$("dateFrom").addEventListener("change", e => { customFrom = e.target.value; render(); });
$("dateTo").addEventListener("change", e => { customTo = e.target.value; render(); });

// 환율 입력 → 저장 + 재계산 (디바운스)
let fxTimer = null;
function onFxInput(){
  clearTimeout(fxTimer);
  fxTimer = setTimeout(() => {
    const rates = loadFxRates();
    const usd = n($("fxUsd").value);
    const jpy = n($("fxJpy").value);
    if(usd > 0) rates.USD_KRW = usd;
    if(jpy > 0) rates.JPY_KRW = jpy;
    saveFxRates(rates);
    render();
  }, 400);
}
$("fxUsd").addEventListener("input", onFxInput);
$("fxJpy").addEventListener("input", onFxInput);

// 📊 거래처 빠른필터 — 드롭다운 토글
$("presetClient").addEventListener("click", (e) => {
  e.stopPropagation();
  if(activeClientFilter){
    // 이미 선택된 거래처 → 해제

document.addEventListener("click", (e) => {
  if(!$("clientDropdown").contains(e.target)){
    _closeClientDropdown();
  }
});

// 드롭다운 검색 필터
$("cdSearch").addEventListener("input", (e) => {
  _filterClientList(e.target.value);
});
// 검색 필드 클릭 시 이벤트 전파 중단
$("cdSearch").addEventListener("click", (e) => e.stopPropagation());

function _closeClientDropdown(){
  $("clientDropdownMenu").classList.remove("open");
}

/* 거래처 드롭다운 목록 구축 — 매출 데이터 기반 동적 생성 (하드코딩 금지) */
let _clientListData = []; // {name, revenue}
function _buildClientDropdown(byClientMap){
  _clientListData = [...byClientMap.entries()].map(([name, v]) => ({
    name,
    revenue: v.revenue
  })).sort((a,b) => b.revenue - a.revenue); // 매출 높은 순 정렬
  _filterClientList($("cdSearch").value || "");
}

function _filterClientList(query){
  const q = query.trim().toLowerCase();
  const filtered = q
    ? _clientListData.filter(c => c.name.toLowerCase().includes(q))
    : _clientListData;

  const html = filtered.slice(0, 20).map(c => {
    const sel = activeClientFilter === c.name ? " selected" : "";
    return `<div class="cd-item${sel}" data-client="${esc(c.name)}">
      <span>${esc(c.name)}</span>
      <span class="cd-rev">${fmtW(c.revenue)}</span>
    </div>`;
  }).join("");

  $("cdList").innerHTML = html || '<div class="cd-item" style="color:var(--muted);cursor:default">결과 없음</div>';

  // 항목 클릭 핸들러
  $("cdList").querySelectorAll("[data-client]").forEach(item => {
    item.addEventListener("click", (e) => {
      e.stopPropagation();
      const name = item.dataset.client;
      activeClientFilter = (activeClientFilter === name) ? null : name;
      activePresetFilter = null;
      activeWarnFilter = null;
      _closeClientDropdown();
      render();
    });
  });
}

window.addEventListener("storage", e => {
  if(e.key && e.key.startsWith("golab_")) render();
});

render();
