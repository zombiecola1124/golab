<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 수익 성적표</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--border:#e5e7eb;
      --text:#0f172a;--muted:#64748b;
      --primary:#2563eb;--warn:#dc2626;--accent:#16a34a;--orange:#d97706;
      --purple:#7c3aed;--chip:#f8fafc;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      font-size:13px;line-height:1.5}

    /* -- Header (다크 톤 Sticky) -- */
    header{padding:0 20px;border-bottom:none;position:sticky;top:0;background:rgba(15,23,42,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:20;display:flex;align-items:center;justify-content:space-between;height:48px}
    header h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
    .tabs{display:flex;gap:2px;flex-wrap:wrap;height:100%}
    .tab{display:inline-flex;align-items:center;padding:0 14px;height:100%;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:600;background:transparent;transition:color .2s,border-color .2s}
    .tab:hover{color:rgba(255,255,255,.85)}
    .tab.active{color:#fff;font-weight:800;border-bottom:2px solid #fff}

    /* -- Container -- */
    .container{max-width:1200px;margin:0 auto;padding:20px}

    /* -- SSoT 배지 -- */
    .ssot-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);color:var(--primary);margin-bottom:16px}

    /* -- 기간 필터 -- */
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .fbtn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
    .fbtn:hover{color:var(--text);border-color:#cbd5e1}
    .fbtn.active{color:var(--primary);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.3)}
    .date-input{padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:11px;font-family:inherit;color:var(--text);background:var(--chip);outline:none}
    .date-input:focus{border-color:var(--primary)}
    .date-sep{color:var(--muted);font-size:11px}

    /* -- KPI 카드 5개 -- */
    .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .kpi .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .kpi .value{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
    .kpi .sub{font-size:10px;color:var(--muted);margin-top:4px}
    .kpi .delta{font-size:11px;margin-top:4px;font-weight:700}
    .kpi .delta.up{color:var(--accent)}
    .kpi .delta.down{color:var(--warn)}
    .kpi .delta.neutral{color:var(--muted)}
    .kpi .value.green{color:var(--accent)}
    .kpi .value.orange{color:var(--orange)}
    .kpi .value.blue{color:var(--primary)}
    .kpi .value.purple{color:var(--purple)}
    .kpi .value.amber{color:#b45309}
    .kpi .value.red{color:var(--warn)}

    /* -- 상세 테이블 -- */
    .detail-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .detail-header h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
    .detail-header .badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;background:#dbeafe;color:var(--primary)}
    .detail-header .csv-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
    .detail-header .csv-btn:hover{color:var(--text);border-color:#94a3b8}

    .detail-table{width:100%;border-collapse:collapse;font-size:12px}
    .detail-table thead th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
    .detail-table thead th.r{text-align:right}
    .detail-table tbody td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);font-variant-numeric:tabular-nums}
    .detail-table tbody td.r{text-align:right;font-weight:600}
    .detail-table tbody td.name{font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .detail-table tbody td.date{color:var(--muted);white-space:nowrap;font-size:11px}
    .detail-table tbody tr:nth-child(even){background:#fafbfc}
    .detail-table tbody tr:hover{background:rgba(37,99,235,.03)}
    .no-data{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px}

    /* -- 상태 배지 -- */
    .st{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap}
    .st.paid{background:#dcfce7;color:#166534}
    .st.invoice{background:#dbeafe;color:#1e40af}
    .st.note{background:#fef3c7;color:#92400e}
    .st.order{background:#e0e7ff;color:#3730a3}
    .st.quote{background:#f1f5f9;color:#475569}
    .st.friend{background:#faf5ff;color:#7c3aed}

    /* -- 빈 상태 -- */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .icon{font-size:48px;margin-bottom:12px}
    .empty-state .msg{font-size:14px;font-weight:600;margin-bottom:6px}
    .empty-state .sub{font-size:12px}
    .empty-state a{color:var(--primary);text-decoration:none;font-weight:600}

    /* -- Responsive -- */
    @media(max-width:1024px){
      .kpi-row{grid-template-columns:repeat(3,1fr)}
    }
    @media(max-width:700px){
      .kpi-row{grid-template-columns:repeat(2,1fr)}
      .container{padding:12px}
      .kpi .value{font-size:22px}
    }
    @media(max-width:480px){
      .kpi-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<header>
  <h1>GoLab</h1>
  <nav class="tabs">
    <a class="tab" href="./console.html">🏠 메인</a>
    <a class="tab" href="./deals.html">🔥 거래</a>
    <a class="tab" href="./index.html">📦 재고</a>
    <a class="tab active" href="./profit.html">💰 수익</a>
    <a class="tab" href="./partner-master.html">👥 거래처</a>
  </nav>
</header>

<div class="container">

  <!-- SSoT 배지 -->
  <div class="ssot-badge" id="ssotBadge" style="display:none">
    📑 거래 엔진 v2 기반 수익 성적표
  </div>

  <!-- 기간 필터 -->
  <div class="filter-bar">
    <button class="fbtn active" data-range="month">이번 달</button>
    <button class="fbtn" data-range="lastMonth">지난 달</button>

  <!-- KPI 5개 -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="label">💰 내 순수익</div>

    </div>
    <div class="kpi">
      <div class="label">✅ 실제 입금액</div>
      <div class="value blue" id="kPaid">—</div>
      <div class="sub" id="kPaidSub">0건</div>
      <div class="delta neutral" id="kPaidDelta">—</div>
    </div>
    <div class="kpi">
      <div class="label">🤝 기타 거래 규모</div>

    <div class="kpi">

  <!-- 상세 거래 리스트 -->
  <div class="detail-card">
    <div class="detail-header">

      <button class="csv-btn" id="btnCsv">💾 CSV 내보내기</button>

    <table class="detail-table" id="detailTableWrap">
      <thead>
        <tr>
          <th>날짜</th>

          <th>채널</th>

          <th class="r">지급수수료</th>

  <!-- 빈 상태 (데이터 없을 때) -->
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">📊</div>
    <div class="msg">거래 데이터가 없습니다</div>
    <div class="sub"><a href="./deals.html">거래 페이지</a>에서 먼저 등록해주세요</div>

</div>

<script src="./js/channel-master.js"></script>
<script src="./js/trade-engine.js"></script>
<script>
/* ======================================================
   GoLab Profit Scorecard v2.8a
   trade_v2 기반 수익 성적표
   v2.8a: affects_profit 필터링 + channel 부대비용 차감
   ====================================================== */

var $ = function(id){ return document.getElementById(id); };

/* -- 유틸 -- */
function n(v,fb){ if(fb===undefined) fb=0; var x=Number(v); return Number.isFinite(x)?x:fb; }
function fmtW(v){ return "\u20a9"+Math.round(v).toLocaleString(); }
function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* -- 날짜 유틸 -- */
function todayStr(){ return new Date().toISOString().substring(0,10); }
function monthStart(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}
function monthEnd(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(new Date(d.getFullYear(),d.getMonth()+1,0).getDate()).padStart(2,"0");
}
function lastMonthStart(){
  var d=new Date(); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}
function lastMonthEnd(){
  var d=new Date(); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(new Date(d.getFullYear(),d.getMonth()+1,0).getDate()).padStart(2,"0");
}
function quarterStart(){
  var d=new Date(), q=Math.floor(d.getMonth()/3)*3;
  return d.getFullYear()+"-"+String(q+1).padStart(2,"0")+"-01";
}
function prevQuarterStart(){
  var d=new Date(), q=Math.floor(d.getMonth()/3)*3;
  var pd=new Date(d.getFullYear(), q-3, 1);
  return pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-01";
}
function prevQuarterEnd(){
  var d=new Date(), q=Math.floor(d.getMonth()/3)*3;
  var pe=new Date(d.getFullYear(), q, 0);
  return pe.getFullYear()+"-"+String(pe.getMonth()+1).padStart(2,"0")+"-"+String(pe.getDate()).padStart(2,"0");
}
function yearStart(){
  return new Date().getFullYear()+"-01-01";
}
function prevYearStart(){
  return (new Date().getFullYear()-1)+"-01-01";
}
function prevYearEnd(){
  return (new Date().getFullYear()-1)+"-12-31";
}

/* -- 데이터 존재 감지 (v2 기반) -- */
function checkDealsSSoT(){
  try{
    var trades = JSON.parse(localStorage.getItem("golab_trade_v2") || "[]");
    return trades.length > 0;
  }catch(e){ return false; }
}

/* ======================================================
   기간 범위 계산
   ====================================================== */
var currentRange = "month";
var customFrom = "";
var customTo = "";

function getDateRange(){
  var today = todayStr();
  if(currentRange === "month") return { from: monthStart(), to: today };
  if(currentRange === "lastMonth") return { from: lastMonthStart(), to: lastMonthEnd() };
  if(currentRange === "quarter") return { from: quarterStart(), to: today };
  if(currentRange === "year") return { from: yearStart(), to: today };
  if(currentRange === "custom") return { from: customFrom || "0000-01-01", to: customTo || today };
  return { from: monthStart(), to: today };
}

/* 전월 대비 기간 계산 */
function getPrevDateRange(){
  if(currentRange === "month") return { from: lastMonthStart(), to: lastMonthEnd() };
  if(currentRange === "lastMonth"){
    /* 전전달 */
    var d=new Date(); d.setMonth(d.getMonth()-2);
    var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0");
    var last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return { from: y+"-"+m+"-01", to: y+"-"+m+"-"+String(last).padStart(2,"0") };
  }
  if(currentRange === "quarter") return { from: prevQuarterStart(), to: prevQuarterEnd() };
  if(currentRange === "year") return { from: prevYearStart(), to: prevYearEnd() };
  if(currentRange === "custom"){
    /* 동일 기간 전 */
    if(!customFrom || !customTo) return null;
    var f=new Date(customFrom), t=new Date(customTo);
    var diff = t - f;
    var pf=new Date(f.getTime() - diff - 86400000);
    var pt=new Date(f.getTime() - 86400000);
    return { from: pf.toISOString().substring(0,10), to: pt.toISOString().substring(0,10) };
  }
  return null;
}

/* ======================================================
   델타 계산 (전월 대비 ▲/▼)
   ====================================================== */
function renderDelta(cur, prev, inverse){
  /* inverse=true 이면 감소가 좋은 것 (미입금 등) */
  if(prev === 0 && cur === 0) return '<span class="delta neutral">\u2014</span>';
  if(prev === 0) return '<span class="delta '+(inverse?'down':'up')+'">\u25b2 신규</span>';
  var pct = ((cur - prev) / Math.abs(prev)) * 100;
  var sign = pct >= 0 ? "\u25b2" : "\u25bc";
  var abs = Math.abs(pct).toFixed(1);
  var cls;
  if(pct >= 0) cls = inverse ? "down" : "up";
  else cls = inverse ? "up" : "down";
  return '<span class="delta '+cls+'">'+sign+' '+abs+'%</span>';
}

/* ======================================================
   상태 배지
   ====================================================== */
function getStatusLabel(d){
  if(d.payment_at) return '<span class="st paid">입금완료</span>';
  if(d.invoice_at) return '<span class="st invoice">계산서</span>';
  if(d.delivery_note_at) return '<span class="st note">명세서</span>';
  if(d.order_at) return '<span class="st order">발주</span>';
  return '<span class="st quote">견적</span>';
}

/* ======================================================
   렌더링
   ====================================================== */
function render(){
  /* deals_v1 SSoT 확인 */
  var isSSoT = checkDealsSSoT();
  $("ssotBadge").style.display = isSSoT ? "inline-flex" : "none";

  if(!isSSoT){
    /* 레거시 모드: 데이터 없음 안내 */
    $("emptyState").style.display = "block";
    $("detailTableWrap").parentElement.querySelector(".detail-header").style.display = "none";
    $("detailTableWrap").style.display = "none";
    $("detailEmpty").style.display = "none";
    return;
  }

  $("emptyState").style.display = "none";
  $("detailTableWrap").parentElement.querySelector(".detail-header").style.display = "flex";
  $("detailTableWrap").style.display = "table";

  /* 기간 범위 */
  var range = getDateRange();
  var prevRange = getPrevDateRange();

  /* 집계 */
  var TE = window.GoLabTradeEngine;
  var cur = TE.getScorecard(range.from, range.to);
  var prev = prevRange ? TE.getScorecard(prevRange.from, prevRange.to) : null;

  /* -- KPI 카드 -- */
  /* 1. 내 순수익 */
  $("kMyProfit").textContent = fmtW(cur.myNetProfit);
  $("kMyProfit").className = "value " + (cur.myNetProfit >= 0 ? "green" : "red");
  var mineCount = cur.deals.filter(function(d){return d.deal_owner!=="friend"}).length;
  $("kMyProfitSub").textContent = mineCount + "건 (내 거래)";
  $("kMyProfitDelta").innerHTML = prev ? renderDelta(cur.myNetProfit, prev.myNetProfit, false) : '<span class="delta neutral">\u2014</span>';

  /* 2. 총 매출액 */
  $("kRevenue").textContent = fmtW(cur.totalRevenue);
  $("kRevenueSub").textContent = cur.dealCount + "건";
  $("kRevenueDelta").innerHTML = prev ? renderDelta(cur.totalRevenue, prev.totalRevenue, false) : '<span class="delta neutral">\u2014</span>';

  /* 3. 실제 입금액 */
  $("kPaid").textContent = fmtW(cur.paidRevenue);
  $("kPaidSub").textContent = cur.paidCount + "건 입금 완료";
  $("kPaidDelta").innerHTML = prev ? renderDelta(cur.paidRevenue, prev.paidRevenue, false) : '<span class="delta neutral">\u2014</span>';

  /* 4. 기타 거래 규모 */
  $("kFriend").textContent = fmtW(cur.friendRevenue);
  var friendCount = cur.deals.filter(function(d){return d.deal_owner==="friend"}).length;
  $("kFriendSub").textContent = friendCount + "건 (지인 거래)";
  $("kFriendDelta").innerHTML = prev ? renderDelta(cur.friendRevenue, prev.friendRevenue, false) : '<span class="delta neutral">\u2014</span>';

  /* 5. 미입금 잔액 */
  $("kReceivable").textContent = fmtW(cur.receivableAmount);
  $("kReceivableSub").textContent = cur.receivableCount + "건 대기 중";
  $("kReceivableDelta").innerHTML = prev ? renderDelta(cur.receivableAmount, prev.receivableAmount, true) : '<span class="delta neutral">\u2014</span>';

  /* -- 상세 테이블 -- */
  var deals = cur.deals.slice().sort(function(a,b){
    var da = a.quote_at || a.created_at || "";
    var db = b.quote_at || b.created_at || "";
    return db.localeCompare(da); /* 최신 먼저 */
  });

  $("detailCount").textContent = deals.length;

  if(!deals.length){
    $("detailBody").innerHTML = "";
    $("detailEmpty").style.display = "block";
    $("detailTableWrap").style.display = "none";
    return;
  }

  $("detailEmpty").style.display = "none";
  $("detailTableWrap").style.display = "table";

  var thisYear = new Date().getFullYear().toString();

  var CM = window.GoLabChannelMaster;

  $("detailBody").innerHTML = deals.map(function(d){
    var dt = (d.quote_at || d.created_at || "").substring(0,10);
    var dtDisp = dt;
    if(dt.substring(0,4) === thisYear) dtDisp = dt.substring(5);

    var partner = esc(d.partner_name_snapshot || "(미지정)");
    if(d.deal_owner === "friend") partner += ' <span class="st friend">지인</span>';

    /* v2.7: 계산 엔진 결과 사용 */
    var calc = d._calc || TE.calcTrade(d);
    var amt = calc.total_supply;
    var isChannel = d.trade_type === "channel";
    var rates = d.rates || {};
    var settlement = d.settlement || {};
    var fee = n(settlement.payout_fee);
    var dispName = d._display_name || TE.itemDisplayName(d);

    /* 채널 열 */
    var channelDisp;
    if(isChannel){
      var ch = CM ? CM.getById(d.channel_id) : null;
      channelDisp = '<span class="st" style="background:rgba(37,99,235,.08);color:#1d4ed8">' + esc(ch ? ch.code : "?") + '</span>';
    } else {
      channelDisp = '<span style="color:var(--muted);font-size:10px">직접</span>';
    }

    /* 원가/리베이트 열 (v2.8a: 부대비용 차감 표시) */
    var costDisp;
    if(isChannel){
      costDisp = '<span style="color:#1d4ed8;font-weight:600">' + n(rates.rebate_rate) + '%</span>';
      if(calc.extra_cost_total > 0) costDisp += ' <span style="font-size:9px;color:#92400e">(부대 −'+fmtW(calc.extra_cost_total)+')</span>';
    } else if(calc.has_cost){
      costDisp = fmtW(calc.total_cost);
      if(calc.extra_cost_total > 0) costDisp += ' <span style="font-size:9px;color:#92400e">(부대 '+fmtW(calc.extra_cost_total)+')</span>';
    } else {
      costDisp = '<span style="color:var(--muted)">\u2014</span>';
    }

    /* 내 최종 몫 열 */
    var profitDisp;
    if(d.deal_owner === "friend"){
      profitDisp = '<span style="color:var(--muted)">\u2014</span>';
    } else {
      var myFinal = calc.final_my_amount;
      profitDisp = '<span style="color:'+(myFinal>=0?'var(--accent)':'var(--warn)')+'">'+fmtW(myFinal)+'</span>';
    }

    return '<tr>'
      + '<td class="date">'+dtDisp+'</td>'
      + '<td class="name" title="'+esc(d.partner_name_snapshot)+'">'+partner+'</td>'
      + '<td class="name" title="'+esc(dispName)+'">'+esc(dispName)+'</td>'
      + '<td>'+channelDisp+'</td>'
      + '<td class="r">'+fmtW(amt)+'</td>'
      + '<td class="r">'+costDisp+'</td>'
      + '<td class="r">'+(fee > 0 ? fmtW(fee) : '<span style="color:var(--muted)">\u2014</span>')+'</td>'
      + '<td class="r">'+profitDisp+'</td>'
      + '<td>'+getStatusLabel(d)+'</td>'
      + '</tr>';
  }).join("");
}

/* ======================================================
   CSV 내보내기
   ====================================================== */
$("btnCsv").addEventListener("click", function(){
  var range = getDateRange();
  var TE2 = window.GoLabTradeEngine;
  var cur = TE2.getScorecard(range.from, range.to);
  var deals = cur.deals.slice().sort(function(a,b){
    return (b.quote_at||b.created_at||"").localeCompare(a.quote_at||a.created_at||"");
  });

  var CM2 = window.GoLabChannelMaster;
  /* v2.8: 품목원가/부대비용/총원가 분리 컬럼 */
  var rows = ["날짜,거래처,품목,채널,매출,품목원가,부대비용,총원가,리베이트율,지급수수료,내최종몫,상태,소유자"];
  deals.forEach(function(d){
    var dt = (d.quote_at || d.created_at || "").substring(0,10);
    var calc = d._calc || TE2.calcTrade(d);
    var isChannel = d.trade_type === "channel";
    var ch = isChannel && CM2 ? CM2.getById(d.channel_id) : null;
    var chName = ch ? ch.code + " " + ch.name : "";
    var rates = d.rates || {};
    var settlement = d.settlement || {};
    var rebateRate = isChannel ? n(rates.rebate_rate) : "";
    var profit = d.deal_owner === "friend" ? "" : calc.final_my_amount;
    var dispName = d._display_name || TE2.itemDisplayName(d);
    var status = d.payment_at ? "입금완료" : d.invoice_at ? "계산서" : d.delivery_note_at ? "명세서" : d.order_at ? "발주" : "견적";
    var owner = d.deal_owner === "friend" ? "지인" : "내거래";
    rows.push([dt, d.partner_name_snapshot||"", dispName, chName, calc.total_supply, calc.item_cost_total, calc.extra_cost_total, calc.total_cost, rebateRate, n(settlement.payout_fee), profit, status, owner].join(","));
  });

  var blob = new Blob(["\ufeff"+rows.join("\n")], {type:"text/csv;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "golab_profit_"+range.from+"_"+range.to+".csv";
  a.click();
  URL.revokeObjectURL(url);
});

/* ======================================================
   기간 필터 이벤트
   ====================================================== */
document.querySelectorAll(".fbtn").forEach(function(btn){
  btn.addEventListener("click", function(){
    document.querySelectorAll(".fbtn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    currentRange = btn.dataset.range;

    var isCustom = currentRange === "custom";
    $("dateFrom").style.display = isCustom ? "inline-block" : "none";
    $("dateSep").style.display = isCustom ? "inline" : "none";
    $("dateTo").style.display = isCustom ? "inline-block" : "none";

    if(isCustom){
      if(!$("dateFrom").value) $("dateFrom").value = monthStart();
      if(!$("dateTo").value) $("dateTo").value = todayStr();
      customFrom = $("dateFrom").value;
      customTo = $("dateTo").value;
    }

    render();
  });
});

$("dateFrom").addEventListener("change", function(e){ customFrom = e.target.value; render(); });
$("dateTo").addEventListener("change", function(e){ customTo = e.target.value; render(); });

/* -- 크로스탭 동기화 -- */
window.addEventListener("storage", function(e){
  if(e.key && e.key.startsWith("golab_")) render();
});

/* -- Init -- */
render();
