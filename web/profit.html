<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 월간 장부</title>
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--border:#e5e7eb;
      --text:#0f172a;--muted:#64748b;
      --primary:#2563eb;--warn:#dc2626;--accent:#16a34a;--orange:#d97706;
      --purple:#7c3aed;--chip:#f8fafc;--line:#e5e7eb;
      --deal:#0891b2;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      font-size:13px;line-height:1.5}

    /* -- Header (다크 톤 Sticky) -- */
    header{padding:0 20px;border-bottom:none;position:sticky;top:0;background:rgba(15,23,42,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:20;display:flex;align-items:center;justify-content:space-between;height:48px}
    header h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
    .tabs{display:flex;gap:2px;flex-wrap:wrap;height:100%}
    .tab{display:inline-flex;align-items:center;padding:0 14px;height:100%;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:600;background:transparent;transition:color .2s,border-color .2s}
    .tab:hover{color:rgba(255,255,255,.85)}
    .tab.active{color:#fff;font-weight:800;border-bottom:2px solid #fff}

    /* -- Container -- */
    .container{max-width:1200px;margin:0 auto;padding:20px}

    /* -- SSoT 배지 -- */
    .ssot-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);color:var(--primary);margin-bottom:16px}

    /* -- 기간 필터 -- */
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .fbtn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
    .fbtn:hover{color:var(--text);border-color:#cbd5e1}
    .fbtn:active{transform:scale(.97)}
    .fbtn.active{color:var(--primary);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.3)}
    .date-input{padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:11px;font-family:inherit;color:var(--text);background:var(--chip);outline:none}
    .date-input:focus{border-color:var(--primary)}
    .date-sep{color:var(--muted);font-size:11px}

    /* -- v3.0: 6셀 합계 바 -- */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    /* v3.15: 테이블 가로 스크롤 */
    .ledger-card{overflow-x:auto}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .kpi .label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .kpi .value{font-size:20px;font-weight:800;margin-top:4px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
    .kpi .sub{font-size:10px;color:var(--muted);margin-top:3px}
    .kpi .delta{font-size:10px;margin-top:3px;font-weight:700}
    .kpi .delta.up{color:var(--accent)}
    .kpi .delta.down{color:var(--warn)}
    .kpi .delta.neutral{color:var(--muted)}
    .kpi .value.green{color:var(--accent)}
    .kpi .value.orange{color:var(--orange)}
    .kpi .value.blue{color:var(--primary)}
    .kpi .value.amber{color:#b45309}
    .kpi .value.red{color:var(--warn)}

    /* -- 유형별 소계 스트립 (3열) -- */
    .type-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
    .type-strip-cell{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border-left:4px solid var(--border)}
    .type-strip-cell.solo{border-left-color:var(--accent)}
    .type-strip-cell.settle{border-left-color:var(--primary)}
    .type-strip-cell.channel{border-left-color:var(--deal)}
    .type-strip-cell .ts-title{font-size:12px;font-weight:700;margin-bottom:6px}
    .type-strip-cell .ts-count{font-size:11px;color:var(--muted);margin-bottom:4px}
    .type-strip-cell .ts-line{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
    .type-strip-cell .ts-line .ts-label{color:var(--muted)}
    .type-strip-cell .ts-line .ts-val{font-weight:700;font-variant-numeric:tabular-nums}

    /* -- 유형 배지 -- */
    .type-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap;max-width:180px}
    .type-badge.solo{background:rgba(22,163,74,.08);color:#15803d}
    .type-badge.settle{background:rgba(37,99,235,.08);color:#1d4ed8}
    .type-badge.channel{background:rgba(8,145,178,.08);color:#0e7490}
    .type-badge .ch-name{font-weight:400;opacity:.65;font-size:.9em;overflow:hidden;text-overflow:ellipsis;max-width:90px;display:inline-block;vertical-align:bottom}

    /* -- 원장 테이블 -- */
    .ledger-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .ledger-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .ledger-header h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
    .ledger-header .badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;background:#dbeafe;color:var(--primary)}
    .ledger-header .csv-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
    .ledger-header .csv-btn:hover{color:var(--text);border-color:#94a3b8}
    .ledger-header .csv-btn:active{transform:scale(.97)}

    .ledger-table{width:100%;border-collapse:collapse;font-size:12px}
    /* v3.0: 컴팩트 원장 — 행간 축소 */
    .ledger-table thead th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
    .ledger-table thead th.r{text-align:right}
    .ledger-table thead th.c{text-align:center}
    .ledger-table tbody td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text);font-variant-numeric:tabular-nums;font-size:11px}
    .ledger-table tbody td.r{text-align:right;font-weight:600}
    .ledger-table tbody td.c{text-align:center}
    .ledger-table tbody td.name{font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ledger-table tbody td.date{color:var(--muted);white-space:nowrap;font-size:11px}
    .ledger-table tbody tr[data-toggle]{cursor:pointer;transition:background .1s}
    .ledger-table tbody tr[data-toggle]:hover{background:rgba(37,99,235,.06)}

    /* -- v3.2: 검색 입력 -- */
    .search-input{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-family:inherit;outline:none;min-width:160px;flex:0 1 200px;transition:border-color .15s}
    .search-input:focus{border-color:var(--primary)}
    .search-input::placeholder{color:var(--muted);font-size:11px}

    /* -- v3.2: 미입금 토글 -- */
    .unpaid-toggle.active{color:#b45309;background:rgba(217,119,6,.1);border-color:rgba(217,119,6,.3)}

    /* -- v3.2: 정렬 구분/라벨/버튼 -- */
    .sort-sep{color:var(--border);margin:0 4px;font-size:11px}
    .sort-label{font-size:10px;color:var(--muted);font-weight:600}
    .sort-btn.active{color:var(--primary);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.3)}

    /* -- v3.2: 정렬 화살표 (thead) -- */
    .sortable{cursor:pointer;user-select:none;transition:color .15s}
    .sortable:hover{color:var(--primary)}
    .sort-arrow{font-size:9px;color:var(--primary);margin-left:2px;opacity:0;transition:opacity .15s}
    .sort-arrow.active{opacity:1}

    /* ── 확장 상세 행 v3.8 SaaS 리디자인 ── */
    .expand-row td{background:rgba(8,145,178,.01);padding:8px 12px!important;border-bottom:2px solid var(--line)}
    .exp-panel{border-radius:12px;border:1px solid var(--line);background:var(--card);overflow:hidden}
    .exp-hero{padding:20px 24px 14px;background:linear-gradient(135deg,rgba(8,145,178,.04),rgba(8,145,178,.01));border-bottom:1px solid var(--line)}
    .exp-hero-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
    .exp-hero .eh-name{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.02em}
    .exp-hero .eh-amount{font-size:14px;font-weight:800;color:var(--deal);font-variant-numeric:tabular-nums}
    .exp-hero-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
    .exp-hero-meta span{display:inline-flex;align-items:center;gap:3px}
    .exp-hero-meta b{color:var(--text);font-weight:600}
    .exp-zone{padding:16px 24px}
    .exp-zone + .exp-zone{border-top:1px solid rgba(0,0,0,.04)}
    .exp-zone-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
    .exp-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .expand-section{margin-bottom:0}
    .expand-section:last-child{margin-bottom:0}
    .expand-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .expand-btn{padding:2px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;cursor:pointer;transition:all .1s;font-weight:600}
    .expand-btn:hover{color:var(--text);border-color:#94a3b8}
    .expand-btn:active{transform:scale(.97)}

    /* 계산식 한 줄 요약 */
    .cockpit-formula{font-size:10px;color:var(--muted);background:rgba(0,0,0,.02);border:none;border-radius:8px;padding:8px 10px;line-height:1.6;word-break:keep-all}
    .cockpit-formula b{color:var(--text);font-weight:700}

    /* 수익 구조 행 */
    .cockpit-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid rgba(8,145,178,.08)}
    .cockpit-row:last-child{border-bottom:none}
    .cockpit-row .lbl{font-size:11px;color:var(--muted);font-weight:600}
    .cockpit-row .val{font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;font-size:14px}
    .cockpit-row.highlight{background:rgba(8,145,178,.04);margin:0 -12px;padding:10px 12px;border-radius:10px;border-bottom:none;margin-top:6px}
    .cockpit-row.highlight .lbl{color:var(--deal);font-weight:700}
    .cockpit-row.highlight .val{color:var(--deal);font-size:16px;font-weight:800}
    .cockpit-divider{height:1px;background:rgba(8,145,178,.1);margin:8px 0}

    /* 품목/부대비용 미니 테이블 */
    .mini-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
    .mini-table th{text-align:left;padding:4px 8px;border-bottom:1px solid var(--line);color:var(--muted);font-weight:600;font-size:10px}
    .mini-table th.r{text-align:right}
    .mini-table td{padding:4px 8px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
    .mini-table td.r{text-align:right}
    .exp-footer{padding:10px 24px;border-top:1px solid var(--line);background:rgba(0,0,0,.01);text-align:right}
    .deals-link{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;color:var(--deal);background:rgba(8,145,178,.06);text-decoration:none;transition:background .15s}
    .deals-link:hover{background:rgba(8,145,178,.12)}

    /* -- tfoot 합계 행 -- */
    .ledger-table tfoot td{padding:10px;border-top:2px solid var(--border);font-weight:800;font-size:12px;background:var(--chip);font-variant-numeric:tabular-nums}

    /* -- 상태 배지 -- */
    .st{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap}
    .st.paid{background:#dcfce7;color:#166534}
    .st.invoice{background:#dbeafe;color:#1e40af}
    .st.note{background:#fef3c7;color:#92400e}
    .st.order{background:#e0e7ff;color:#3730a3}
    .st.quote{background:#f1f5f9;color:#475569}
    /* v3.0: .st.friend 폐기 */

    /* -- v3.4: 섹션 분리 -- */
    .section-header-row td{padding:14px 10px 10px;font-weight:700;font-size:13px;border-bottom:2px solid var(--line);background:var(--bg)}
    .section-header-row:first-child td{padding-top:10px}
    .section-header-row .section-stats{font-weight:400;font-size:11px;color:var(--muted);margin-left:12px}
    .section-header-row .section-stats b{color:var(--text);font-weight:600}
    .section-header-row .section-stats .profit-pos{color:var(--accent);font-weight:700}
    .section-header-row .section-stats .profit-neg{color:var(--warn);font-weight:700}

    /* -- v3.13: 정산 대상 탭 -- */
    .target-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .target-tab{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:left;line-height:1.4}
    .target-tab:hover{color:var(--text);border-color:#cbd5e1}
    .target-tab:active{transform:scale(.97)}
    .target-tab.active{color:#fff;background:var(--primary);border-color:var(--primary)}
    .target-tab .tab-count{font-size:10px;opacity:.7;margin-left:2px}
    .target-tab .tab-amount{display:block;font-size:10px;margin-top:1px;opacity:.8;font-weight:400}

    /* -- v3.5: 섹션 비교 카드 -- */
    .section-compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
    .sec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .sec-card .sec-title{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--line)}
    .sec-card .sec-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04)}
    .sec-card .sec-row:last-child{border-bottom:none}
    .sec-card .sec-row .lbl{color:var(--muted)}
    .sec-card .sec-row .val{font-weight:700;font-variant-numeric:tabular-nums}

    /* -- v3.5: 월별 요약 테이블 -- */
    .summary-table tbody td{font-variant-numeric:tabular-nums}
    .summary-table tbody tr{transition:background .1s}
    .summary-table tbody tr:hover{background:rgba(37,99,235,.06)}

    /* -- v4: 통합 입금 배지 — 연한 배경 + 진한 글자 + border 가독성 개선 -- */
    .pay-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent}
    .pay-badge.unpaid{background:#fef2f2;color:#991b1b;border-color:#fecaca}
    .pay-badge.vat_pending{background:#fffbeb;color:#92400e;border-color:#fde68a}
    .pay-badge.paid{background:#f0fdf4;color:#14532d;border-color:#bbf7d0}
    .pay-badge .pay-pct{font-weight:800;font-size:9px;opacity:.8}
    .pay-progress-bar{height:4px;border-radius:2px;background:rgba(0,0,0,.06);overflow:hidden;margin-top:3px}
    .pay-progress-fill{height:100%;border-radius:2px;transition:width .3s ease}

    /* -- 빈 상태 -- */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .icon{font-size:48px;margin-bottom:12px}
    .empty-state .msg{font-size:14px;font-weight:600;margin-bottom:6px}
    .empty-state .sub{font-size:12px}
    .empty-state a{color:var(--primary);text-decoration:none;font-weight:600}
    .no-data{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px}

    /* -- Responsive -- */
    @media(max-width:900px){
      .kpi-row{grid-template-columns:repeat(2,1fr)}
      .kpi-row.six{grid-template-columns:repeat(3,1fr)}
      .type-strip{grid-template-columns:1fr}
      .exp-2col{grid-template-columns:1fr}
    }
    @media(max-width:700px){
      .container{padding:12px}
      .kpi .value{font-size:22px}
      .section-compare{grid-template-columns:1fr}
      .exp-zone{padding:12px 16px}
      .exp-hero{padding:16px}
    }
    /* v4: 모바일 테이블 축소 — 날짜/거래처/품목/내 몫/입금만 표시 */
    @media(max-width:768px){
      .col-desk{display:none!important}
      .ledger-table{min-width:auto}
      .ledger-table tbody td.name{max-width:none}
      /* v4: 모바일 상세 버튼 터치 영역 44×44px (Apple HIG / Material Design 기준) */
      .expand-btn{min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
    }
    @media(max-width:480px){
      .kpi-row{grid-template-columns:1fr}
      .ledger-table{font-size:11px}
      .ledger-table thead th,.ledger-table tbody td{padding:6px 6px}
      .exp-footer{padding:10px 16px}
    }
  </style>
</head>
<body>
<header>
  <h1>GoLab</h1>
  <nav class="tabs">
    <a class="tab" href="./console.html">🏠 메인</a>
    <a class="tab" href="./deals.html">🔥 거래</a>
    <a class="tab" href="./item-master.html">🏷 품목</a>
    <!-- [GoLab v4] inventory tab hidden - file kept at index.html -->
    <a class="tab active" href="./profit.html">💰 수익</a>
    <a class="tab" href="./partner-master.html">👥 거래처</a>
  </nav>
</header>

<div class="container">

  <!-- SSoT 배지 -->
  <div class="ssot-badge" id="ssotBadge" style="display:none">
    📑 거래 엔진 v3 기반 · 수익 관제탑
  </div>

  <!-- 기간 필터 -->
  <div class="filter-bar">
    <button class="fbtn active" data-range="month">이번 달</button>
    <button class="fbtn" data-range="lastMonth">지난 달</button>
    <button class="fbtn" data-range="quarter">이번 분기</button>
    <button class="fbtn" data-range="year">올해</button>
    <button class="fbtn" data-range="pickMonth">월 선택</button>
    <button class="fbtn" data-range="custom">직접 선택</button>
    <!-- v3.0: YYYY-MM 월 선택기 + 기존 날짜 범위 -->
    <input type="month" class="date-input" id="monthPicker" style="display:none" />
    <input type="date" class="date-input" id="dateFrom" style="display:none" />
    <span class="date-sep" id="dateSep" style="display:none">~</span>
    <input type="date" class="date-input" id="dateTo" style="display:none" />
  </div>

  <!-- v3.13: 정산 대상 탭 (동적 생성) -->
  <div class="target-tabs" id="targetTabs"></div>

  <!-- v3.2: 검색 + 미입금 필터 + 정렬 -->
  <div class="filter-bar" id="searchSortBar" style="gap:8px;align-items:center;flex-wrap:wrap">
    <input type="text" class="search-input" id="profitSearch" placeholder="🔍 거래처, 품목, 관리업체 검색" />
    <button class="fbtn unpaid-toggle" id="btnUnpaidOnly">📋 미입금만</button>
    <span class="sort-sep">|</span>
    <span class="sort-label">정렬:</span>
    <button class="fbtn sort-btn active" data-sort="date">거래일 ↓</button>
    <button class="fbtn sort-btn" data-sort="revenue">매출</button>
    <button class="fbtn sort-btn" data-sort="myProfit">내몫</button>
    <button class="fbtn sort-btn" data-sort="unpaid">미입금 우선</button>

/* -- 유틸 -- */
function n(v,fb){ if(fb===undefined) fb=0; var x=Number(v); return Number.isFinite(x)?x:fb; }
function fmtW(v){ return "\u20a9"+Math.round(v).toLocaleString(); }
function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* -- v3.5a: KPI 카운트 애니메이션 (rAF 기반, 300ms ease-out) -- */
var _kpiAnimMap = {};  /* el.id → rAF id (중복 방지) */
function animateKPI(el, target, dur) {
  if (!el) return;
  if (!dur) dur = 300;
  /* 현재 표시값 파싱 (₩1,230,000 → 1230000) */
  var cur = parseInt((el.textContent || "0").replace(/[^\d\-]/g, ""), 10) || 0;
  var tgt = Math.round(target);
  /* 같은 값이면 스킵 */
  if (cur === tgt) { el.textContent = fmtW(tgt); return; }
  /* 기존 애니메이션 취소 */
  if (_kpiAnimMap[el.id]) cancelAnimationFrame(_kpiAnimMap[el.id]);
  var start = null;
  var diff = tgt - cur;
  function step(ts) {
    if (!start) start = ts;
    var elapsed = ts - start;
    var progress = Math.min(elapsed / dur, 1);
    /* ease-out cubic: 1 - (1-t)^3 */
    var eased = 1 - Math.pow(1 - progress, 3);
    var val = Math.round(cur + diff * eased);
    el.textContent = fmtW(val);
    if (progress < 1) {
      _kpiAnimMap[el.id] = requestAnimationFrame(step);
    } else {
      el.textContent = fmtW(tgt); /* 정확한 최종값 보장 */
      delete _kpiAnimMap[el.id];
    }
  }
  _kpiAnimMap[el.id] = requestAnimationFrame(step);
}

/* -- 날짜 유틸 -- */
function todayStr(){ return new Date().toISOString().substring(0,10); }
function monthStart(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}
function monthEnd(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(new Date(d.getFullYear(),d.getMonth()+1,0).getDate()).padStart(2,"0");
}
function lastMonthStart(){
  var d=new Date(); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}
function lastMonthEnd(){
  var d=new Date(); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(new Date(d.getFullYear(),d.getMonth()+1,0).getDate()).padStart(2,"0");
}
function quarterStart(){
  var d=new Date(), q=Math.floor(d.getMonth()/3)*3;
  return d.getFullYear()+"-"+String(q+1).padStart(2,"0")+"-01";
}
function prevQuarterStart(){
  var d=new Date(), q=Math.floor(d.getMonth()/3)*3;
  var pd=new Date(d.getFullYear(), q-3, 1);
  return pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-01";
}
function prevQuarterEnd(){
  var d=new Date(), q=Math.floor(d.getMonth()/3)*3;
  var pe=new Date(d.getFullYear(), q, 0);
  return pe.getFullYear()+"-"+String(pe.getMonth()+1).padStart(2,"0")+"-"+String(pe.getDate()).padStart(2,"0");
}
function yearStart(){
  return new Date().getFullYear()+"-01-01";
}
function prevYearStart(){
  return (new Date().getFullYear()-1)+"-01-01";
}
function prevYearEnd(){
  return (new Date().getFullYear()-1)+"-12-31";
}

/* -- 데이터 존재 감지 (v2 기반) -- */

/* ======================================================
   기간 범위 계산
   ====================================================== */
var currentRange = "month";
var customFrom = "";
var customTo = "";

function getDateRange(){
  var today = todayStr();
  if(currentRange === "month") return { from: monthStart(), to: today };
  if(currentRange === "lastMonth") return { from: lastMonthStart(), to: lastMonthEnd() };
  if(currentRange === "quarter") return { from: quarterStart(), to: today };
  if(currentRange === "year") return { from: yearStart(), to: today };
  /* v3.0: 월 선택기 & 직접 선택 모두 customFrom/customTo 사용 */
  if(currentRange === "pickMonth" || currentRange === "custom") return { from: customFrom || "0000-01-01", to: customTo || today };
  return { from: monthStart(), to: today };
}

/* 전월 대비 기간 계산 */
function getPrevDateRange(){
  if(currentRange === "month") return { from: lastMonthStart(), to: lastMonthEnd() };
  if(currentRange === "lastMonth"){
    var d=new Date(); d.setMonth(d.getMonth()-2);
    var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0");
    var last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return { from: y+"-"+m+"-01", to: y+"-"+m+"-"+String(last).padStart(2,"0") };
  }
  if(currentRange === "quarter") return { from: prevQuarterStart(), to: prevQuarterEnd() };
  if(currentRange === "year") return { from: prevYearStart(), to: prevYearEnd() };
  /* v3.0: 월 선택기 → 전월 자동 계산 */
  if(currentRange === "pickMonth"){
    var val = $("monthPicker").value;
    if(!val) return null;
    var pts = val.split("-");
    var pd = new Date(parseInt(pts[0]), parseInt(pts[1])-2, 1); /* 전월 1일 */
    var pLastDay = new Date(pd.getFullYear(), pd.getMonth()+1, 0).getDate();
    return { from: pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-01",
             to: pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-"+String(pLastDay).padStart(2,"0") };
  }
  if(currentRange === "custom"){
    if(!customFrom || !customTo) return null;
    var f=new Date(customFrom), t=new Date(customTo);
    var diff = t - f;
    var pf=new Date(f.getTime() - diff - 86400000);
    var pt=new Date(f.getTime() - 86400000);
    return { from: pf.toISOString().substring(0,10), to: pt.toISOString().substring(0,10) };
  }
  return null;
}

/* ======================================================

   ====================================================== */
function renderDelta(cur, prev, inverse){
  if(prev === 0 && cur === 0) return '<span class="delta neutral">\u2014</span>';
  if(prev === 0) return '<span class="delta '+(inverse?'down':'up')+'">\u25b2 신규</span>';
  var pct = ((cur - prev) / Math.abs(prev)) * 100;
  var sign = pct >= 0 ? "\u25b2" : "\u25bc";
  var abs = Math.abs(pct).toFixed(1);
  var cls;
  if(pct >= 0) cls = inverse ? "down" : "up";
  else cls = inverse ? "up" : "down";
  return '<span class="delta '+cls+'">'+sign+' '+abs+'%</span>';
}

/* v3.15: 섹션 시스템 제거 → 사업축 탭 필터로 대체 */

/* ══════════════════════════════════════════════════════
   v3.15: 사업축 필터 탭 빌더
   [전체] [대성금속] [장비] [소모품] [기타 거래처] — 독립 축
   ══════════════════════════════════════════════════════ */

/* 거래별 S 지급액 산출 (actual > expected fallback) */
function getSPaid(deal) {
  var s = n((deal.settlement || {}).actual_S_amount);
  if (s > 0) return s;
  var c = deal._calc || TE.calcTrade(deal);
  return n(c.expected_S_amount);
}

/* 사업축 탭 정의 */
var BUSINESS_TABS = [
  { key: "all",         label: "전체",       filter: function(){ return true; } },
  { key: "daesung",     label: "🏭 대성금속", filter: function(d){ return isDaesung(d); } },
  { key: "equipment",   label: "⚙️ 장비",    filter: function(d){ return dealHasCategory(d, "장비"); } },
  { key: "consumables", label: "📦 소모품",   filter: function(d){ return dealHasCategory(d, "일반상품"); } },
  { key: "other",       label: "💼 기타 거래처", filter: function(d){ return !isDaesung(d); } }
];

/* 사업축 탭 렌더 + 이벤트 바인딩 */
function buildBusinessFilterTabs(deals) {
  var html = '';

  BUSINESS_TABS.forEach(function(tab) {
    /* 각 탭별 건수/매출 집계 */
    var count = 0, revenue = 0;
    deals.forEach(function(d) {
      if (tab.filter(d)) {
        count++;
        var c = d._calc || TE.calcTrade(d);
        revenue += c.total_supply;
      }
    });

    html += '<button class="target-tab' + (currentTarget === tab.key ? ' active' : '') + '" data-target="' + tab.key + '">';
    html += tab.label + ' <span class="tab-count">' + count + '</span>';
    if (count > 0) html += '<span class="tab-amount">' + fmtW(revenue) + '</span>';
    html += '</button>';
  });

  $("targetTabs").innerHTML = html;

  /* 이벤트 바인딩 */
  $("targetTabs").querySelectorAll(".target-tab").forEach(function(btn) {
    btn.addEventListener("click", function() {
      currentTarget = btn.dataset.target;
      _expandedId = null;
      render();
    });
  });
}

/* ======================================================
   v3.2: 정렬 함수
   ====================================================== */
function sortDeals(deals){
  var key = currentSortKey;
  /* 기본 비교가 desc-natural (cb-ca, db>da) 이므로 desc=1, asc=-1 */
  var dir = currentSortDir === "desc" ? 1 : -1;

  return deals.slice().sort(function(a, b){
    if(key === "date"){
      var da = a.deal_date || a.quote_at || a.created_at || "";
      var db = b.deal_date || b.quote_at || b.created_at || "";
      return dir * db.localeCompare(da); /* desc 기본: 최신순 */
    }
    if(key === "revenue"){
      var ca = (a._calc || TE.calcTrade(a)).total_supply;
      var cb = (b._calc || TE.calcTrade(b)).total_supply;
      return dir * (cb - ca);
    }
    if(key === "myProfit"){
      var ca = (a._calc || TE.calcTrade(a)).final_my_amount;
      var cb = (b._calc || TE.calcTrade(b)).final_my_amount;
      return dir * (cb - ca);
    }
    if(key === "unpaid"){
      /* 미입금 우선 → 그 안에서 날짜 최신순 */
      var aUnpaid = a.payment_at ? 0 : 1;
      var bUnpaid = b.payment_at ? 0 : 1;
      if(aUnpaid !== bUnpaid) return bUnpaid - aUnpaid; /* 미입금 먼저 */
      var da = a.deal_date || a.quote_at || a.created_at || "";
      var db = b.deal_date || b.quote_at || b.created_at || "";
      return db.localeCompare(da);
    }
    return 0;
  });
}

/* v3.15: costSummaryHtml 제거 → 11컬럼 개별 표시로 대체 */

/* ======================================================
   v3.15: 플랫 원장 테이블 렌더 — 11컬럼
   거래처 | 품목 | 매출 | 원가 | 순이익 | 관리업체 | 배분대상 | S지급 | 내 몫 | 입금 | 상세
   ====================================================== */
var _expandedId = null;

function renderFlatTable(deals, thisYear){
  var html = "";

  deals.forEach(function(d){
    var partner = esc(d.partner_name_snapshot || "(미지정)");
    var calc = d._calc || TE.calcTrade(d);
    var dispName = d._display_name || TE.itemDisplayName(d);
    var isChannel = d.trade_type === "channel";

    /* 원가 = 품목원가 + 부대비용 */
    var totalCostVal = calc.item_cost_total + calc.extra_cost_total;
    var costDisp = calc.has_cost ? fmtW(totalCostVal) : '<span style="color:var(--muted)">—</span>';

    /* 순이익 */
    var gpDisp = '<span style="color:'+(calc.gross_profit>=0?'var(--accent)':'var(--warn)')+'">'+fmtW(calc.gross_profit)+'</span>';

    /* 관리업체 몫: channel만 표시, direct는 "—" */
    var rebateDisp = isChannel
      ? fmtW(calc.rebate_amount) + '<br><span style="font-size:9px;color:var(--muted)">'+n((d.rates||{}).rebate_rate)+'%</span>'
      : '<span style="color:var(--muted)">—</span>';

    /* 배분대상 */
    var distribDisp = fmtW(calc.distributable);

    /* S 지급 */
    var sPaid = getSPaid(d);
    var sDisp = sPaid > 0 ? fmtW(sPaid) : '<span style="color:var(--muted)">—</span>';

    /* 내 최종 몫 — 굵은 폰트 + 강조 컬러 */
    var myFinal = calc.final_my_amount;
    var myDisp = '<span style="font-weight:800;color:'+(myFinal>=0?'var(--accent)':'var(--warn)')+'">'+fmtW(myFinal)+'</span>';

    /* v4: 입금 상태 — 통합 pay-badge 클래스 사용 */
    var payStatus = TE.calcPaymentStatus(d);
    var payDisp = '<span class="pay-badge '+payStatus.code+'">'+payStatus.label+'</span>';

    var isExpanded = (_expandedId === d.id);

    /* 날짜: deal_date 우선, fallback created_at → MM-DD 표시 */
    var _rawDt = (d.deal_date || d.created_at || "").substring(0,10);
    var _dtDisp = _rawDt ? _rawDt.substring(5) : "—"; /* MM-DD */

    /* 거래 행 — 12컬럼 */
    html += '<tr data-toggle="'+d.id+'">';
    html += '<td style="white-space:nowrap;color:var(--muted);font-size:11px">'+_dtDisp+'</td>';
    html += '<td class="name" title="'+esc(d.partner_name_snapshot)+'">'+partner+'</td>';
    html += '<td class="name" title="'+esc(dispName)+'">'+esc(dispName)+'</td>';
    html += '<td class="r col-desk">'+fmtW(calc.total_supply)+'</td>';
    html += '<td class="r col-desk">'+costDisp+'</td>';
    html += '<td class="r col-desk">'+gpDisp+'</td>';
    html += '<td class="r col-desk">'+rebateDisp+'</td>';
    html += '<td class="r col-desk">'+distribDisp+'</td>';
    html += '<td class="r col-desk">'+sDisp+'</td>';
    html += '<td class="r">'+myDisp+'</td>';
    html += '<td class="c">'+payDisp+'</td>';
    html += '<td class="c col-desk"><button class="expand-btn">'+(isExpanded?'▲':'▼')+'</button></td>';
    html += '</tr>';

    /* 확장 행 */
    if(isExpanded){
      html += '<tr class="expand-row"><td colspan="12"><div class="exp-panel">';
      html += renderExpansion(d, calc);
      html += '</div></td></tr>';
    }
  });

  return html;
}

/* ======================================================
   v3.15: tfoot 합계 행 렌더 — 11컬럼
   ====================================================== */
function renderFlatFooter(deals){
  var cnt = deals.length;
  var tRevenue=0, tCost=0, tGP=0, tRebate=0, tDistrib=0, tSPaid=0, tMy=0;
  deals.forEach(function(d){
    var c = d._calc || TE.calcTrade(d);
    tRevenue += c.total_supply;
    tCost    += (c.item_cost_total + c.extra_cost_total);
    tGP      += c.gross_profit;
    tRebate  += (c.rebate_amount || 0);
    tDistrib += c.distributable;
    tSPaid   += getSPaid(d);
    tMy      += c.final_my_amount;
  });

  var html = '<tr>';
  html += '<td colspan="3" style="text-align:right;font-weight:700">합계 <b>'+cnt+'</b>건</td>';
  html += '<td class="r col-desk" style="font-variant-numeric:tabular-nums;font-weight:700">'+fmtW(tRevenue)+'</td>';
  html += '<td class="r col-desk" style="font-variant-numeric:tabular-nums">'+fmtW(tCost)+'</td>';
  html += '<td class="r col-desk" style="color:'+(tGP>=0?'var(--accent)':'var(--warn)')+'">'+fmtW(tGP)+'</td>';
  html += '<td class="r col-desk">'+fmtW(tRebate)+'</td>';
  html += '<td class="r col-desk">'+fmtW(tDistrib)+'</td>';
  html += '<td class="r col-desk">'+fmtW(tSPaid)+'</td>';
  html += '<td class="r" style="font-weight:700;color:'+(tMy>=0?'var(--accent)':'var(--warn)')+'">'+fmtW(tMy)+'</td>';
  html += '<td></td><td class="col-desk"></td>';
  html += '</tr>';

  return html;
}

/* ======================================================
   v3.15: 메인 렌더링 — 사업축 필터 + 4셀 KPI + 플랫 테이블
   ====================================================== */
function render(){
  /* SSoT 확인 */
  var isSSoT = checkDealsSSoT();
  $("ssotBadge").style.display = isSSoT ? "inline-flex" : "none";

  if(!isSSoT){
    $("emptyState").style.display = "block";
    $("ledgerHeader").style.display = "none";
    $("ledgerTable").style.display = "none";
    $("ledgerEmpty").style.display = "none";
    $("targetTabs").innerHTML = "";
    return;
  }

  /* 기간 범위 */
  var range = getDateRange();
  var prevRange = getPrevDateRange();

  /* 집계 */
  var cur = TE.getScorecard(range.from, range.to);
  var prev = prevRange ? TE.getScorecard(prevRange.from, prevRange.to) : null;

  /* v3.15: 사업축 탭 동적 생성 (항상 전체 기간 deals 기준) */
  buildBusinessFilterTabs(cur.deals);

  /* ── 관제 화면 (항상 표시) ── */
  $("emptyState").style.display = "none";
  $("ledgerHeader").style.display = "flex";
  $("ledgerTable").style.display = "table";

  /* ── v3.15: 필터 파이프라인 (사업축→검색→미입금) ── */
  var filteredDeals = cur.deals;

  /* 1) 사업축 필터 */
  if (currentTarget !== "all") {
    var tabDef = BUSINESS_TABS.filter(function(t){ return t.key === currentTarget; })[0];
    if (tabDef) {
      filteredDeals = filteredDeals.filter(tabDef.filter);
    }
  }

  /* 2) v5: 검색 3필드 — partner + items + channel (정규화: trim + toLowerCase) */
  if(currentSearchQuery){
    filteredDeals = filteredDeals.filter(function(d){
      var pn = (d.partner_name_snapshot || "").trim().toLowerCase();
      var cn = (d.channel_name_snapshot || "").trim().toLowerCase();
      var itemNames = (d.items || []).map(function(it){ return (it.name || "").trim().toLowerCase(); }).join(" ");
      return pn.indexOf(currentSearchQuery) !== -1 ||
             itemNames.indexOf(currentSearchQuery) !== -1 ||
             cn.indexOf(currentSearchQuery) !== -1;
    });
  }

  /* 3) 미입금만 필터 */
  if(unpaidOnly){
    filteredDeals = filteredDeals.filter(function(d){
      return !d.payment_at;
    });
  }

  /* ── v3.15: KPI 4셀 = filteredDeals 기준 ── */
  var vis = { revenue:0, cost:0, gp:0, myProfit:0, count:0 };
  filteredDeals.forEach(function(d){
    var c = d._calc || TE.calcTrade(d);
    vis.revenue  += c.total_supply;
    vis.cost     += (c.item_cost_total + c.extra_cost_total);
    vis.gp       += c.gross_profit;
    vis.myProfit += c.final_my_amount;
    vis.count++;
  });

  /* Delta 표시 조건: 대상=전체 + 검색없음 + 미입금OFF */
  var showDelta = (currentTarget === "all" && !currentSearchQuery && !unpaidOnly);

  /* 1. 매출 */
  animateKPI($("kRevenue"), vis.revenue);
  $("kRevenueSub").textContent = vis.count + "건";
  $("kRevenueDelta").innerHTML = (showDelta && prev)
    ? renderDelta(vis.revenue, prev.totalRevenue, false)
    : '<span class="delta neutral">\u2014</span>';

  /* 2. 원가 */
  animateKPI($("kCost"), vis.cost);
  $("kCostSub").textContent = "";

  /* 3. 순이익 */
  $("kGross").className = "value " + (vis.gp >= 0 ? "green" : "red");
  animateKPI($("kGross"), vis.gp);
  $("kGrossSub").textContent = "";

  /* 4. 내 몫 (강조) */
  $("kMyProfit").className = "value " + (vis.myProfit >= 0 ? "green" : "red");
  animateKPI($("kMyProfit"), vis.myProfit);
  $("kMyProfitSub").textContent = vis.count + "건";
  $("kMyProfitDelta").innerHTML = (showDelta && prev)
    ? renderDelta(vis.myProfit, prev.myNetProfit, false)
    : '<span class="delta neutral">\u2014</span>';

  /* -- 거래 원장 테이블 -- */
  var thisYear = new Date().getFullYear().toString();
  var hasFilter = (currentTarget !== "all" || currentSearchQuery || unpaidOnly);
  $("ledgerCount").textContent = filteredDeals.length + (hasFilter ? " / " + cur.dealCount : "");

  if(!filteredDeals.length){
    $("ledgerBody").innerHTML = "";
    $("ledgerFoot").innerHTML = "";
    $("ledgerEmpty").style.display = "block";
    $("ledgerTable").style.display = "none";
    return;
  }

  $("ledgerEmpty").style.display = "none";
  $("ledgerTable").style.display = "table";

  /* v3.15: 플랫 테이블 (섹션 분할 없음) */
  var sorted = sortDeals(filteredDeals);
  $("ledgerBody").innerHTML = renderFlatTable(sorted, thisYear);
  $("ledgerFoot").innerHTML = renderFlatFooter(filteredDeals);
  bindFlatToggleEvents(sorted, thisYear);
  updateSortUI();
}

/* ======================================================
   v3.15: 토글 이벤트 바인딩 (플랫 테이블)
   ====================================================== */
function bindFlatToggleEvents(sorted, thisYear){
  $("ledgerBody").querySelectorAll("[data-toggle]").forEach(function(tr){
    tr.addEventListener("click", function(e){
      if(e.target.closest("a")) return;
      var tid = tr.dataset.toggle;
      _expandedId = (_expandedId === tid) ? null : tid;
      /* 테이블만 다시 렌더 (플랫 구조) */
      $("ledgerBody").innerHTML = renderFlatTable(sorted, thisYear);
      $("ledgerFoot").innerHTML = renderFlatFooter(sorted);
      bindFlatToggleEvents(sorted, thisYear);
      /* 확장된 행으로 스크롤 */
      if(_expandedId){
        var expRow = $("ledgerBody").querySelector(".expand-row");
        if(expRow) expRow.scrollIntoView({behavior:"smooth", block:"nearest"});
      }
    });
  });
}

/* ======================================================
   v3.2: 정렬 UI 동기화
   ====================================================== */
function updateSortUI(){
  var arrow = currentSortDir === "desc" ? "↓" : "↑";

  /* 정렬 버튼 (.sort-btn) */
  $("searchSortBar").querySelectorAll(".sort-btn").forEach(function(btn){
    var isActive = btn.dataset.sort === currentSortKey;
    btn.classList.toggle("active", isActive);
    /* 활성 버튼에만 방향 표시 */
    var baseText = { date:"거래일", revenue:"매출", myProfit:"내몫", unpaid:"미입금 우선" };
    btn.textContent = (baseText[btn.dataset.sort] || btn.dataset.sort) + (isActive ? " " + arrow : "");
  });

  /* thead 정렬 화살표 */
  $("ledgerTable").querySelectorAll("thead .sortable").forEach(function(th){
    var arrowEl = th.querySelector(".sort-arrow");
    if(!arrowEl) return;
    var isActive = th.dataset.sort === currentSortKey;
    arrowEl.classList.toggle("active", isActive);
    arrowEl.textContent = isActive ? arrow : "";
  });
}

/* ======================================================
   v3.15: CSV 내보내기 — 11컬럼 구조
   ====================================================== */
$("btnCsv").addEventListener("click", function(){
  var range = getDateRange();
  var cur = TE.getScorecard(range.from, range.to);
  var deals = cur.deals.slice().sort(function(a,b){
    return (b.deal_date||b.quote_at||b.created_at||"").localeCompare(a.deal_date||a.quote_at||a.created_at||"");
  });

  /* v3.15: 새 CSV 헤더 (12컬럼) */
  var rows = ["날짜,거래처,품목,매출,원가,순이익,관리업체몫,배분대상,S지급,내몫,입금상태"];
  deals.forEach(function(d){
    var calc = d._calc || TE.calcTrade(d);
    var dispName = d._display_name || TE.itemDisplayName(d);
    var totalCost = calc.item_cost_total + calc.extra_cost_total;
    var rebate = calc.rebate_amount || 0;
    var sPaid = getSPaid(d);
    var payStatus = TE.calcPaymentStatus(d);
    var payLabel = payStatus.code === "paid" ? "완납" : "미정산";
    /* CSV는 YYYY-MM-DD, deal_date 우선 fallback created_at */
    var csvDate = (d.deal_date || d.created_at || "").substring(0,10);

    rows.push([
      csvDate,
      '"'+(d.partner_name_snapshot||"").replace(/"/g,'""')+'"',
      '"'+(dispName||"").replace(/"/g,'""')+'"',
      calc.total_supply,
      totalCost,
      calc.gross_profit,
      rebate,
      calc.distributable,
      sPaid,
      calc.final_my_amount,
      payLabel
    ].join(","));
  });

  var blob = new Blob(["\ufeff"+rows.join("\n")], {type:"text/csv;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "golab_profit_"+range.from+"_"+range.to+".csv";
  a.click();
  URL.revokeObjectURL(url);
});

    }
    _expandedId = null;
    render();
  });
});

/* ======================================================
   v3.2: thead 정렬 클릭
   ====================================================== */
$("ledgerTable").querySelectorAll("thead .sortable").forEach(function(th){
  th.addEventListener("click", function(){
    var key = th.dataset.sort;
    if(currentSortKey === key){
      currentSortDir = (currentSortDir === "desc") ? "asc" : "desc";
    } else {
      currentSortKey = key;
      currentSortDir = "desc";
    }
    _expandedId = null;
    render();
  });
});

/* v3.15: 사업축 탭 이벤트는 buildBusinessFilterTabs() 내부에서 바인딩 */

/* ======================================================
   기간 필터 이벤트
   ====================================================== */
document.querySelectorAll(".filter-bar:not(#searchSortBar) .fbtn").forEach(function(btn){
  btn.addEventListener("click", function(){
    document.querySelectorAll(".filter-bar:not(#searchSortBar) .fbtn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    currentRange = btn.dataset.range;

    var isCustom = currentRange === "custom";
    var isPickMonth = currentRange === "pickMonth";
    $("dateFrom").style.display = isCustom ? "inline-block" : "none";
    $("dateSep").style.display = isCustom ? "inline" : "none";
    $("dateTo").style.display = isCustom ? "inline-block" : "none";
    /* v3.0: YYYY-MM 월 선택기 */
    $("monthPicker").style.display = isPickMonth ? "inline-block" : "none";

    if(isPickMonth){
      if(!$("monthPicker").value){
        var now = new Date();
        $("monthPicker").value = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
      }
      /* 월 선택 → from/to 자동 계산 */
      _applyMonthPicker();
    }
    if(isCustom){
      if(!$("dateFrom").value) $("dateFrom").value = monthStart();
      if(!$("dateTo").value) $("dateTo").value = todayStr();
      customFrom = $("dateFrom").value;
      customTo = $("dateTo").value;
    }

    _expandedId = null;
    render();
  });
});

/* v3.0: 월 선택기 change 이벤트 */
function _applyMonthPicker(){
  var val = $("monthPicker").value; /* "YYYY-MM" */
  if(!val) return;
  var parts = val.split("-");
  var y = parseInt(parts[0]), m = parseInt(parts[1]);
  var lastDay = new Date(y, m, 0).getDate();
  customFrom = y + "-" + String(m).padStart(2,"0") + "-01";
  customTo = y + "-" + String(m).padStart(2,"0") + "-" + String(lastDay).padStart(2,"0");
}
$("monthPicker").addEventListener("change", function(){
  _applyMonthPicker();
  _expandedId = null;
  render();
});

$("dateFrom").addEventListener("change", function(e){ customFrom = e.target.value; _expandedId = null; render(); });
$("dateTo").addEventListener("change", function(e){ customTo = e.target.value; _expandedId = null; render(); });

/* -- 크로스탭 동기화 -- */
window.addEventListener("storage", function(e){
  if(e.key && e.key.startsWith("golab_")) render();
});

render();
