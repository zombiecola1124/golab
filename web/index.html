<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoLab · 재고 현황</title>
  <link rel="stylesheet" href="./css/ui.css">
  <style>
    :root{
      --bg:#f5f7fa;--card:#ffffff;--muted:#64748b;--text:#0f172a;
      --line:#e5e7eb;--accent:#16a34a;--warn:#d97706;--bad:#dc2626;--point:#2563eb;
      --chip:#f8fafc;--inv:#2563eb;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial;}

    /* ═══════════════════════════════════════════
       v6.7: 좌측 사이드바 네비게이션 (6페이지 통합)
       — console/deals/profit v6.5~v6.6과 완전 동일한 블록
       — 상단 탭(.tabs)은 DOM 유지, CSS로만 비노출
       — auth-guard.js가 .tabs를 querySelector로 참조하므로 DOM 제거 금지
       ═══════════════════════════════════════════ */
    /* 상단 탭 비노출 (DOM 유지) */
    header .tabs{display:none !important}
    /* header 축소 — "GoLab" 타이틀 + 로그아웃 버튼만 */
    header{height:40px}
    header h1{font-size:14px}

    /* 앱 쉘: 사이드바 + 콘텐츠 2컬럼 */
    .app-shell{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 40px)}

    /* 사이드바 */
    .sidebar-nav-col{
      background:#111827;
      border-right:1px solid #1f2937;
      padding:18px 14px 24px;
      position:sticky;
      top:40px;
      height:calc(100vh - 40px);
      overflow-y:auto;
    }
    .sidebar-brand{
      display:flex;align-items:center;gap:8px;
      color:#f9fafb;font-size:11px;font-weight:700;
      letter-spacing:1px;text-transform:uppercase;
      padding:6px 12px 16px;opacity:.45;
    }
    .sidebar-nav{display:flex;flex-direction:column;gap:3px}
    .sidebar-nav-col .nav-item{
      display:flex;align-items:center;gap:12px;
      padding:0 14px;height:42px;border-radius:10px;
      color:#cbd5e1;font-size:13px;font-weight:600;
      text-decoration:none;white-space:nowrap;
      transition:background .15s,color .15s;
    }
    .sidebar-nav-col .nav-item:hover{background:#1f2937;color:#f9fafb}
    .sidebar-nav-col .nav-item.active{background:#1f2937;color:#ffffff;font-weight:700}
    .sidebar-nav-col .nav-item .ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}

    /* 페이지 콘텐츠 영역 */
    .page-content{min-width:0;background:var(--bg)}
    /* index 전용: .wrap을 page-content 내부에서 정상 동작하도록 조정 */
    .page-content .wrap{max-width:none;margin:0;padding:20px 22px 36px}

    /* index-shell 반응형: 1023px 이하 사이드바 상단 바로 축소 */
    @media(max-width:1023px){
      .app-shell{grid-template-columns:1fr}
      .sidebar-nav-col{
        position:static;height:auto;top:auto;
        padding:10px;border-right:none;border-bottom:1px solid #1f2937;
      }
      .sidebar-brand{display:none}
      .sidebar-nav{flex-direction:row;gap:4px;overflow-x:auto}
      .sidebar-nav-col .nav-item{
        padding:0 12px;height:36px;font-size:11px;flex-shrink:0;
      }
      .page-content .wrap{padding:14px}
    }

    .wrap{max-width:1440px;margin:0 auto;padding:16px 16px 36px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card h2{margin:0 0 12px;font-size:13px;color:var(--inv);display:flex;align-items:center;gap:8px}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
    .kpi{padding:14px;border-radius:10px;border:1px solid var(--line);background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .kpi .t{font-size:11px;color:var(--muted)}
    .kpi .v{margin-top:6px;font-size:24px;font-weight:600;color:var(--inv)}
    .kpi .sub{margin-top:4px;font-size:10px;color:var(--muted)}

    /* v6.9.4: 액션 바 — KPI 아래 독립 배치 */
    .action-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .btn-new{padding:10px 20px;background:var(--inv);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:800;font-size:12px;transition:background .15s;box-shadow:0 1px 3px rgba(37,99,235,.3)}
    .btn-new:hover{background:#1d4ed8}
    /* v6.9.4: 섹션 타이틀 포인트 바 */
    /* v6.9.4 보정: 포인트 바 색상 #3b82f6 통일 */
    .section-title{padding-left:10px;border-left:3px solid var(--section-accent);font-size:14px;font-weight:800;color:var(--text);margin:0 0 10px;display:flex;align-items:center;gap:8px}

    /* 필터 */
    .filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .filter-row input,.filter-row select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:12px;background:var(--chip)}
    .filter-row input{flex:1;min-width:140px}

    /* 테이블 */
    .tableWrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table.list-table{width:100%;border-collapse:collapse;font-size:12px}
    table.list-table th{background:#f8fafc;color:var(--muted);text-align:left;padding:8px 6px;position:sticky;top:0;white-space:nowrap;z-index:2;border-bottom:1px solid var(--line);font-size:11px}
    table.list-table td{padding:8px 6px;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:middle}
    table.list-table tr[data-id]{cursor:pointer;transition:background .1s}
    table.list-table tr[data-id]:hover{background:rgba(37,99,235,.03)}
    .num{text-align:right;font-variant-numeric:tabular-nums}
    .badge{background:var(--inv);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;vertical-align:middle}

    /* 재고 부족 강조 */
    .stock-low{background:rgba(220,38,38,.08);color:var(--bad);font-weight:700}

    /* 사이드패널 */
    .panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90;
      opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
    .panel-overlay.open{opacity:1;visibility:visible}
    .side-panel{position:fixed;top:0;right:0;bottom:0;width:min(440px,90vw);background:var(--card);
      box-shadow:-8px 0 30px rgba(0,0,0,.1);z-index:100;
      display:flex;flex-direction:column;
      transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .side-panel.open{transform:translateX(0)}
    .sp-top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);flex-shrink:0}
    .sp-top h3{margin:0;font-size:14px;color:var(--inv);font-weight:700}
    .sp-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px}
    .sp-close:hover{background:rgba(0,0,0,.06)}
    .sp-body{overflow-y:auto;flex:1;padding:20px}
    .sp-body label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px;margin-top:12px}
    .sp-body label:first-child{margin-top:0}
    .sp-body input,.sp-body textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--chip)}
    .sp-body textarea{resize:vertical;min-height:40px}
    .sp-body .info-field{font-size:12px;color:var(--text);padding:6px 0;border-bottom:1px solid rgba(0,0,0,.04)}
    .sp-body .info-label{font-size:10px;color:var(--muted);font-weight:600}
    .sp-form-btns{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--line);flex-shrink:0}
    .sp-form-btns button{padding:8px 20px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--line)}
    .sp-form-btns .save{background:var(--inv);color:#fff;border-color:var(--inv)}
    .sp-form-btns .save:hover{filter:brightness(.9)}
    .sp-form-btns .danger{color:var(--bad);border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.04)}
    .sp-form-btns .danger:hover{background:rgba(220,38,38,.1)}
    .sp-form-btns .secondary{background:var(--chip)}
    .sp-form-btns .secondary:hover{background:rgba(0,0,0,.06)}
    .sp-msg{padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;margin-top:8px;display:none}
    .sp-msg.error{display:block;background:rgba(220,38,38,.08);color:var(--bad);border:1px solid rgba(220,38,38,.15)}

    /* 카테고리 배지 */
    .cat-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
    .cat-badge.원료{background:rgba(217,119,6,.1);color:#92400e}
    .cat-badge.장비{background:rgba(37,99,235,.1);color:#1e40af}
    .cat-badge.일반상품{background:rgba(22,163,74,.1);color:#15803d}

    /* 빈 상태 */
    .muted{color:var(--muted)}

    /* 모바일 (v6.7: 사이드바 220px만큼 +220 이동) */
    @media(max-width:988px){
      .kpi-grid{grid-template-columns:repeat(2,1fr)}
      .col-desk{display:none!important}
    }
    @media(max-width:700px){
      .kpi-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<!-- GoLab Auth Guard — 인증 전 화면 차단 -->
<div id="golab-auth-wall" style="position:fixed;inset:0;z-index:9999;background:#f5f7fa;display:flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .3s,visibility .3s"></div>

<header data-title="GoLab · 재고 현황"></header>
<script src="./js/navbar.js"></script>

<!-- ═══ v6.7: 좌측 사이드바 + 페이지 콘텐츠 쉘 ═══ -->
<div class="app-shell">
  <aside class="sidebar-nav-col">
    <div class="sidebar-brand">GoLab</div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="./console.html"><span class="ni-icon">🏠</span>메인</a>
      <a class="nav-item" href="./deals.html"><span class="ni-icon">🔥</span>거래</a>
      <a class="nav-item" href="./item-master.html"><span class="ni-icon">🏷</span>품목</a>
      <a class="nav-item active" href="./index.html"><span class="ni-icon">📦</span>재고</a>
      <a class="nav-item" href="./profit.html"><span class="ni-icon">💰</span>수익</a>
      <a class="nav-item" href="./partner-master.html"><span class="ni-icon">👥</span>거래처</a>
    </nav>
  </aside>
  <main class="page-content">
<div class="wrap">
  <!-- KPI 카드 -->
  <div class="kpi-grid">

      <div class="v" id="kAssetValue">₩0</div>

    <div class="kpi">
      <div class="t">재고 보유 품목 수</div>

    <div class="kpi">
      <div class="t">총 실재고 수량</div>
      <div class="v" id="kTotalStock">0</div>
    </div>
    <div class="kpi">
      <div class="t">총 가용 재고 수량</div>

<script>
/* ══════════════════════════════════════════════════════════════
   GoLab 재고 관리 — v1 (golab_inventory_v1)
   · item-master와 결합하여 품목명/카테고리 표시
   · CRUD + 감사 로그 + KPI + 필터
   ══════════════════════════════════════════════════════════════ */
var INV_KEY = "golab_inventory_v1";
var AUDIT_KEY = "golab_inventory_audit_v1";

/* ── 헬퍼 ── */
var $ = function(id) { return document.getElementById(id); };
function fmt(v) { return "₩" + (Number(v) || 0).toLocaleString(); }
function n(v) { return Number(v) || 0; }
function esc(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function today() { return new Date().toISOString().substring(0, 10); }
function now() { return new Date().toISOString(); }

/* ── 데이터 로드/저장 ── */
function loadInv() {
  try { return JSON.parse(GoLabStorage.getItem(INV_KEY) || "[]"); } catch (e) { return []; }
}
function saveInv(list) {
  GoLabStorage.setItem(INV_KEY, JSON.stringify(list));
}

/* ── 감사 로그 ── */
function emitAudit(action, detail) {
  var logs = [];
  try { logs = JSON.parse(localStorage.getItem(AUDIT_KEY) || "[]"); } catch (e) {}
  logs.unshift({
    log_id: crypto.randomUUID(),
    entity_type: "inventory",
    action: action,
    detail: detail,
    actor: "owner",
    created_at: now()
  });
  /* 최근 500건만 유지 */
  if (logs.length > 500) logs = logs.slice(0, 500);
  localStorage.setItem(AUDIT_KEY, JSON.stringify(logs));
}

/* ── item-master 맵 ── */
var _itemMap = {};
function _buildItemMap() {
  _itemMap = {};
  var all = GoLabItemMaster.loadAll();
  all.forEach(function(it) { _itemMap[it.item_id] = it; });
}
function _getItemName(itemId) {
  var it = _itemMap[itemId];
  if (!it) return "—";
  return it.spec && it.spec.trim()
    ? it.item_name + " / " + it.spec
    : it.item_name;
}
function _getItemCategory(itemId) {
  var it = _itemMap[itemId];
  if (!it) return "";
  /* category 영문 코드 → 한글 변환 */
  var map = { general_goods: "일반상품", metal_material: "원료", equipment: "장비" };
  return map[it.category] || it.category || "";
}

/* ── KPI 계산 ── */
function computeKPI() {
  var inv = loadInv();
  var totalAsset = 0, itemCount = 0, totalStock = 0, totalAvail = 0;
  inv.forEach(function(r) {
    var cs = n(r.current_stock);
    var rs = n(r.reserved_stock);
    totalAsset += cs * n(r.last_buy_price);
    if (cs > 0) itemCount++;
    totalStock += cs;
    totalAvail += Math.max(0, cs - rs);
  });
  $("kAssetValue").textContent = fmt(totalAsset);
  $("kItemCount").textContent = itemCount.toLocaleString();
  $("kTotalStock").textContent = totalStock.toLocaleString();
  $("kAvailStock").textContent = totalAvail.toLocaleString();
}

/* ── 테이블 렌더 ── */
function render() {
  _buildItemMap();
  var inv = loadInv();
  var search = ($("fSearch").value || "").trim().toLowerCase();
  var catFilter = $("fCategory").value;
  var stockFilter = $("fStock").value;

  /* 필터 적용 */
  var filtered = inv.filter(function(r) {
    var cs = n(r.current_stock);
    var ts = n(r.target_stock);
    var name = _getItemName(r.item_id).toLowerCase();
    var cat = _getItemCategory(r.item_id).toLowerCase();
    var tag = (r.memo_tag || "").toLowerCase();

    /* 검색 */
    if (search && name.indexOf(search) === -1 && cat.indexOf(search) === -1 && tag.indexOf(search) === -1) return false;
    /* 카테고리 */
    if (catFilter && _getItemCategory(r.item_id) !== catFilter) return false;
    /* 재고 필터 */
    if (stockFilter === "instock" && cs <= 0) return false;
    if (stockFilter === "zero" && cs > 0) return false;
    if (stockFilter === "low" && !(cs < ts && ts > 0)) return false;
    return true;
  });

  /* 테이블 빌드 */
  var tb = $("tbody");
  var html = "";
  var sumStock = 0, sumReserved = 0, sumAvail = 0, sumValue = 0;

  filtered.forEach(function(r) {
    var cs = n(r.current_stock);
    var rs = n(r.reserved_stock);
    var avail = Math.max(0, cs - rs);
    var bp = n(r.last_buy_price);
    var holdVal = cs * bp;
    var ts = n(r.target_stock);
    var isLow = ts > 0 && cs < ts;
    var name = _getItemName(r.item_id);
    var cat = _getItemCategory(r.item_id);

    sumStock += cs;
    sumReserved += rs;
    sumAvail += avail;
    sumValue += holdVal;

    html += '<tr data-id="' + esc(r.item_id) + '">';
    html += '<td><b>' + esc(name) + '</b></td>';
    html += '<td class="col-desk">' + (cat ? '<span class="cat-badge ' + esc(cat) + '">' + esc(cat) + '</span>' : '<span style="color:var(--muted)">—</span>') + '</td>';
    html += '<td class="num' + (isLow ? ' stock-low' : '') + '">' + cs + '</td>';
    html += '<td class="col-desk num">' + rs + '</td>';
    html += '<td class="num">' + avail + '</td>';
    html += '<td class="col-desk num">' + fmt(bp) + '</td>';
    html += '<td class="num" style="font-weight:600">' + fmt(holdVal) + '</td>';
    html += '<td class="col-desk num">' + (ts > 0 ? ts : '<span style="color:var(--muted)">—</span>') + '</td>';
    html += '<td class="col-desk">' + (r.memo_tag ? '<span style="color:var(--inv);font-size:11px">' + esc(r.memo_tag) + '</span>' : '') + '</td>';
    html += '</tr>';
  });

  tb.innerHTML = html;

  /* 합계 행 */
  if (filtered.length > 0) {
    $("tfoot").style.display = "";
    $("sumStock").textContent = sumStock.toLocaleString();
    $("sumReserved").textContent = sumReserved.toLocaleString();
    $("sumAvail").textContent = sumAvail.toLocaleString();
    $("sumValue").textContent = fmt(sumValue);
  } else {
    $("tfoot").style.display = "none";
  }

  /* 배지 & 빈 메시지 */
  $("listBadge").textContent = filtered.length;
  $("emptyMsg").style.display = filtered.length > 0 ? "none" : "";

  /* 행 클릭 → 패널 */
  tb.querySelectorAll("tr[data-id]").forEach(function(row) {
    row.addEventListener("click", function() {
      openPanel(row.dataset.id);
    });
  });

  computeKPI();
}

/* ── 사이드패널 ── */
var _panelItemId = null; /* null=등록, string=수정 */
var _acItem = null; /* autocomplete 인스턴스 */

function openPanel(itemId) {
  _panelItemId = itemId || null;
  _hideMsg();

  if (_panelItemId) {
    /* === 수정 모드 === */
    var inv = loadInv();
    var rec = null;
    for (var i = 0; i < inv.length; i++) {
      if (inv[i].item_id === _panelItemId) { rec = inv[i]; break; }
    }
    if (!rec) return;

    $("spTitle").textContent = "재고 수정";
    $("itemSelectWrap").style.display = "none";
    $("itemDisplayWrap").style.display = "";
    $("itemDisplay").textContent = _getItemName(rec.item_id);
    $("inStock").value = n(rec.current_stock);
    $("inBuyPrice").value = n(rec.last_buy_price);
    $("inTarget").value = n(rec.target_stock);
    $("inTag").value = rec.memo_tag || "";
    $("btnSave").textContent = "저장";
    $("btnCancel").style.display = "";
    $("btnDelete").style.display = "";

    /* 읽기 전용 정보 */
    $("readonlyInfo").style.display = "";
    $("infoFirstIn").textContent = rec.first_in_date || "—";
    $("infoReserved").textContent = n(rec.reserved_stock);
    $("infoLeadTime").textContent = n(rec.lead_time_days);
    $("infoUpdated").textContent = rec.updated_at ? rec.updated_at.substring(0, 16).replace("T", " ") : "—";
  } else {
    /* === 등록 모드 === */
    $("spTitle").textContent = "재고 등록";
    $("itemSelectWrap").style.display = "";
    $("itemDisplayWrap").style.display = "none";
    $("inStock").value = "";
    $("inBuyPrice").value = "";
    $("inTarget").value = "0";
    $("inTag").value = "";
    $("btnSave").textContent = "등록";
    $("btnCancel").style.display = "";
    $("btnDelete").style.display = "none";
    $("readonlyInfo").style.display = "none";

    /* autocomplete 초기화 */
    if (_acItem) _acItem.clear();
  }

  $("sidePanel").classList.add("open");
  $("panelOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closePanel() {
  $("sidePanel").classList.remove("open");
  $("panelOverlay").classList.remove("open");
  document.body.style.overflow = "";
  _panelItemId = null;
  _hideMsg();
}

function _showMsg(msg) {
  var el = $("spMsg");
  el.textContent = msg;
  el.classList.add("error");
  el.style.display = "block";
}
function _hideMsg() {
  var el = $("spMsg");
  el.style.display = "none";
  el.classList.remove("error");
}

/* ── 저장 (등록/수정) ── */
function save() {
  var inv = loadInv();
  var stock = Number($("inStock").value);
  var buyPrice = Number($("inBuyPrice").value);
  var target = Number($("inTarget").value) || 0;
  var tag = $("inTag").value.trim();

  /* 입력 검증: 0 이상 숫자만 허용 */
  if (isNaN(stock) || stock < 0) { _showMsg("현재 수량은 0 이상이어야 합니다."); return; }
  if (isNaN(buyPrice) || buyPrice < 0) { _showMsg("매입가는 0 이상이어야 합니다."); return; }

  if (_panelItemId) {
    /* === 수정 === */
    for (var i = 0; i < inv.length; i++) {
      if (inv[i].item_id === _panelItemId) {
        var before = JSON.parse(JSON.stringify(inv[i]));
        inv[i].current_stock = stock;
        inv[i].last_buy_price = buyPrice;
        inv[i].target_stock = target;
        inv[i].memo_tag = tag;
        inv[i].updated_at = now(); /* 수정 시마다 갱신 */
        /* first_in_date 변경하지 않음 */
        saveInv(inv);
        emitAudit("UPDATE", { item_id: _panelItemId, before: before, after: JSON.parse(JSON.stringify(inv[i])) });
        break;
      }
    }
  } else {
    /* === 등록 === */
    var itemId = _acItem ? _acItem.getValue() : null;
    if (!itemId) { _showMsg("품목을 선택해주세요."); return; }

    /* 중복 방지: item_id PK */
    for (var j = 0; j < inv.length; j++) {
      if (inv[j].item_id === itemId) {
        _showMsg("이미 등록된 품목입니다. 수정 기능을 이용하세요.");
        return;
      }
    }

    var newRec = {
      item_id: itemId,
      current_stock: stock,
      reserved_stock: 0,
      last_buy_price: buyPrice,
      target_stock: target,
      first_in_date: today(),   /* 등록 시점 오늘 */
      memo_tag: tag,
      lead_time_days: 0,
      updated_at: now()         /* 생성 시각 */
    };
    inv.push(newRec);
    saveInv(inv);
    emitAudit("CREATE", { item_id: itemId, after: newRec });
  }

  closePanel();
  render();
}

/* ── 삭제 ── */
function deleteRecord() {
  if (!_panelItemId) return;
  if (!confirm("이 재고 레코드를 삭제하시겠습니까?")) return;

  var inv = loadInv();
  var deleted = null;
  inv = inv.filter(function(r) {
    if (r.item_id === _panelItemId) { deleted = r; return false; }
    return true;
  });
  saveInv(inv);
  if (deleted) emitAudit("DELETE", { item_id: _panelItemId, before: deleted });

  closePanel();
  render();
}

/* ── 이벤트 바인딩 ── */
$("panelOverlay").addEventListener("click", closePanel);
$("spClose").addEventListener("click", closePanel);
$("btnNew").addEventListener("click", function() { openPanel(null); });
$("btnSave").addEventListener("click", save);
$("btnCancel").addEventListener("click", closePanel);
$("btnDelete").addEventListener("click", deleteRecord);
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape" && $("sidePanel").classList.contains("open")) closePanel();
});

/* 필터 이벤트 */
$("fSearch").addEventListener("input", render);
$("fCategory").addEventListener("change", render);
$("fStock").addEventListener("change", render);

/* ── autocomplete 초기화 ── */
_acItem = GoLabItemMaster.createAutocomplete($("acItemWrap"), {
  placeholder: "품목 검색 또는 새 등록...",
  onSelect: function(item) { /* 선택 완료 */ },
  onClear: function() { /* 클리어 */ }
});

/* ── 초기 렌더 ── */
render();
</script>
